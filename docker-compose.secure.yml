# =============================================================================
# Zen AI Pentest - Secure Docker Compose
# =============================================================================
# Security Features:
# - No privileged containers
# - Read-only filesystem where possible
# - Resource limits
# - Secret management
# - Network isolation
# - Security options
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # API Server
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.secure
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    container_name: zen-ai-pentest-api

    # Security: Environment variables from .env file
    env_file:
      - .env

    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/zenai
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}

    ports:
      - "8000:8000"

    # Security: No new privileges
    security_opt:
      - no-new-privileges:true

    # Security: Read-only root filesystem
    read_only: true

    # Security: Capabilities drop
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Nur falls nötig für Port < 1024

    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Security: Restart policy
    restart: unless-stopped

    # Security: Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Writable volumes for read-only filesystem
    volumes:
      - /tmp
      - /var/tmp
      - ./logs:/app/logs

    networks:
      - zenai-network

    depends_on:
      db:
        condition: service_healthy

  # ===========================================================================
  # Database (PostgreSQL)
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: zen-ai-pentest-db

    environment:
      POSTGRES_DB: zenai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Security: No exposed ports (internal only)
    # ports:
    #   - "5432:5432"  # Only for debugging

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - zenai-network

  # ===========================================================================
  # Redis (für Rate Limiting & Caching)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: zen-ai-pentest-redis

    command: redis-server --requirepass ${REDIS_PASSWORD}

    volumes:
      - redis_data:/data

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - zenai-network

  # ===========================================================================
  # Worker (Background Tasks)
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker

    container_name: zen-ai-pentest-worker

    env_file:
      - .env

    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/zenai
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

    restart: unless-stopped

    volumes:
      - /tmp
      - ./logs:/app/logs

    networks:
      - zenai-network

    depends_on:
      - db
      - redis

# =============================================================================
# Networks
# =============================================================================
networks:
  zenai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
