version: '3.8'

services:
  zen-ai:
    build: .
    image: zen-ai-pentest:2.0.0
    container_name: zen-ai-pentest
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./evidence:/app/evidence
      - ./sessions:/app/sessions
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - zen-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: zen-ai-redis
    restart: unless-stopped
    networks:
      - zen-ai-network
    volumes:
      - redis-data:/data

networks:
  zen-ai-network:
    driver: bridge

volumes:
  redis-data:
