# =============================================================================
# Zen AI Pentest - Docker Compose Configuration
# =============================================================================
# This Docker Compose setup provides a complete, production-ready environment
# for the Zen AI Pentest framework with:
# - Main application container
# - PostgreSQL database for findings and reports
# - Redis for caching and session storage
# - Optional: ELK stack for centralized logging
# - Optional: Nuclei scanner in separate container
#
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose up -d --scale worker=3   # Start with 3 workers
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Author: SHAdd0WTAka + Kimi AI
# Version: 1.0.0
# =============================================================================

version: '3.8'

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Main Application
  # ---------------------------------------------------------------------------
  zen-ai-pentest:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: zen-ai-pentest
    hostname: zen-ai-pentest
    restart: unless-stopped
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONIOENCODING=utf-8
      - ZEN_AI_ENV=production
      - ZEN_AI_LOG_LEVEL=INFO
      - ZEN_AI_DB_HOST=postgres
      - ZEN_AI_DB_PORT=5432
      - ZEN_AI_DB_NAME=zenpentest
      - ZEN_AI_DB_USER=zenuser
      - ZEN_AI_DB_PASSWORD=${DB_PASSWORD:-changeme}
      - ZEN_AI_REDIS_HOST=redis
      - ZEN_AI_REDIS_PORT=6379
      - ZEN_AI_REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PROTONVPN_USERNAME=${PROTONVPN_USERNAME:-}
      - PROTONVPN_PASSWORD=${PROTONVPN_PASSWORD:-}
    
    # Volumes for persistence
    volumes:
      # Application data
      - ./data:/app/data:ro
      - zen-logs:/app/logs
      - zen-evidence:/app/evidence
      - zen-reports:/app/reports
      - zen-sessions:/app/sessions
      # Config (mount as read-only for security)
      - ./config:/app/config:ro
      # Custom modules (optional)
      - ./custom_modules:/app/custom_modules:ro
    
    # Networking
    networks:
      - zen-network
      - zen-backend
    
    # Ports (only expose necessary ones)
    ports:
      - "${ZEN_API_PORT:-8080}:8080"      # REST API
      - "${ZEN_WEB_PORT:-3000}:3000"      # Web Dashboard (future)
    
    # Health checks
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Depends on
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Labels for monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zen-ai.rule=Host(`pentest.local`)"
      - "traefik.http.services.zen-ai.loadbalancer.server.port=8080"
      - "com.zen-ai.service=main"
      - "com.zen-ai.version=1.0.0"

  # ---------------------------------------------------------------------------
  # Worker Nodes (for distributed scanning)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: zen-worker
    restart: unless-stopped
    
    environment:
      - PYTHONUNBUFFERED=1
      - ZEN_AI_ENV=production
      - ZEN_AI_WORKER=true
      - ZEN_AI_REDIS_HOST=redis
      - ZEN_AI_DB_HOST=postgres
    
    volumes:
      - zen-worker-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For container scanning
    
    networks:
      - zen-network
      - zen-backend
    
    deploy:
      mode: replicated
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    
    depends_on:
      - redis
      - postgres
    
    # Workers can scale horizontally
    scale: ${WORKER_SCALE:-1}

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: zen-postgres
    hostname: postgres
    restart: unless-stopped
    
    environment:
      - POSTGRES_DB=zenpentest
      - POSTGRES_USER=zenuser
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
      - PGDATA=/var/lib/postgresql/data/pgdata
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    
    networks:
      - zen-backend
    
    ports:
      - "${DB_PORT:-5432}:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenuser -d zenpentest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    
    labels:
      - "com.zen-ai.service=database"

  # ---------------------------------------------------------------------------
  # Redis Cache & Message Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: zen-redis
    hostname: redis
    restart: unless-stopped
    
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    volumes:
      - redis-data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    
    networks:
      - zen-backend
    
    ports:
      - "${REDIS_PORT:-6379}:6379"
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    labels:
      - "com.zen-ai.service=cache"

  # ---------------------------------------------------------------------------
  # Nuclei Scanner (Optional - Separate Container)
  # ---------------------------------------------------------------------------
  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: zen-nuclei
    restart: "no"  # Run on-demand
    
    volumes:
      - ./data/nuclei_templates:/nuclei-templates:ro
      - zen-nuclei-results:/results
    
    networks:
      - zen-network
    
    command: >
      nuclei
      -update-templates
      -silent
      -json-export /results/nuclei-output.json
    
    profiles:
      - tools
    
    labels:
      - "com.zen-ai.service=scanner"

  # ---------------------------------------------------------------------------
  # Proton VPN Sidecar (Optional - for anonymous scanning)
  # ---------------------------------------------------------------------------
  protonvpn:
    image: ghcr.io/tprasadtp/protonvpn:latest
    container_name: zen-vpn
    restart: unless-stopped
    
    environment:
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - PROTONVPN_SERVER=${PROTONVPN_SERVER:-CH}
      - KILL_SWITCH=1
      - DEBUG=0
    
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    
    networks:
      - zen-network
    
    # Only expose to other containers, not host
    expose:
      - "8080"
    
    profiles:
      - vpn
    
    labels:
      - "com.zen-ai.service=vpn"

  # ---------------------------------------------------------------------------
  # Elasticsearch (Optional - for log aggregation)
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: zen-elasticsearch
    restart: unless-stopped
    
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    
    ulimits:
      memlock:
        soft: -1
        hard: -1
    
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    
    networks:
      - zen-backend
    
    ports:
      - "${ES_PORT:-9200}:9200"
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    
    profiles:
      - monitoring
    
    labels:
      - "com.zen-ai.service=search"

  # ---------------------------------------------------------------------------
  # Logstash (Optional - log processing)
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: zen-logstash
    restart: unless-stopped
    
    volumes:
      - ./config/logstash:/usr/share/logstash/pipeline:ro
      - zen-logs:/var/log/zen-ai:ro
    
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
    
    networks:
      - zen-backend
    
    depends_on:
      - elasticsearch
    
    profiles:
      - monitoring
    
    labels:
      - "com.zen-ai.service=log-processor"

  # ---------------------------------------------------------------------------
  # Kibana (Optional - log visualization)
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: zen-kibana
    restart: unless-stopped
    
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    
    networks:
      - zen-backend
    
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    
    depends_on:
      - elasticsearch
    
    profiles:
      - monitoring
    
    labels:
      - "com.zen-ai.service=visualization"

  # ---------------------------------------------------------------------------
  # Traefik Reverse Proxy (Optional - for production)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.10
    container_name: zen-traefik
    restart: unless-stopped
    
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
      - "--log.level=INFO"
    
    ports:
      - "80:80"
      - "443:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    
    networks:
      - zen-network
      - zen-backend
    
    profiles:
      - proxy
    
    labels:
      - "com.zen-ai.service=proxy"

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  zen-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      - "com.zen-ai.network=public"
  
  zen-backend:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      - "com.zen-ai.network=private"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-data:
    driver: local
    labels:
      - "com.zen-ai.volume=database"
  
  redis-data:
    driver: local
    labels:
      - "com.zen-ai.volume=cache"
  
  zen-logs:
    driver: local
    labels:
      - "com.zen-ai.volume=logs"
  
  zen-evidence:
    driver: local
    labels:
      - "com.zen-ai.volume=evidence"
  
  zen-reports:
    driver: local
    labels:
      - "com.zen-ai.volume=reports"
  
  zen-sessions:
    driver: local
    labels:
      - "com.zen-ai.volume=sessions"
  
  zen-worker-data:
    driver: local
    labels:
      - "com.zen-ai.volume=worker-data"
  
  zen-nuclei-results:
    driver: local
    labels:
      - "com.zen-ai.volume=scan-results"
  
  elasticsearch-data:
    driver: local
    labels:
      - "com.zen-ai.volume=search-data"
  
  traefik-certs:
    driver: local
    labels:
      - "com.zen-ai.volume=certificates"

# =============================================================================
# CONFIGS (for external configuration files)
# =============================================================================
configs:
  zen_config:
    file: ./config/zen-ai.yaml
    labels:
      - "com.zen-ai.config=main"
  
  logstash_pipeline:
    file: ./config/logstash/pipeline.conf
    labels:
      - "com.zen-ai.config=logstash"

# =============================================================================
# SECRETS (for sensitive data)
# =============================================================================
secrets:
  db_password:
    file: ./secrets/db_password.txt
    labels:
      - "com.zen-ai.secret=database"
  
  api_keys:
    file: ./secrets/api_keys.txt
    labels:
      - "com.zen-ai.secret=apis"
