version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zen_pentest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - zen-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zen-api
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zen_pentest
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-here-change-in-production
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /app/venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - zen-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./web_ui/frontend
      dockerfile: Dockerfile
    container_name: zen-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./web_ui/frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - zen-network
    restart: unless-stopped

  # Celery Worker (for background tasks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: zen-celery
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zen_pentest
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-here-change-in-production
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A tasks worker --loglevel=info
    networks:
      - zen-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: zen-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - zen-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  zen-network:
    driver: bridge
