# ============================================
# Zen-Ai-Pentest Framework - Prometheus Configuration
# Production-Ready Monitoring Stack
# Version: 1.0.0
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zen-ai-pentest'
    replica: '{{.ExternalURL}}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

# Scrape configurations
scrape_configs:
  # ============================================
  # Prometheus Self-Monitoring
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # ============================================
  # Zen-Ai Core Services
  # ============================================

  # API Gateway / Main Application
  - job_name: 'zen-ai-api'
    static_configs:
      - targets: ['zen-ai-api:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    labels:
      service: 'api-gateway'
      tier: 'frontend'

  # Scanner Engine
  - job_name: 'zen-ai-scanner'
    static_configs:
      - targets: ['zen-ai-scanner:8081']
    metrics_path: /metrics
    scrape_interval: 10s
    labels:
      service: 'scanner-engine'
      tier: 'backend'

  # AI Analysis Engine
  - job_name: 'zen-ai-ai-engine'
    static_configs:
      - targets: ['zen-ai-ai:8082']
    metrics_path: /metrics
    scrape_interval: 15s
    labels:
      service: 'ai-engine'
      tier: 'backend'

  # Report Generator
  - job_name: 'zen-ai-reports'
    static_configs:
      - targets: ['zen-ai-reports:8083']
    metrics_path: /metrics
    scrape_interval: 15s
    labels:
      service: 'report-generator'
      tier: 'backend'

  # Task Queue Worker
  - job_name: 'zen-ai-worker'
    static_configs:
      - targets: ['zen-ai-worker:8084']
    metrics_path: /metrics
    scrape_interval: 10s
    labels:
      service: 'task-worker'
      tier: 'backend'

  # ============================================
  # Infrastructure Components
  # ============================================

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - 'node-exporter:9100'
    scrape_interval: 15s
    labels:
      service: 'infrastructure'
      tier: 'system'

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
    labels:
      service: 'containers'
      tier: 'system'

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
    labels:
      service: 'redis'
      tier: 'database'

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s
    labels:
      service: 'postgresql'
      tier: 'database'

  # RabbitMQ Exporter
  - job_name: 'rabbitmq-exporter'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']
    scrape_interval: 15s
    labels:
      service: 'rabbitmq'
      tier: 'messaging'

  # ============================================
  # Security & Pentest Specific Metrics
  # ============================================

  # Nuclei Scanner Metrics
  - job_name: 'nuclei-exporter'
    static_configs:
      - targets: ['nuclei-exporter:9119']
    scrape_interval: 30s
    labels:
      service: 'nuclei-scanner'
      tier: 'security'

  # OWASP ZAP Metrics
  - job_name: 'zap-exporter'
    static_configs:
      - targets: ['zap-exporter:9120']
    scrape_interval: 30s
    labels:
      service: 'owasp-zap'
      tier: 'security'

  # ============================================
  # Kubernetes (if deployed in K8s)
  # ============================================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - zen-ai-pentest
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

