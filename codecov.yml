# Codecov Configuration
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes
    after_n_builds: 3  # Wait for all 3 Python versions

coverage:
  precision: 1
  round: down
  range: "50...100"
  
  status:
    project:
      default:
        target: 10%        # Overall target coverage
        threshold: 5%      # Allow 5% drop
        base: auto
        if_ci_failed: success  # Don't fail CI if Codecov fails
        informational: true    # Informational only, don't block PRs
        paths:
          - "core/"
          - "utils/"
          - "modules/"
          - "safety/"
          - "risk_engine/"
          - "database/"
    
    patch:
      default:
        target: 50%        # Target for new code in PRs
        threshold: 10%
        base: auto
        if_ci_failed: success
        informational: true
        only_pulls: true   # Only check on PRs

  ignore:
    # Ignore external tool wrappers
    - "tools/**/*"
    # Ignore API routes (require FastAPI server)
    - "api/**/*"
    # Ignore tests
    - "tests/**/*"
    - "test_*.py"
    # Ignore examples and docs
    - "examples/**/*"
    - "docs/**/*"
    # Ignore build artifacts
    - "build/**/*"
    - "dist/**/*"
    # Ignore CI/CD scripts
    - "scripts/**/*"
    - ".github/**/*"
    # Ignore frontend
    - "web_ui/**/*"
    # Ignore plugins
    - "plugins/**/*"
    # Ignore benchmarking
    - "benchmarks/**/*"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false    # Post comment even if coverage unchanged
  require_base: yes
  require_head: yes
  branches:
    - main
    - master
    - develop

# Pull Request settings
github_checks:
  annotations: true

# Flags for different test types
flags:
  unittests:
    carryforward: true
    paths:
      - "core/"
      - "utils/"
      - "safety/"
      - "risk_engine/"
  integration:
    carryforward: true
    paths:
      - "api/"
      - "database/"
