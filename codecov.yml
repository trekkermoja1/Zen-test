codecov:
  # Token not required - Codecov App handles authentication
  notify:
    wait_for_ci: true
  require_ci_to_pass: true

comment:
  behavior: default
  layout: reach,diff,flags,tree
  require_base: false
  require_changes: false
  require_head: true
  show_carryforward_flags: false

coverage:
  precision: 2
  range:
    - 60.0
    - 80.0
  round: down
  status:
    changes: false
    default_rules:
      flag_coverage_not_uploaded_behavior: include
    patch:
      default:
        target: 80.0
        threshold: 5.0
    project:
      default:
        paths:
          - "core/**"
          - "modules/**"
          - "api/**"
        target: 80.0
        threshold: 5.0

fixes:
  - "home/runner/work/Zen-Ai-Pentest/Zen-Ai-Pentest/::"
  - "/home/runner/work/Zen-Ai-Pentest/Zen-Ai-Pentest/::"
  - "/github/workspace/::"
  - "/__w/Zen-Ai-Pentest/Zen-Ai-Pentest/::"

ignore:
  - "tests/**"
  - "**/tests/**"
  - "test_*.py"
  - "*_test.py"
  - "docs/**"
  - "examples/**"
  - "scripts/**"
  - "benchmarks/**"
  - "ci_cd/**"
  - ".github/**"
  - "venv/**"
  - ".venv/**"
  - "__pycache__/**"
  - "*.pyc"
  - "*.pyo"
  - "*.egg-info/**"

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      macro: false
      method: false
