# Codecov Configuration - 20% Target
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: no
  notify:
    wait_for_ci: no
    after_n_builds: 1

coverage:
  precision: 1
  round: down
  range: "10...100"

  status:
    project:
      default:
        target: 20%
        threshold: 5%
        base: auto
        if_ci_failed: success
        informational: true

    patch:
      default:
        target: 50%
        threshold: 10%
        if_ci_failed: success
        informational: true
        only_pulls: false

# Only ignore files that cause issues or are truly not testable
ignore:
  # API and Web UI (separate testing)
  - "api/**/*"
  - "web_ui/**/*"
  - "gui/**/*"
  - "dashboard/**/*"

  # Test files themselves
  - "tests/**/*"
  - "test_*.py"

  # Documentation and config
  - "docs/**/*"
  - "examples/**/*"
  - "benchmarks/**/*"

  # Build and deployment
  - "build/**/*"
  - "dist/**/*"
  - "scripts/**/*"
  - ".github/**/*"
  - "ci_cd/**/*"
  - "docker/**/*"
  - "plugins/**/*"
  - "k8s/**/*"
  - "jenkins/**/*"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes
