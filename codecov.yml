codecov:
  token: ab0fa3aa-0a62-4fdf-b912-7af9e27a979d
  notify:
    wait_for_ci: true
  require_ci_to_pass: true

comment:
  behavior: default
  layout: reach,diff,flags,tree
  require_base: false
  require_changes: false
  require_head: true

coverage:
  precision: 2
  range: [60.0, 80.0]
  round: down
  status:
    project:
      default:
        target: 80.0
        threshold: 5.0
        paths:
          - "core/**"
          - "modules/**"
          - "api/**"
    patch:
      default:
        target: 80.0
        threshold: 5.0

# Path Fixing für GitHub Actions
fixes:
  - "home/runner/work/Zen-Ai-Pentest/Zen-Ai-Pentest/::"
  - "/home/runner/work/Zen-Ai-Pentest/Zen-Ai-Pentest/::"
  - "/github/workspace/::"
  - "/__w/Zen-Ai-Pentest/Zen-Ai-Pentest/::"

# Ignorierte Pfade
ignore:
  - "tests/**"
  - "**/tests/**"
  - "test_*.py"
  - "*_test.py"
  - "docs/**"
  - "examples/**"
  - "scripts/**"
  - "benchmarks/**"
  - "ci_cd/**"
  - ".github/**"
  - "venv/**"
  - ".venv/**"
  - "__pycache__/**"
  - "*.pyc"
  - "*.pyo"
  - "*.egg-info/**"

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false
