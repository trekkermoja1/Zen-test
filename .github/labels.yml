# GitHub Labels Configuration
# These labels will be automatically synced to the repository

# Type Labels
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements to documentation"

- name: "security"
