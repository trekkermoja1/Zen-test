# Probot Settings Configuration
# Install: https://github.com/apps/settings
# 
# This file configures repository settings automatically via the Probot Settings app.
# If Probot is not installed, these settings need to be applied manually.

repository:
  # Repository name and description
  name: zen-ai-pentest
  description: "Advanced AI-Powered Penetration Testing Framework with Multi-Agent Orchestration"
  homepage: https://github.com/SHAdd0WTAka/zen-ai-pentest
  
  # Features
  has_issues: true
  has_projects: true
  has_wiki: true
  has_downloads: true
  
  # Pull Requests
  default_branch: master
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true
  
  # Security
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# Branch Protection Rules
# IMPORTANT: These protect the master branch
branches:
  - name: master
    protection:
      # Require pull request reviews before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        dismissal_restrictions:
          users: []
          teams: []
      
      # Require status checks to pass before merging
      required_status_checks:
        strict: true
        contexts:
          - "test (ubuntu-latest, 3.11)"
          - "test (ubuntu-latest, 3.12)"
          - "test (windows-latest, 3.11)"
          - "Analyze Python Code"
          - "dependency-review"
          - "Code scanning results / CodeQL"
      
      # Restrict who can push to the protected branches
      restrictions:
        users: []
        teams: []
        apps: []
      
      # Other settings
      enforce_admins: false
      require_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
      required_signatures: false
      lock_branch: false
      allow_fork_syncing: true

  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      
      required_status_checks:
        strict: true
        contexts:
          - "test (ubuntu-latest, 3.11)"
          - "test (ubuntu-latest, 3.12)"
          - "test (windows-latest, 3.11)"
          - "Analyze Python Code"
          - "dependency-review"
      
      enforce_admins: false
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true

# Labels - synced with labels.yml
labels:
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  
  - name: "security"
    color: "d93f0b"
    description: "Security related issues"
  
  - name: "priority:critical"
    color: "b60205"
    description: "Critical priority - immediate attention required"

# Collaborators
collaborators:
