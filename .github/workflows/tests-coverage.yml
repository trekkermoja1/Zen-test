name: Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix size - Windows is slower
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -r requirements-test.txt

    - name: Run Ruff linter
      run: |
        ruff check . --output-format=github
      continue-on-error: true

    - name: Run Bandit security scan
      run: |
        bandit -r core/ modules/ tools/ agents/ -f json -o bandit-report.json || true
        bandit -r core/ modules/ tools/ agents/ -f screen
      continue-on-error: true

    - name: Run tests with coverage
      run: |
        pytest tests/ -v \
          --cov=core \
          --cov=tools \
          --cov=modules \
          --cov=agents \
          --cov=autonomous \
          --cov=database \
          --cov=api \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junitxml=junit.xml \
          -xvs 2>&1 | tee test-output.log
      timeout-minutes: 15
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/
          junit.xml
          test-output.log
          bandit-report.json

    - name: Check coverage threshold
      run: |
        python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        rate = float(root.get('line-rate'))
        print(f'Coverage: {rate*100:.1f}%')
        if rate < 0.20:
            print('::error::Coverage below 20% minimum threshold!')
            exit(1)
        print('::notice::Coverage check passed!')
        "
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy

    - name: Check code formatting with Black
      run: |
        black --check --diff --line-length 127 .
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff --profile black .
      continue-on-error: true

    - name: Run Ruff linter
      run: |
        ruff check . --output-format=github
      continue-on-error: true

    - name: Type check with mypy
      run: |
        mypy core/ --ignore-missing-imports --show-error-codes
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

    - name: Run Bandit security scan
      uses: PyCQA/bandit@main
      with:
        args: "-r core/ modules/ tools/ -f json -o bandit-report.json"
      continue-on-error: true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          trivy-results.sarif

  health-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psutil

    - name: Run health check
      run: |
        python scripts/health_check_cli.py --format json --ci
      continue-on-error: true

    - name: Upload health check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: health-check-report
        path: health-check-report.json
      continue-on-error: true
