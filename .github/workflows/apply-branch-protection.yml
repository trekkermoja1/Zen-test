name: 🚨 Apply Branch Protection

# This workflow applies branch protection rules via GitHub API
# Requires: repo admin permissions + GITHUB_TOKEN with repo scope

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to protect'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - main
          - both
      enforce_admins:
        description: 'Enforce rules for admins too'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  administration: write
  pull-requests: read

jobs:
  apply-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply Protection to Master
        if: github.event.inputs.branch == 'master' || github.event.inputs.branch == 'both'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log('🔒 Applying branch protection to MASTER...');
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            
            try {
              await github.rest.repos.updateBranchProtection({
                owner: owner,
                repo: repo,
                branch: 'master',
                required_status_checks: {
                  strict: true,
                  contexts: [
                    'test (ubuntu-latest, 3.11)',
                    'test (ubuntu-latest, 3.12)',
                    'test (windows-latest, 3.11)',
                    'Analyze Python Code',
                    'dependency-review'
                  ]
                },
                enforce_admins: ${{ github.event.inputs.enforce_admins }},
                required_pull_request_reviews: {
                  dismissal_restrictions: {},
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1,
                  bypass_pull_request_allowances: {}
                },
                restrictions: null,
                required_linear_history: false,
                allow_force_pushes: false,
                allow_deletions: false,
                required_conversation_resolution: true,
                lock_branch: false,
                allow_fork_syncing: true
              });
              
              console.log('✅ Branch protection applied to MASTER successfully!');
              console.log('');
              console.log('📋 Configuration:');
              console.log('  • Require PR reviews: YES (1 approval)');
              console.log('  • Require CODEOWNERS: YES');
              console.log('  • Dismiss stale reviews: YES');
              console.log('  • Require status checks: YES (5 checks)');
              console.log('  • Up-to-date branches: REQUIRED');
              console.log('  • Force pushes: BLOCKED');
              console.log('  • Branch deletion: BLOCKED');
              console.log('  • Admin enforcement: ${{ github.event.inputs.enforce_admins ? "YES" : "NO" }}');
              
            } catch (error) {
              console.error('❌ Failed to apply protection:', error.message);
              if (error.message.includes('Upgrade to GitHub Pro')) {
                console.error('');
                console.error('⚠️  Some protection features require GitHub Pro/Team/Enterprise');
                console.error('   Free tier supports basic protection');
              }
              core.setFailed(error.message);
            }

      - name: Apply Protection to Main
        if: github.event.inputs.branch == 'main' || github.event.inputs.branch == 'both'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log('🔒 Applying branch protection to MAIN...');
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            
            try {
              await github.rest.repos.updateBranchProtection({
                owner: owner,
                repo: repo,
                branch: 'main',
                required_status_checks: {
                  strict: true,
                  contexts: [
                    'test (ubuntu-latest, 3.11)',
                    'test (ubuntu-latest, 3.12)',
                    'Analyze Python Code',
                    'dependency-review'
                  ]
                },
                enforce_admins: ${{ github.event.inputs.enforce_admins }},
                required_pull_request_reviews: {
                  dismissal_restrictions: {},
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1,
                  bypass_pull_request_allowances: {}
                },
                restrictions: null,
                required_linear_history: false,
                allow_force_pushes: false,
                allow_deletions: false,
                required_conversation_resolution: true,
                lock_branch: false,
                allow_fork_syncing: true
              });
              
              console.log('✅ Branch protection applied to MAIN successfully!');
              
            } catch (error) {
              if (error.status === 404) {
                console.log('⚠️  Branch "main" does not exist - skipping');
              } else {
                console.error('❌ Failed to apply protection:', error.message);
                core.setFailed(error.message);
              }
            }

      - name: Verify Protection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branches = ['master', 'main'];
            
            console.log('');
            console.log('🔍 Verifying Protection Status...');
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            
            for (const branch of branches) {
              try {
                const { data: protection } = await github.rest.repos.getBranchProtection({
                  owner: owner,
                  repo: repo,
                  branch: branch
                });
                
                console.log(`✅ ${branch}: PROTECTED`);
                console.log(`   ├─ PR Reviews: ${protection.required_pull_request_reviews?.required_approving_review_count || 0} required`);
                console.log(`   ├─ Status Checks: ${protection.required_status_checks?.contexts?.length || 0} configured`);
                console.log(`   ├─ Force Pushes: ${protection.allow_force_pushes?.enabled ? 'ALLOWED ⚠️' : 'BLOCKED ✅'}`);
                console.log(`   └─ Deletions: ${protection.allow_deletions?.enabled ? 'ALLOWED ⚠️' : 'BLOCKED ✅'}`);
                console.log('');
                
              } catch (error) {
                if (error.status === 404) {
                  console.log(`❌ ${branch}: NOT PROTECTED`);
                } else {
                  console.log(`⚠️  ${branch}: Error - ${error.message}`);
                }
              }
            }

      - name: Create Success Issue
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '✅ Branch Protection Enabled Successfully',
              body: `## 🔒 Branch Protection Status: ACTIVE
            
Branch protection has been successfully applied to: **${{ github.event.inputs.branch }}**
            
### Configuration Applied:
            
| Setting | Value |
|---------|-------|
| Required Reviews | 1 approval |
| CODEOWNERS Review | Required ✅ |
| Dismiss Stale Reviews | Enabled ✅ |
| Status Checks | Required ✅ |
| Force Pushes | Blocked ✅ |
| Branch Deletion | Blocked ✅ |
| Admin Enforcement | ${{ github.event.inputs.enforce_admins ? "Yes ✅" : "No ⚠️" }} |
            
### Next Steps:
            
1. **Test it**: Try pushing directly to master - it should FAIL
2. **Create a PR**: Make a test PR to verify the workflow
3. **Review settings**: Check at Settings → Branches
            
### Documentation:
            
- [Branch Protection Guide](docs/BRANCH_PROTECTION.md)
- [Security Policy](SECURITY.md)
- [Contributing Guidelines](CONTRIBUTING.md)
            
---
            
*Applied by: @${{ github.actor }}*  
*Workflow: ${{ github.workflow }}*  
*Run: ${{ github.run_id }}*`,
              labels: ['security', 'infrastructure', 'completed']
            });

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 BRANCH PROTECTION SETUP COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Protection applied to: ${{ github.event.inputs.branch }}"
          echo ""
          echo "📋 What's Protected:"
          echo "   • No direct pushes (PRs required)"
          echo "   • Minimum 1 code review required"
          echo "   • CODEOWNERS must approve sensitive files"
          echo "   • CI checks must pass before merge"
          echo "   • Force pushes are BLOCKED"
          echo "   • Branch deletion is BLOCKED"
          echo ""
          echo "🧪 Test It:"
          echo "   git checkout master"
          echo "   git push origin master"
          echo "   # Should fail with helpful error message"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
