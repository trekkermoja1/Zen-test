name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # =============================================================================
  # PR Title Validation (Conventional Commits)
  # =============================================================================
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR Title Format
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = context.payload.pull_request.title;
            
            // Conventional Commits regex
            const regex = /^(feat|fix|docs|style|refactor|test|chore|ci|security|data|perf|build|revert)(\([a-z-]+\))?!?: .{10,}$/i;
            
            // Breaking change indicator
            const breakingChangeRegex = /^(feat|fix|docs|style|refactor|test|chore|ci|security|data|perf|build|revert)(\([a-z-]+\))?!: .+/;
            
            if (!regex.test(title)) {
              core.setFailed(`❌ PR title does not follow Conventional Commits format.
              
            **Current:** "${title}"
            
            **Expected format:** 
            \`\`\`
            <type>(<scope>): <description>
            \`\`\`
            
            **Types:**
            - \`feat\`: New feature
            - \`fix\`: Bug fix
            - \`docs\`: Documentation changes
            - \`style\`: Code style changes (formatting, semicolons, etc.)
            - \`refactor\`: Code refactoring
            - \`test\`: Adding or updating tests
            - \`chore\`: Build process or auxiliary tool changes
            - \`ci\`: CI/CD changes
            - \`security\`: Security-related changes
            - \`data\`: Data updates (CVEs, payloads, etc.)
            - \`perf\`: Performance improvements
            - \`build\`: Build system changes
            - \`revert\`: Revert previous changes
            
            **Examples:**
            - \`feat: add new agent system for SQL injection\`
            - \`fix(core): resolve CVE database loading issue\`
            - \`docs(api): update API documentation\`
            - \`security(patch): fix SQL injection vulnerability\`
            - \`chore(deps): update dependencies\`
            - \`feat(agent)!: breaking change in agent API\`
            
            ℹ️ Description must be at least 10 characters long.
            `);
            } else {
              console.log('✅ PR title follows Conventional Commits format');
              
              // Check for breaking change
              if (breakingChangeRegex.test(title)) {
                console.log('⚠️ Breaking change detected in PR title');
              }
            }

  # =============================================================================
  # Branch Name Validation
  # =============================================================================
  validate-branch:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Branch Name
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            
            // Valid branch name patterns
            const patterns = [
              /^feature\/[a-z0-9-]+$/,           // feature/new-feature
              /^fix\/[a-z0-9-]+$/,               // fix/bug-fix
              /^hotfix\/[a-z0-9-]+$/,            // hotfix/critical-fix
              /^docs\/[a-z0-9-]+$/,              // docs/update-readme
              /^refactor\/[a-z0-9-]+$/,          // refactor/cleanup
              /^test\/[a-z0-9-]+$/,              // test/add-tests
              /^chore\/[a-z0-9-]+$/,             // chore/update-deps
              /^security\/[a-z0-9-]+$/,          // security/patch-vuln
              /^dependabot\/.+$/,                // dependabot branches
              /^renovate\/.+$/,                  // renovate branches
            ];
            
            const isValid = patterns.some(pattern => pattern.test(branchName));
            
            if (!isValid && !branchName.startsWith('dependabot/') && !branchName.startsWith('renovate/')) {
              core.warning(`⚠️ Branch name "${branchName}" doesn't follow recommended naming convention.
              
            **Recommended formats:**
            - \`feature/<description>\` - New features
            - \`fix/<description>\` - Bug fixes
            - \`hotfix/<description>\` - Critical fixes
            - \`docs/<description>\` - Documentation
            - \`refactor/<description>\` - Refactoring
            - \`test/<description>\` - Tests
            - \`chore/<description>\` - Maintenance
            - \`security/<description>\` - Security fixes
            `);
            } else {
              console.log(`✅ Branch name "${branchName}" is valid`);
            }

  # =============================================================================
  # File Size & Type Checks
  # =============================================================================
  file-checks:
    name: File Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          echo "::group::Checking for large files (>1MB)"
          found_large=false
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              echo "⚠️ Large file detected: $file ($size)"
              found_large=true
            fi
          done < <(find . -type f -size +1M \
            ! -path './.git/*' \
            ! -path './data/*' \
            ! -name '*.png' \
            ! -name '*.jpg' \
            ! -name '*.jpeg' \
            ! -name '*.gif' \
            ! -name '*.ico' \
            ! -name '*.db' \
            ! -name '*.json' \
            2>/dev/null | head -20)
          
          if [ "$found_large" = true ]; then
            echo "::warning::Large files detected. Consider using Git LFS for binary files."
          else
            echo "✅ No large files detected"
          fi
          echo "::endgroup::"

      - name: Check for sensitive files
        run: |
          echo "::group::Checking for sensitive files"
          sensitive_patterns=(
            "*.pem"
            "*.key"
            "*.p12"
            "*.pfx"
            "*.env"
            ".env.*"
            "id_rsa"
            "id_dsa"
            "id_ecdsa"
            "id_ed25519"
            "*.keystore"
            "*.jks"
            "credentials.json"
            "secrets.json"
            "*.credentials"
          )
          
          found_sensitive=false
          for pattern in "${sensitive_patterns[@]}"; do
            if find . -type f -name "$pattern" ! -path './.git/*' ! -path './tests/*' 2>/dev/null | grep -q .; then
              echo "⚠️ Potentially sensitive file found matching: $pattern"
              find . -type f -name "$pattern" ! -path './.git/*' ! -path './tests/*' 2>/dev/null | head -5
              found_sensitive=true
            fi
          done
          
          if [ "$found_sensitive" = true ]; then
            echo "::warning::Sensitive files detected. Please review."
          else
            echo "✅ No sensitive files detected"
          fi
          echo "::endgroup::"
        continue-on-error: true

      - name: Check file count
        run: |
          echo "::group::File count statistics"
          changed_files=${{ github.event.pull_request.changed_files }}
          echo "Files changed: $changed_files"
          
          if [ "$changed_files" -gt 50 ]; then
            echo "::warning::This PR changes $changed_files files. Consider splitting into smaller PRs."
          elif [ "$changed_files" -gt 20 ]; then
            echo "⚠️ This PR changes $changed_files files. Large PRs take longer to review."
          else
            echo "✅ Reasonable number of files changed ($changed_files)"
          fi
          echo "::endgroup::"

  # =============================================================================
  # Secrets Scan
  # =============================================================================
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@7d7dc1c3e5e6e6e6e5e6e6e6e6e6e6e6e6e5e5e # v3.0.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --only-verified --debug
        continue-on-error: true

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@7d7dc1c3e5e6e6e6e5e6e6e6e6e6e6e6e6e5e5e # v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # =============================================================================
  # Dependency Review
  # =============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@7d7dc1c3e5e6e6e6e5e6e6e6e6e6e6e6e6e5e5e # v4.0.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: critical
          vulnerability-check: true
          license-check: true
          config-file: './.github/dependency-review-config.yml'
        continue-on-error: true

      - name: Pip Audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format=json --output=pip-audit-report.json || true
        continue-on-error: true

      - name: Upload dependency audit report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: dependency-audit-report
          path: pip-audit-report.json
          retention-days: 7
        continue-on-error: true

  # =============================================================================
  # Auto-Labeling
  # =============================================================================
  auto-label:
    name: Auto-Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Label based on PR title
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const body = (context.payload.pull_request.body || '').toLowerCase();
            const labels = [];
            
            // Label based on conventional commit type
            if (title.startsWith('feat:') || title.startsWith('feat(')) labels.push('enhancement');
            if (title.startsWith('fix:') || title.startsWith('fix(')) labels.push('bug');
            if (title.startsWith('docs:') || title.startsWith('docs(')) labels.push('documentation');
            if (title.startsWith('security:') || title.startsWith('security(')) labels.push('security');
            if (title.startsWith('test:') || title.startsWith('test(')) labels.push('testing');
            if (title.startsWith('refactor:') || title.startsWith('refactor(')) labels.push('refactoring');
            if (title.startsWith('perf:') || title.startsWith('perf(')) labels.push('performance');
            if (title.startsWith('chore(deps)') || title.startsWith('build(deps)')) labels.push('dependencies');
            if (title.includes('!')) labels.push('breaking-change');
            
            // Label based on content
            if (title.includes('cve') || body.includes('cve')) labels.push('cve', 'data-update');
            if (title.includes('payload') || body.includes('payload')) labels.push('payload', 'data-update');
            if (title.includes('ransomware') || body.includes('ransomware')) labels.push('ransomware', 'data-update');
            if (title.includes('agent') || body.includes('agent')) labels.push('agents');
            if (title.includes('api') || body.includes('api')) labels.push('api');
            if (title.includes('ui') || title.includes('frontend') || body.includes('ui')) labels.push('ui');
            if (title.includes('docker') || title.includes('container')) labels.push('docker');
            
            if (labels.length > 0) {
              // Remove duplicates
              const uniqueLabels = [...new Set(labels)];
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: uniqueLabels
              });
              console.log(`✅ Added labels: ${uniqueLabels.join(', ')}`);
            }

      - name: Label based on changed files
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        if: hashFiles('.github/labeler.yml') != ''
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
        continue-on-error: true

  # =============================================================================
  # PR Summary Comment
  # =============================================================================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate-title, file-checks, secrets-scan]
    if: github.event.action == 'opened' || github.event.action == 'reopened'
    steps:
      - name: Generate PR Summary
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;
            
            // Calculate change magnitude
            let sizeLabel = '🟢 Small';
            if (changedFiles > 20 || additions + deletions > 500) sizeLabel = '🔴 Large';
            else if (changedFiles > 10 || additions + deletions > 200) sizeLabel = '🟡 Medium';
            
            const summary = `## 📊 PR Analysis
            
            | Metric | Value |
            |--------|-------|
            | Files changed | ${changedFiles} |
            | Additions | +${additions} 🟢 |
            | Deletions | -${deletions} 🔴 |
            | Net change | ${additions - deletions} |
            | Size | ${sizeLabel} |
            
            ### 📝 Checklist for Reviewers
            - [ ] Code follows project style guidelines
            - [ ] Tests added/updated for new features
            - [ ] Documentation updated (if needed)
            - [ ] Security implications considered
            - [ ] Breaking changes documented (if any)
            
            ${changedFiles > 20 ? '⚠️ **Note:** This PR touches many files. Consider reviewing commit-by-commit.' : ''}
            ${additions > 1000 ? '⚠️ **Note:** Large addition count. Ensure all changes are intentional.' : ''}
            ${title.includes('!') ? '🔴 **Breaking Change:** This PR contains breaking changes. Please review carefully.' : ''}
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  # =============================================================================
  # Check for Merge Conflicts
  # =============================================================================
  check-conflicts:
    name: Check Merge Conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check mergeability
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            
            if (pr.mergeable === false) {
              core.setFailed('❌ This PR has merge conflicts. Please resolve them before merging.');
            } else if (pr.mergeable === null) {
              console.log('⏳ Mergeability check pending...');
            } else {
              console.log('✅ No merge conflicts detected');
            }

  # =============================================================================
  # PR Validation Summary
  # =============================================================================
  validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate-title, validate-branch, file-checks, secrets-scan, dependency-review, auto-label]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🔍 PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR Title | ${{ needs.validate-title.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch Name | ${{ needs.validate-branch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File Checks | ${{ needs.file-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-Label | ${{ needs.auto-label.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.validate-title.result }}" == "success" && "${{ needs.secrets-scan.result }}" == "success" ]]; then
            echo "✅ All critical PR validation checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some PR validation checks failed. Please review." >> $GITHUB_STEP_SUMMARY
          fi
