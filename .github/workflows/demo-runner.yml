name: Run Framework Demos

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 02:00 UTC
    - cron: '0 2 * * 0'
  push:
    branches: [ main, master ]
    paths:
      - 'data/**'
      - 'modules/cve_database.py'
      - 'modules/sql_injection.py'
      - 'examples/**'

jobs:
  demos:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run CVE & Ransomware Demo
      id: cve_demo
      run: |
        cd examples
        python cve_and_ransomware_demo.py > ../cve_demo_output.txt 2>&1
        echo "CVE Demo completed successfully"
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
        
    - name: Run Multi-Agent Demo
      id: agent_demo
      run: |
        cd examples
        timeout 30 python multi_agent_demo.py > ../agent_demo_output.txt 2>&1 || true
        echo "Multi-Agent Demo completed"
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
        
    - name: Upload Demo Outputs
      uses: actions/upload-artifact@v4
      with:
        name: demo-outputs
        path: |
          cve_demo_output.txt
          agent_demo_output.txt
        retention-days: 7
        
    - name: Validate Data Files
      run: |
        echo "Validating JSON data files..."
        python -c "
        import json
        import sys
        from pathlib import Path
        
        errors = []
        for json_file in Path('data').rglob('*.json'):
            try:
                with open(json_file, 'r', encoding='utf-8') as f:
                    json.load(f)
                print(f'[OK] {json_file}')
            except Exception as e:
                errors.append(f'{json_file}: {e}')
                print(f'[ERROR] {json_file}: {e}')
        
        if errors:
            print(f'\n{len(errors)} files failed validation')
            sys.exit(1)
        else:
            print('\nAll JSON files are valid!')
        "
      continue-on-error: true
      
    - name: Generate Demo Report
      run: |
        echo "# Demo Execution Report" > demo_report.md
        echo "- **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> demo_report.md
        echo "- **Commit:** ${{ github.sha }}" >> demo_report.md
        echo "" >> demo_report.md
        echo "## CVE Demo" >> demo_report.md
        echo "- **Status:** ${{ steps.cve_demo.outcome }}" >> demo_report.md
        echo "" >> demo_report.md
        echo "## Multi-Agent Demo" >> demo_report.md
        echo "- **Status:** ${{ steps.agent_demo.outcome }}" >> demo_report.md
        echo "" >> demo_report.md
        echo "## Artifacts" >> demo_report.md
        echo "Demo outputs saved as artifacts (7-day retention)" >> demo_report.md
        
        cat demo_report.md
        
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: demo-report
        path: demo_report.md
        retention-days: 7
