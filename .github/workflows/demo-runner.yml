name: Run Framework Demos

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 02:00 UTC
    - cron: '0 2 * * 0'
  push:
    branches: [ main, master ]
    paths:
      - 'data/**'
      - 'modules/**'
      - 'agents/**'
      - 'examples/**'
      - 'core/**'

jobs:
  demos:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Create required directories
      run: |
        mkdir -p logs evidence data/sql_injection templates/reports
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "Some dependencies may be missing"
        pip install aiohttp aiofiles websockets
        
    - name: List directory structure
      run: |
        echo "=== Directory Structure ==="
        find . -type f -name "*.py" | head -20
        echo ""
        echo "=== Data Files ==="
        ls -la data/ || echo "No data dir"
        
    - name: Run CVE & Ransomware Demo
      id: cve_demo
      shell: bash
      run: |
        cd examples
        python cve_and_ransomware_demo.py 2>&1 | tee ../cve_demo_output.txt
        echo "CVE Demo completed with exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
        
    - name: Run Post-Scan Demo
      id: post_scan_demo
      run: |
        cd examples
        python post_scan_demo.py 2>&1 | tee ../post_scan_output.txt
        echo "Post-Scan Demo completed with exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
        
    - name: Run Multi-Agent Demo
      id: agent_demo
      run: |
        cd examples
        timeout 60 python multi_agent_demo.py 2>&1 | tee ../agent_demo_output.txt || true
        echo "Multi-Agent Demo completed"
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
        
    - name: Upload Demo Outputs
      uses: actions/upload-artifact@v4
      with:
        name: demo-outputs
        path: |
          cve_demo_output.txt
          post_scan_output.txt
          agent_demo_output.txt
          logs/
        retention-days: 7
        
    - name: Validate Data Files
      run: |
        echo "Validating JSON data files..."
        python3 << 'EOF'
        import json
        import sys
        from pathlib import Path
        
        errors = []
        data_dir = Path('data')
        
        if not data_dir.exists():
            print("[WARNING] data/ directory does not exist")
            sys.exit(0)
            
        for json_file in data_dir.rglob('*.json'):
            try:
                with open(json_file, 'r', encoding='utf-8') as f:
                    json.load(f)
                print(f'[OK] {json_file}')
            except Exception as e:
                errors.append(f'{json_file}: {e}')
                print(f'[ERROR] {json_file}: {e}')
        
        if errors:
            print(f'\n{len(errors)} files failed validation')
            sys.exit(1)
        else:
            print('\nAll JSON files are valid!')
        EOF
      continue-on-error: true
      
    - name: Generate Demo Report
      run: |
        cat > demo_report.md << 'REPORT'
        # Demo Execution Report
        
        **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
        **Commit:** ${{ github.sha }}  
        **Branch:** ${{ github.ref }}
        
        ## Demo Results
        
        | Demo | Status |
        |------|--------|
        | CVE & Ransomware | ${{ steps.cve_demo.outcome }} |
        | Post-Scan Workflow | ${{ steps.post_scan_demo.outcome }} |
        | Multi-Agent | ${{ steps.agent_demo.outcome }} |
        
        ## Artifacts
        
        Demo outputs saved as artifacts (7-day retention)
        REPORT
        
        cat demo_report.md
        
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: demo-report
        path: demo_report.md
        retention-days: 7
        
    - name: Check for critical errors
      run: |
        echo "Checking for critical failures..."
        if [ "${{ steps.cve_demo.outcome }}" == "failure" ]; then
          echo "::warning::CVE Demo failed - check artifacts for logs"
        fi
        echo "Demo run completed"
