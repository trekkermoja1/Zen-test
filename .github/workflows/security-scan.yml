name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # Python Security Scan
  bandit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install Bandit
      run: pip install bandit[toml]
    
    - name: Run Bandit Security Scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -ll || true
      continue-on-error: true
    
    - name: Upload Bandit Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json
        retention-days: 30

  # Dependency Vulnerability Scan
  safety:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install Safety
      run: pip install safety
    
    - name: Run Safety Check
      run: |
        safety check -r requirements.txt --json --output safety-report.json || true
        safety check -r requirements.txt || true
      continue-on-error: true
    
    - name: Upload Safety Report
      uses: actions/upload-artifact@v4
      with:
        name: safety-vulnerability-report
        path: safety-report.json
        retention-days: 30

  # Container Image Scan
  trivy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Dockerfile exists
      id: check_dockerfile
      run: |
        if [ -f "Dockerfile" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Build Docker Image
      if: steps.check_dockerfile.outputs.exists == 'true'
      run: docker build -t zen-ai-pentest:security-scan .
    
    - name: Run Trivy Vulnerability Scanner
      if: steps.check_dockerfile.outputs.exists == 'true'
      uses: aquasecurity/trivy-action@0.24.0
      with:
        image-ref: 'zen-ai-pentest:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
      continue-on-error: true
    
    - name: Upload Trivy Report
      if: steps.check_dockerfile.outputs.exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: trivy-container-scan
        path: trivy-results.sarif
        retention-days: 30

  # CodeQL Advanced
  codeql-advanced:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python
        queries: security-extended,security-and-quality
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:python"

  # Secret Detection
  secret-detection:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Secret Detection
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
      continue-on-error: true

  # OWASP Dependency-Check
  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@v1
      with:
        project: 'zen-ai-pentest'
        path: '.'
        format: 'ALL'
      continue-on-error: true
    
    - name: Upload OWASP Report
      uses: actions/upload-artifact@v4
      with:
        name: owasp-dependency-check
        path: reports/
        retention-days: 30

  # Summary
  security-summary:
    runs-on: ubuntu-latest
    needs: [bandit, safety, trivy, codeql-advanced, secret-detection]
    if: always()
    steps:
    - name: Security Scan Summary
      run: |
        echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Bandit | ${{ needs.bandit.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Safety | ${{ needs.safety.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| CodeQL | ${{ needs.codeql-advanced.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Secret Detection | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
