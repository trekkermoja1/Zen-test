name: Security Scan

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_depth:
        description: 'Scan depth (basic, standard, deep)'
        required: false
        default: 'standard'
        type: choice
        options:
          - basic
          - standard
          - deep

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write
  checks: write

jobs:
  # =============================================================================
  # CodeQL Analysis (Python & JavaScript)
  # =============================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          packs: +security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results
          upload: true

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/
          retention-days: 30

  # =============================================================================
  # Bandit - Python Security Linter
  # =============================================================================
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Bandit
        run: |
          pip install bandit[toml]==1.7.7 bandit-sarif-formatter

      - name: Run Bandit scan
        run: |
          echo "::group::Running Bandit Security Scan"
          # Run with SARIF output for GitHub Security tab
          bandit -r . \
            -f sarif \
            -o bandit-results.sarif \
            -ll \
            -ii \
            --exclude './venv,./env,./.venv,./tests,./__pycache__,./.git,./logs,./evidence' \
            || true
          
          # Also run with txt output for logs
          bandit -r . \
            -f txt \
            -o bandit-report.txt \
            -ll \
            -ii \
            --exclude './venv,./env,./.venv,./tests,./__pycache__,./.git,./logs,./evidence' \
            || true
          
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Bandit SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit
        continue-on-error: true

      - name: Check for critical/high severity issues
        run: |
          echo "::group::Checking for critical/high severity issues"
          if [ -f bandit-results.sarif ]; then
            critical_count=$(grep -c '"level": "error"' bandit-results.sarif || echo "0")
            high_count=$(grep -c '"level": "warning"' bandit-results.sarif || echo "0")
            
            echo "Critical/High issues found: $critical_count"
            echo "Medium issues found: $high_count"
            
            if [ "$critical_count" -gt 0 ]; then
              echo "::error::Critical security issues found by Bandit!"
              cat bandit-report.txt
              exit 1
            fi
          fi
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: |
            bandit-results.sarif
            bandit-report.txt
          retention-days: 30

  # =============================================================================
  # Safety - Dependency Vulnerability Check
  # =============================================================================
  safety:
    name: Safety Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Safety
        run: |
          pip install safety==3.0.0

      - name: Run Safety check
        run: |
          echo "::group::Running Safety Vulnerability Check"
          
          # Run Safety check with various output formats
          safety check -r requirements.txt \
            --json \
            --output safety-report.json \
            --full-report || true
          
          safety check -r requirements.txt \
            --output safety-report.txt || true
          
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          echo "::group::Analyzing Safety results"
          if [ -f safety-report.json ]; then
            # Check for critical/high severity vulnerabilities
            critical_vulns=$(python3 << 'EOF'
          import json
          import sys
          try:
              with open('safety-report.json', 'r') as f:
                  data = json.load(f)
              vulnerabilities = data.get('vulnerabilities', [])
              critical_count = 0
              high_count = 0
              for vuln in vulnerabilities:
                  severity = vuln.get('severity', 'unknown')
                  if severity in ['critical', 'Critical']:
                      critical_count += 1
                  elif severity in ['high', 'High']:
                      high_count += 1
              print(f"{critical_count},{high_count}")
          except Exception as e:
              print("0,0")
          EOF
          )
            
            critical=$(echo $critical_vulns | cut -d',' -f1)
            high=$(echo $critical_vulns | cut -d',' -f2)
            
            echo "Critical vulnerabilities: $critical"
            echo "High vulnerabilities: $high"
            
            if [ "$critical" -gt 0 ]; then
              echo "::error::Found $critical critical vulnerabilities in dependencies!"
              cat safety-report.txt
            fi
          fi
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: |
            safety-report.json
            safety-report.txt
          retention-days: 30

  # =============================================================================
  # Trivy - Container Image Scan
  # =============================================================================
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No Dockerfile found, skipping container scan"
          fi

      - name: Build Docker Image
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          docker build -t zen-ai-pentest:security-scan .

      - name: Run Trivy vulnerability scanner (SARIF)
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'zen-ai-pentest:security-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: true

      - name: Run Trivy vulnerability scanner (Table)
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'zen-ai-pentest:security-scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

      - name: Check for critical container vulnerabilities
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "::group::Checking Trivy results"
          if [ -f trivy-results.sarif ]; then
            critical_count=$(grep -o '"severity": "critical"' trivy-results.sarif | wc -l || echo "0")
            echo "Critical vulnerabilities in container: $critical_count"
            
            if [ "$critical_count" -gt 0 ]; then
              echo "::warning::Found $critical_count critical vulnerabilities in container image"
            fi
          fi
          echo "::endgroup::"

      - name: Upload Trivy report
        if: steps.check_dockerfile.outputs.exists == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  # =============================================================================
  # Secret Detection
  # =============================================================================
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~10' }}
          head: HEAD
          extra_args: --only-verified --json
        continue-on-error: true

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # =============================================================================
  # OWASP Dependency-Check
  # =============================================================================
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.scan_depth == 'deep' || github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'zen-ai-pentest'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: reports/
          retention-days: 30

  # =============================================================================
  # Security Scan Summary
  # =============================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, bandit, safety, trivy, secret-detection]
    if: always()
    steps:
      - name: Generate Security Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status | Language/Target |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL (Python) | ${{ needs.codeql.result }} | Python/JavaScript |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ needs.bandit.result }} | Python |" >> $GITHUB_STEP_SUMMARY
          echo "| Safety | ${{ needs.safety.result }} | Dependencies |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} | Container |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-detection.result }} | Secrets |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine overall status
          failed_jobs=0
          for result in "${{ needs.codeql.result }}" "${{ needs.bandit.result }}" "${{ needs.safety.result }}" "${{ needs.trivy.result }}"; do
            if [ "$result" == "failure" ]; then
              failed_jobs=$((failed_jobs + 1))
            fi
          done
          
          if [ $failed_jobs -eq 0 ]; then
            echo "✅ All security scans passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ $failed_jobs security scan(s) had issues. Please review the reports." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download Reports" >> $GITHUB_STEP_SUMMARY
          echo "Security scan reports are available as artifacts in this workflow run." >> $GITHUB_STEP_SUMMARY

      - name: Notify on critical vulnerabilities
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Create issue or comment for critical vulnerabilities
            const body = `🚨 **Security Alert: Critical vulnerabilities detected**
            
            The security scan workflow has detected critical or high severity issues.
            
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Failed Jobs:**
            - CodeQL: ${{ needs.codeql.result }}
            - Bandit: ${{ needs.bandit.result }}
            - Safety: ${{ needs.safety.result }}
            - Trivy: ${{ needs.trivy.result }}
            
            Please review the security reports immediately.`;
            
            console.log('Critical security issues detected. Creating notification...');
            
            // Only create notification for scheduled runs to avoid noise in PRs
            if ('${{ github.event_name }}' === 'schedule') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Security Alert - ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['security', 'alert', 'automated']
              });
            }
        continue-on-error: true
