name: Discord - Make Server Public

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  make-public:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Check Bot Token Secret
        id: check-secret
        run: |
          if [ -n "${{ secrets.DISCORD_BOT_TOKEN }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
            echo "✅ Discord bot token is configured"
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "❌ DISCORD_BOT_TOKEN secret is not configured"
          fi

      - name: Fail if Secret Missing
        if: steps.check-secret.outputs.has_secret != 'true'
        run: |
          echo "❌ Required secret is not configured: DISCORD_BOT_TOKEN"
          echo "Please add this secret to your GitHub repository settings."
          exit 1

      - name: Configure Discord Server
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GUILD_ID: "1470531751595086017"
        run: |
          echo "[INFO] Configuring Discord Server..."
          echo "[INFO] Guild ID: $GUILD_ID"
          
          # Test authentication first
          echo "[INFO] Testing bot authentication..."
          AUTH_RESP=$(curl -s -X GET "https://discord.com/api/v10/users/@me" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json")
          
          if echo "$AUTH_RESP" | grep -q '"id"'; then
            BOT_NAME=$(echo "$AUTH_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('username','Unknown'))")
            echo "[OK] Authenticated as: $BOT_NAME"
          else
            echo "[ERROR] Authentication failed"
            echo "Response: $AUTH_RESP"
            exit 1
          fi
          
          # 1. Get current guild info
          echo "[INFO] Fetching current guild info..."
          GUILD_INFO=$(curl -s -X GET "https://discord.com/api/v10/guilds/$GUILD_ID" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json")
          
          if echo "$GUILD_INFO" | grep -q '"id"'; then
            GUILD_NAME=$(echo "$GUILD_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('name','Unknown'))")
            echo "[OK] Found guild: $GUILD_NAME"
          else
            echo "[ERROR] Failed to fetch guild info"
            echo "Response: $GUILD_INFO"
            exit 1
          fi
          
          # 2. Enable Community features
          echo "[INFO] Enabling Community features..."
          COMMUNITY_RESP=$(curl -s -X PATCH "https://discord.com/api/v10/guilds/$GUILD_ID" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "features": ["COMMUNITY"],
              "default_message_notifications": 0,
              "verification_level": 1,
              "explicit_content_filter": 2
            }')
          
          if echo "$COMMUNITY_RESP" | grep -q '"COMMUNITY"'; then
            echo "[OK] Community features enabled"
          else
            echo "[WARNING] Community features may already be enabled or bot lacks permissions"
            echo "Response: $COMMUNITY_RESP"
          fi
          
          # 3. Get text channels to create invite
          echo "[INFO] Fetching channels..."
          CHANNELS=$(curl -s -X GET "https://discord.com/api/v10/guilds/$GUILD_ID/channels" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json")
          
          # Find first text channel (type 0)
          TEXT_CHANNEL=$(echo "$CHANNELS" | python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin) if c.get('type') == 0][:1]" | head -1)
          
          if [ -n "$TEXT_CHANNEL" ]; then
            echo "[INFO] Found text channel: $TEXT_CHANNEL"
            
            # 4. Create permanent invite
            echo "[INFO] Creating permanent invite..."
            INVITE=$(curl -s -X POST "https://discord.com/api/v10/channels/$TEXT_CHANNEL/invites" \
              -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "max_age": 0,
                "max_uses": 0,
                "temporary": false
              }')
            
            INVITE_CODE=$(echo "$INVITE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))")
            
            if [ -n "$INVITE_CODE" ]; then
              echo "[OK] Invite created: https://discord.gg/$INVITE_CODE"
              echo "INVITE_CODE=$INVITE_CODE" >> $GITHUB_ENV
            else
              echo "[ERROR] Failed to create invite"
              echo "Response: $INVITE"
            fi
          else
            echo "[ERROR] No text channel found"
          fi
          
          echo ""
          echo "=========================================="
          echo "[OK] Discord Server Configuration Complete"
          echo "=========================================="
          echo ""
          if [ -n "$INVITE_CODE" ]; then
            echo "Invite Link: https://discord.gg/$INVITE_CODE"
          fi
          echo ""
          echo "Note: Server Discovery requires manual configuration in Discord UI."

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Discord - Make Server Public" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ env.INVITE_CODE }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Invite Link:** https://discord.gg/${{ env.INVITE_CODE }}" >> $GITHUB_STEP_SUMMARY
          fi
