name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v1.6.0
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
    
    - name: Auto-approve patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: |
        gh pr review --approve "$PR_URL"
        echo "✅ Approved patch update"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Auto-approve minor dev dependencies
      if: |
        steps.metadata.outputs.update-type == 'version-update:semver-minor' && 
        steps.metadata.outputs.dependency-type == 'direct:development'
      run: |
        gh pr review --approve "$PR_URL"
        echo "✅ Approved minor dev dependency update"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Enable auto-merge for patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: |
        gh pr merge --auto --merge "$PR_URL"
        echo "🚀 Auto-merge enabled for patch update"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Comment on major updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-major'
      run: |
        gh pr comment "$PR_URL" --body "⚠️ **Major version update detected**
        
        This update requires manual review before merging.
        
        - Package: ${{ steps.metadata.outputs.dependency-names }}
        - Previous: ${{ steps.metadata.outputs.previous-version }}
        - New: ${{ steps.metadata.outputs.new-version }}
        
        Please check for breaking changes."
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Security updates notification
      if: contains(github.event.pull_request.labels.*.name, 'security')
      run: |
        gh pr comment "$PR_URL" --body "🔒 **Security Update**
        
        This is a security-related dependency update.
        Please prioritize review and testing."
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Run tests on Dependabot PRs before auto-merging
  test:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "Some dependencies may fail"
      continue-on-error: true
    
    - name: Run syntax check
      run: |
        python -m py_compile core/orchestrator.py || echo "Syntax check completed"
        python -m py_compile zen_shield/sanitizer.py || echo "Shield check completed"
      continue-on-error: true
    
    - name: Post test results
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Tests passed - safe to merge"
        else
          echo "⚠️ Tests had issues - manual review recommended"
        fi
