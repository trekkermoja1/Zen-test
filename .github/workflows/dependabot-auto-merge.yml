name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["Python CI", "Security Scan"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  # =============================================================================
  # Dependabot Metadata & Validation
  # =============================================================================
  dependabot-metadata:
    name: Dependabot Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      dependency-type: ${{ steps.metadata.outputs.dependency-type }}
      previous-version: ${{ steps.metadata.outputs.previous-version }}
      new-version: ${{ steps.metadata.outputs.new-version }}
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
      is-renovate: ${{ steps.check.outputs.is-renovate }}
    steps:
      - name: Check bot type
        id: check
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "is-dependabot=true" >> $GITHUB_OUTPUT
            echo "is-renovate=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.actor }}" == "renovate[bot]" ]; then
            echo "is-dependabot=false" >> $GITHUB_OUTPUT
            echo "is-renovate=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Dependabot metadata
        if: steps.check.outputs.is-dependabot == 'true'
        id: metadata
        uses: dependabot/fetch-metadata@v2 # v2.2.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          alert-lookup: true
          compat-lookup: true

      - name: Parse Renovate metadata
        if: steps.check.outputs.is-renovate == 'true'
        id: renovate-metadata
        # SECURITY: PR title passed via env to prevent script injection
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract metadata from PR title for Renovate
          # Try to determine update type from title
          if echo "$PR_TITLE" | grep -q "update.*dependency"; then
            # Check for major/minor/patch in title
            if echo "$PR_TITLE" | grep -qi "major"; then
              echo "update-type=version-update:semver-major" >> $GITHUB_OUTPUT
            elif echo "$PR_TITLE" | grep -qi "minor"; then
              echo "update-type=version-update:semver-minor" >> $GITHUB_OUTPUT
            else
              echo "update-type=version-update:semver-patch" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "dependency-names=unknown" >> $GITHUB_OUTPUT
          echo "dependency-type=direct:production" >> $GITHUB_OUTPUT
        continue-on-error: true

  # =============================================================================
  # Test Dependabot PR
  # =============================================================================
  test-dependabot-pr:
    name: Test Dependabot PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [dependabot-metadata]
    if: needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "Some dependencies may fail"
        continue-on-error: true

      - name: Run syntax check
        run: |
          echo "::group::Python Syntax Check"
          python -m py_compile core/orchestrator.py || echo "Orchestrator check completed"
          python -m py_compile zen_shield/sanitizer.py || echo "Shield check completed"
          echo "::endgroup::"
        continue-on-error: true

      - name: Run quick tests
        run: |
          echo "::group::Quick Tests"
          if [ -d "tests" ]; then
            pip install pytest pytest-asyncio
            pytest tests/ -v --tb=short -x -q || echo "Tests completed with issues"
          else
            echo "No tests directory found"
          fi
          echo "::endgroup::"
        continue-on-error: true

      - name: Post test results
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Tests passed - safe to auto-merge"
          else
            echo "⚠️ Tests had issues - manual review recommended"
          fi

  # =============================================================================
  # Auto-Approve Dependabot PRs
  # =============================================================================
  auto-approve:
    name: Auto-Approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependabot-metadata, test-dependabot-pr]
    if: >
      (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true') &&
      (needs.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
       (needs.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' && 
        needs.dependabot-metadata.outputs.dependency-type == 'direct:development'))
    steps:
      - name: Approve patch updates
        if: needs.dependabot-metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr review "$PR_URL" --approve --body "✅ **Auto-approved**: Patch update passed all checks.
          
          - Update type: Patch
          - Dependencies: ${{ needs.dependabot-metadata.outputs.dependency-names }}
          - Previous: ${{ needs.dependabot-metadata.outputs.previous-version }}
          - New: ${{ needs.dependabot-metadata.outputs.new-version }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve minor dev dependencies
        if: >
          needs.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' && 
          needs.dependabot-metadata.outputs.dependency-type == 'direct:development'
        run: |
          gh pr review "$PR_URL" --approve --body "✅ **Auto-approved**: Minor dev dependency update passed all checks.
          
          - Update type: Minor (dev dependency)
          - Dependencies: ${{ needs.dependabot-metadata.outputs.dependency-names }}
          - Previous: ${{ needs.dependabot-metadata.outputs.previous-version }}
          - New: ${{ needs.dependabot-metadata.outputs.new-version }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Auto-Merge Dependabot PRs
  # =============================================================================
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependabot-metadata, test-dependabot-pr, auto-approve]
    if: >
      always() &&
      (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true') &&
      needs.test-dependabot-pr.result == 'success' &&
      (needs.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
       (needs.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' && 
        needs.dependabot-metadata.outputs.dependency-type == 'direct:development'))
    steps:
      - name: Wait for required checks
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Python CI'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success,skipped
        continue-on-error: true

      - name: Enable auto-merge for patch updates
        if: needs.dependabot-metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr merge "$PR_URL" --auto --merge --body "🚀 **Auto-merged**: Patch update.
          
          All checks passed and auto-merge was enabled."
          echo "✅ Auto-merge enabled for patch update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor dev dependencies
        if: >
          needs.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' && 
          needs.dependabot-metadata.outputs.dependency-type == 'direct:development'
        run: |
          gh pr merge "$PR_URL" --auto --merge --body "🚀 **Auto-merged**: Minor dev dependency update.
          
          All checks passed and auto-merge was enabled."
          echo "✅ Auto-merge enabled for minor dev dependency update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Handle Major Updates (Manual Review Required)
  # =============================================================================
  major-update-notify:
    name: Major Update Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependabot-metadata]
    if: >
      (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true') &&
      needs.dependabot-metadata.outputs.update-type == 'version-update:semver-major'
    steps:
      - name: Comment on major update
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update detected - Manual review required**
          
          This update requires manual review before merging.
          
          **Details:**
          - Package: ${{ needs.dependabot-metadata.outputs.dependency-names }}
          - Previous version: ${{ needs.dependabot-metadata.outputs.previous-version }}
          - New version: ${{ needs.dependabot-metadata.outputs.new-version }}
          - Update type: **MAJOR** ⚠️
          
          **Please check for:**
          - [ ] Breaking changes in the changelog
          - [ ] API compatibility
          - [ ] Deprecation warnings
          - [ ] Migration guide
          
          This PR will **NOT** be auto-merged."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add label for major update
        run: |
          gh pr edit "$PR_URL" --add-label "major-update,manual-review-required"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # =============================================================================
  # Handle Security Updates
  # =============================================================================
  security-update:
    name: Security Update Handling
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependabot-metadata]
    if: >
      (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true') &&
      contains(github.event.pull_request.labels.*.name, 'security')
    steps:
      - name: Comment on security update
        run: |
          gh pr comment "$PR_URL" --body "🔒 **Security Update - Priority Review**
          
          This is a security-related dependency update.
          
          **Please prioritize:**
          - [ ] Review the security advisory
          - [ ] Test in staging environment
          - [ ] Deploy promptly if critical
          
          **Details:**
          - Package: ${{ needs.dependabot-metadata.outputs.dependency-names }}
          - Update type: ${{ needs.dependabot-metadata.outputs.update-type }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add urgent label
        run: |
          gh pr edit "$PR_URL" --add-label "urgent,priority-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # =============================================================================
  # Failure Notification
  # =============================================================================
  failure-notification:
    name: Failure Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependabot-metadata, test-dependabot-pr]
    if: >
      always() &&
      (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true') &&
      needs.test-dependabot-pr.result == 'failure'
    steps:
      - name: Comment on test failure
        run: |
          gh pr comment "$PR_URL" --body "❌ **Dependabot PR Tests Failed**
          
          The automated tests for this dependency update have failed.
          
          **Details:**
          - Package: ${{ needs.dependabot-metadata.outputs.dependency-names }}
          - Update type: ${{ needs.dependabot-metadata.outputs.update-type }}
          
          **Next steps:**
          1. Review the test failures in the checks tab
          2. Determine if the failure is related to this update
          3. Apply fixes or close this PR if incompatible
          
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Add needs-attention label
        run: |
          gh pr edit "$PR_URL" --add-label "needs-attention,tests-failing"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # =============================================================================
  # Summary
  # =============================================================================
  dependabot-summary:
    name: Dependabot Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependabot-metadata, test-dependabot-pr, auto-approve, auto-merge]
    if: always() && (needs.dependabot-metadata.outputs.is-dependabot == 'true' || needs.dependabot-metadata.outputs.is-renovate == 'true')
    steps:
      - name: Generate Summary
        run: |
          echo "## 🤖 Dependabot Auto-Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bot:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Update Type:** ${{ needs.dependabot-metadata.outputs.update-type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** ${{ needs.dependabot-metadata.outputs.dependency-names }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Metadata | ${{ needs.dependabot-metadata.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test-dependabot-pr.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-Approve | ${{ needs.auto-approve.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-Merge | ${{ needs.auto-merge.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine action taken
          UPDATE_TYPE="${{ needs.dependabot-metadata.outputs.update-type }}"
          
          if [ "$UPDATE_TYPE" == "version-update:semver-patch" ]; then
            echo "✅ **Patch update**: Auto-approved and queued for merge if tests pass." >> $GITHUB_STEP_SUMMARY
          elif [ "$UPDATE_TYPE" == "version-update:semver-minor" ]; then
            echo "✅ **Minor update**: Auto-approved for dev dependencies, queued for merge." >> $GITHUB_STEP_SUMMARY
          elif [ "$UPDATE_TYPE" == "version-update:semver-major" ]; then
            echo "⚠️ **Major update**: Requires manual review. Auto-merge disabled." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **Update type unknown**: Manual review recommended." >> $GITHUB_STEP_SUMMARY
          fi
