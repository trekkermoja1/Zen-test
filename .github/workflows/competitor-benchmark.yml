# GitHub Actions Workflow: Monthly Competitor Benchmark
# 
# This workflow runs comprehensive benchmark comparisons against
# competitor tools (PentestGPT, AutoPentest-DRL) on a monthly basis
# and generates comparison reports.

name: Competitor Benchmark Comparison

on:
  # Run monthly on the 1st at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      competitor:
        description: 'Specific competitor to test (pentestgpt, autopentest, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - pentestgpt
          - autopentest
      test_cases:
        description: 'Test cases to run (comma-separated IDs or "all")'
        required: false
        default: 'all'
      generate_report:
        description: 'Generate comparison report'
        required: false
        default: true
        type: boolean

# Permissions for creating issues and uploading artifacts
permissions:
  contents: read
  issues: write
  actions: read
  checks: write

env:
  PYTHON_VERSION: '3.11'
  BENCHMARK_OUTPUT_DIR: 'benchmark_results'

jobs:
  # Job 1: Setup and prepare environment
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      competitors: ${{ steps.set-competitors.outputs.competitors }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml aiohttp pandas matplotlib seaborn

      - name: Set test matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.test_cases }}" == "all" ] || [ -z "${{ github.event.inputs.test_cases }}" ]; then
            echo 'matrix={"test_case":["recon_01_basic_scan","vuln_01_sql_injection","vuln_02_xss","auth_01_jwt_test","api_01_rest_scan","web_01_crawl_depth","net_01_port_scan","cloud_01_s3_check","container_01_docker_scan","report_01_pdf_gen"]}' >> $GITHUB_OUTPUT
          else
            # Parse comma-separated test cases
            TEST_CASES=$(echo "${{ github.event.inputs.test_cases }}" | tr ',' '\n' | jq -R . | jq -s . | tr -d '\n')
            echo "matrix={\"test_case\":$TEST_CASES}" >> $GITHUB_OUTPUT
          fi

      - name: Set competitors
        id: set-competitors
        run: |
          COMPETITOR="${{ github.event.inputs.competitor || 'all' }}"
          if [ "$COMPETITOR" == "all" ]; then
            echo 'competitors=["pentestgpt","autopentest"]' >> $GITHUB_OUTPUT
          else
            echo "competitors=[\"$COMPETITOR\"]" >> $GITHUB_OUTPUT
          fi

  # Job 2: Run Zen-AI-Pentest benchmarks
  benchmark-zen:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.matrix)}}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml aiohttp

      - name: Run Zen-AI-Pentest benchmark
        id: run-benchmark
        run: |
          mkdir -p ${{ env.BENCHMARK_OUTPUT_DIR }}
          python -m benchmarks.run_benchmarks \
            --test-case ${{ matrix.test_case }} \
            --tool zen-ai-pentest \
            --output ${{ env.BENCHMARK_OUTPUT_DIR }}/zen_${{ matrix.test_case }}.json
        timeout-minutes: 30

      - name: Upload Zen results
        uses: actions/upload-artifact@v4
        with:
          name: zen-results-${{ matrix.test_case }}
          path: ${{ env.BENCHMARK_OUTPUT_DIR }}/zen_${{ matrix.test_case }}.json
          retention-days: 30

  # Job 3: Run PentestGPT benchmarks
  benchmark-pentestgpt:
    needs: setup
    runs-on: ubuntu-latest
    if: contains(needs.setup.outputs.competitors, 'pentestgpt')
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.matrix)}}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml aiohttp

      - name: Check PentestGPT availability
        id: check-pentestgpt
        run: |
          # Try to install PentestGPT
          pip install pentestgpt 2>/dev/null || echo "PentestGPT not available via pip"
          
          # Check if installed
          if command -v pentestgpt &> /dev/null || python -m pentestgpt --help &> /dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::PentestGPT not available, will use simulated results"
          fi

      - name: Run PentestGPT benchmark (or simulate)
        id: run-benchmark
        run: |
          mkdir -p ${{ env.BENCHMARK_OUTPUT_DIR }}
          
          if [ "${{ steps.check-pentestgpt.outputs.available }}" == "true" ]; then
            python -m benchmarks.comparison.pentestgpt_comparison \
              --test-case ${{ matrix.test_case }} \
              --output ${{ env.BENCHMARK_OUTPUT_DIR }}/pentestgpt_${{ matrix.test_case }}.json
          else
            # Generate simulated results based on known capabilities
            python scripts/analyze_competitors.py \
              --competitor pentestgpt \
              --test-case ${{ matrix.test_case }} \
              --mode simulate \
              --output ${{ env.BENCHMARK_OUTPUT_DIR }}/pentestgpt_${{ matrix.test_case }}.json
          fi
        timeout-minutes: 30
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload PentestGPT results
        uses: actions/upload-artifact@v4
        with:
          name: pentestgpt-results-${{ matrix.test_case }}
          path: ${{ env.BENCHMARK_OUTPUT_DIR }}/pentestgpt_${{ matrix.test_case }}.json
          retention-days: 30

  # Job 4: Run AutoPentest-DRL benchmarks
  benchmark-autopentest:
    needs: setup
    runs-on: ubuntu-latest
    if: contains(needs.setup.outputs.competitors, 'autopentest')
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.matrix)}}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml aiohttp

      - name: Check AutoPentest availability
        id: check-autopentest
        run: |
          # Check if AutoPentest-DRL is available
          if [ -d "/opt/AutoPentest-DRL" ] || [ -d "$HOME/AutoPentest-DRL" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::AutoPentest-DRL not available, will use simulated results"
          fi

      - name: Run AutoPentest benchmark (or simulate)
        id: run-benchmark
        run: |
          mkdir -p ${{ env.BENCHMARK_OUTPUT_DIR }}
          
          if [ "${{ steps.check-autopentest.outputs.available }}" == "true" ]; then
            python -m benchmarks.comparison.autopentest_comparison \
              --test-case ${{ matrix.test_case }} \
              --output ${{ env.BENCHMARK_OUTPUT_DIR }}/autopentest_${{ matrix.test_case }}.json
          else
            # Generate simulated results based on known capabilities
            python scripts/analyze_competitors.py \
              --competitor autopentest \
              --test-case ${{ matrix.test_case }} \
              --mode simulate \
              --output ${{ env.BENCHMARK_OUTPUT_DIR }}/autopentest_${{ matrix.test_case }}.json
          fi
        timeout-minutes: 45

      - name: Upload AutoPentest results
        uses: actions/upload-artifact@v4
        with:
          name: autopentest-results-${{ matrix.test_case }}
          path: ${{ env.BENCHMARK_OUTPUT_DIR }}/autopentest_${{ matrix.test_case }}.json
          retention-days: 30

  # Job 5: Generate comparison report
  generate-report:
    needs: [setup, benchmark-zen, benchmark-pentestgpt, benchmark-autopentest]
    runs-on: ubuntu-latest
    if: always() && (needs.benchmark-zen.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas matplotlib seaborn jinja2

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.BENCHMARK_OUTPUT_DIR }}
          pattern: '*-results-*'

      - name: Generate comparison report
        run: |
          python scripts/analyze_competitors.py \
            --mode compare \
            --results-dir ${{ env.BENCHMARK_OUTPUT_DIR }} \
            --output ${{ env.BENCHMARK_OUTPUT_DIR }}/comparison_report.md \
            --template benchmarks/reports/comparison_template.md

      - name: Generate visualizations
        run: |
          python scripts/analyze_competitors.py \
            --mode visualize \
            --results-dir ${{ env.BENCHMARK_OUTPUT_DIR }} \
            --output-dir ${{ env.BENCHMARK_OUTPUT_DIR }}/charts

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report
          path: |
            ${{ env.BENCHMARK_OUTPUT_DIR }}/comparison_report.md
            ${{ env.BENCHMARK_OUTPUT_DIR }}/charts/
          retention-days: 90

      - name: Create GitHub Issue with results
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ env.BENCHMARK_OUTPUT_DIR }}/comparison_report.md';
            
            let reportContent = '';
            try {
              reportContent = fs.readFileSync(reportPath, 'utf8');
              // Truncate if too long for issue body
              if (reportContent.length > 60000) {
                reportContent = reportContent.substring(0, 60000) + '\n\n... (truncated)';
              }
            } catch (error) {
              reportContent = 'Report generation failed. Check workflow artifacts.';
            }
            
            const issueBody = `## Monthly Competitor Benchmark Results
            
            **Date:** ${new Date().toISOString()}
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### Summary
            
            Automated benchmark comparison completed. Full results available in workflow artifacts.
            
            ### Detailed Report
            
            ${reportContent}
            
            ---
            *This issue was automatically generated by the Competitor Benchmark workflow.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Competitor Benchmark Results - ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['benchmark', 'automation', 'competitor-analysis']
            });

      - name: Update benchmark badge data
        run: |
          # Update benchmark status for README badge
          python scripts/analyze_competitors.py \
            --mode badge \
            --results-dir ${{ env.BENCHMARK_OUTPUT_DIR }} \
            --output .github/benchmark-status.json

      - name: Commit badge data
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/benchmark-status.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update benchmark status [skip ci]"
          git push

  # Job 6: Notify on completion
  notify:
    needs: [setup, benchmark-zen, benchmark-pentestgpt, benchmark-autopentest, generate-report]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#security-benchmarks'
          text: |
            Competitor Benchmark Workflow Completed
            
            Status: ${{ needs.generate-report.result }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Results:
            - Zen-AI-Pentest: ${{ needs.benchmark-zen.result }}
            - PentestGPT: ${{ needs.benchmark-pentestgpt.result }}
            - AutoPentest: ${{ needs.benchmark-autopentest.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''

  # Job 7: Cleanup old artifacts
  cleanup:
    needs: [generate-report]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Delete old workflow artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: '*-results-*'
          failOnError: false
          useGlob: true
