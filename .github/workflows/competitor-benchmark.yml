# GitHub Actions Workflow: Monthly Competitor Benchmark
# 
# This workflow runs comprehensive benchmark comparisons against
# competitor tools (PentestGPT, AutoPentest-DRL) on a monthly basis
# and generates comparison reports.

name: Competitor Benchmark Comparison

on:
  # Run monthly on the 1st at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
