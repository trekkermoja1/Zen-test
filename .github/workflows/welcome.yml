name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            
            // Check if this is the user's first issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all'
            });
            
            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `👋 Welcome @${creator}! Thanks for opening your first issue in Zen AI Pentest!
            
            We'll review it soon. In the meantime, please make sure you've:
            - Checked our [Contributing Guide](CONTRIBUTING.md)
            - Reviewed our [Code of Conduct](CODE_OF_CONDUCT.md)
            
            Thanks for helping make Zen AI Pentest better! 🚀`
              });
            }
            
      - name: Welcome PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const creator = pr.user.login;
            
            // Check if this is the user's first PR
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            
            const userPrs = prs.data.filter(p => p.user.login === creator);
            
            if (userPrs.length === 1) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🎉 Welcome @${creator}! Thanks for your first contribution to Zen AI Pentest!
            
            We appreciate your help! Our team will review your PR soon. Please ensure:
            - All CI checks pass
            - PR follows our [Contributing Guide](CONTRIBUTING.md)
            - Code is properly tested
            
            Thanks for being part of our community! 💪`
              });
            }
