name: Update Repository Status Card

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0  # Full history for stats

    - name: Generate Status Card (SVG)
      run: |
        chmod +x scripts/generate_status_card.sh
        ./scripts/generate_status_card.sh

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Check if there are changes
        if git diff --quiet HEAD -- docs/status/repo_status_card.svg 2>/dev/null; then
          echo "No changes to status card"
          exit 0
        fi
        
        git add docs/status/repo_status_card.svg
        git commit -m "docs(status): auto-update repository status card [skip ci]" || echo "No changes to commit"
        git push || echo "Nothing to push"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
