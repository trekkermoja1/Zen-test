name: Discord Bot Integration

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Check Discord webhook
      run: |
        if [ -z "${DISCORD_WEBHOOK}" ]; then
          echo "⚠️ DISCORD_WEBHOOK not set - skipping notification"
          echo "To enable: Settings > Secrets > DISCORD_WEBHOOK"
          exit 0
        fi
        echo "✅ Discord webhook configured"
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    
    - name: Send notification (if configured)
      run: |
        if [ -n "${DISCORD_WEBHOOK}" ]; then
          curl -H "Content-Type: application/json" \
               -d '{"content":"🚀 Push to main branch"}' \
               "${DISCORD_WEBHOOK}" || echo "Discord send failed"
        fi
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      continue-on-error: true
    
    - name: Summary
      run: |
        echo "✅ Discord bot check completed"
