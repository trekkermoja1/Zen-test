name: Discord GitHub Notifications

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  issues:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: ["CI/CD Pipeline", "Test Coverage", "Security Scan"]
    types: [completed]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Check Discord Webhook Secret
        id: check-secret
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
            echo "✅ Discord webhook secret is configured"
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "⚠️ DISCORD_WEBHOOK_URL secret is not configured"
            echo "   To enable notifications, add DISCORD_WEBHOOK_URL to GitHub Secrets"
          fi

      - name: Skip Notification (No Secret)
        if: steps.check-secret.outputs.has_secret != 'true'
        run: |
          echo "⏭️ Skipping Discord notification - webhook not configured"
          echo "   This is not an error. To enable notifications:"
          echo "   1. Go to Discord → Server Settings → Integrations → Webhooks"
          echo "   2. Create a new webhook and copy the URL"
          echo "   3. Go to GitHub → Settings → Secrets → New repository secret"
          echo "   4. Name: DISCORD_WEBHOOK_URL"
          echo "   5. Value: Your Discord webhook URL"

      - name: Setup Python
        if: steps.check-secret.outputs.has_secret == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send Discord Notification
        if: steps.check-secret.outputs.has_secret == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          # Push event
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          SUSPICIOUS: ${{ steps.secret-scan.outputs.suspicious }}
          # PR event
          PR_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Issue event
          ISSUE_ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          # Workflow run event
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          # Release event
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          python scripts/send_discord_notification.py

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Discord GitHub Notifications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check-secret.outputs.has_secret }}" == "true" ]; then
            echo "✅ Discord webhook is configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Discord webhook is NOT configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable notifications:" >> $GITHUB_STEP_SUMMARY
            echo '1. Go to Discord → Server Settings → Integrations → Webhooks' >> $GITHUB_STEP_SUMMARY
            echo '2. Create a new webhook and copy the URL' >> $GITHUB_STEP_SUMMARY
            echo '3. Go to GitHub → Settings → Secrets → New repository secret' >> $GITHUB_STEP_SUMMARY
            echo '4. Name: `DISCORD_WEBHOOK_URL`' >> $GITHUB_STEP_SUMMARY
            echo '5. Value: Your Discord webhook URL' >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
