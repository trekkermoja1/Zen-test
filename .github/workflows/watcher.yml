name: Watcher - Monitor GitHub Actions Health

on:
  schedule:
    # Run every hour (reduced from 20min to avoid GitHub rate limits)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent workflow runs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get recent workflow runs
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 10
            });
            
            let failedRuns = [];
            let needsAttention = [];
            
            for (const run of runs.data.workflow_runs) {
              // Skip this watcher workflow
              if (run.name === 'Watcher - Monitor GitHub Actions Health') continue;
              
              // Check runs from last 30 minutes
              const runDate = new Date(run.created_at);
              const thirtyMinutesAgo = new Date(Date.now() - 30 * 60 * 1000);
              
              if (runDate > thirtyMinutesAgo) {
                if (run.conclusion === 'failure') {
                  failedRuns.push({
                    name: run.name,
                    id: run.id,
                    url: run.html_url,
                    branch: run.head_branch,
                    time: run.created_at
                  });
                } else if (run.status === 'in_progress' && run.run_started_at) {
                  const startTime = new Date(run.run_started_at);
                  const runningMinutes = (Date.now() - startTime) / 1000 / 60;
                  
                  // Flag if running longer than 15 minutes
                  if (runningMinutes > 15) {
                    needsAttention.push({
                      name: run.name,
                      id: run.id,
                      url: run.html_url,
                      runningMinutes: Math.round(runningMinutes)
                    });
                  }
                }
              }
            }
            
            // Create summary
            let summary = '## GitHub Actions Health Check\n\n';
            summary += `**Checked at:** ${new Date().toISOString()}\n\n`;
            
            if (failedRuns.length === 0 && needsAttention.length === 0) {
              summary += '✅ All workflows healthy!\n';
            } else {
              if (failedRuns.length > 0) {
                summary += `### ❌ Failed Runs (${failedRuns.length})\n`;
                failedRuns.forEach(run => {
                  summary += `- **${run.name}** ([#${run.id}](${run.url})) on ${run.branch}\n`;
                });
                summary += '\n';
              }
              
              if (needsAttention.length > 0) {
                summary += `### ⚠️ Long Running (${needsAttention.length})\n`;
                needsAttention.forEach(run => {
                  summary += `- **${run.name}** running for ${run.runningMinutes}m ([#${run.id}](${run.url}))\n`;
                });
              }
            }
            
            core.summary.addRaw(summary);
            await core.summary.write();
            
            // Set outputs for potential notifications
            core.setOutput('failed_count', String(failedRuns.length));
            core.setOutput('attention_count', String(needsAttention.length));
            core.setOutput('failed_runs', JSON.stringify(failedRuns));
            
            // Create annotation if failures found
            if (failedRuns.length > 0) {
              core.warning(`${failedRuns.length} workflow(s) failed in the last 30 minutes`);
            }

      - name: Send Discord notification on failure
        if: steps.check.outputs.failed_count > 0
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚨 **Zen AI Pentest - Workflow Failure Detected**
            
            ${{ steps.check.outputs.failed_count }} workflow(s) failed in the last 30 minutes.
            
            Check: https://github.com/${{ github.repository }}/actions
        continue-on-error: true

      - name: Auto-retry failed workflows (optional)
        if: steps.check.outputs.failed_count > 0 && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const failedRuns = JSON.parse('${{ steps.check.outputs.failed_runs }}' || '[]');
            
            for (const run of failedRuns.slice(0, 3)) { // Max 3 retries
              console.log(`Retrying workflow: ${run.name} (${run.id})`);
              
              try {
                await github.rest.actions.reRunWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id
                });
                console.log(`✅ Retry triggered for ${run.name}`);
              } catch (error) {
                console.log(`❌ Failed to retry ${run.name}: ${error.message}`);
              }
            }
        continue-on-error: true
