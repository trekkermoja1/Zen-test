# Telegram Notifications for Zen-AI-Pentest
# Sends build status, security alerts, and deployment notifications to Telegram

name: Telegram Notifications

on:
  # DISABLED: Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets
  # workflow_run:
  #   workflows: ["Python application", "Repository Health Check"]
  #   types: [completed]
  # push:
  #   branches: [master, main]
  # issues:
  #   types: [opened, closed, reopened]
  # pull_request:
  #   types: [opened, closed, reopened]
  workflow_dispatch:
    inputs:
      message:
        description: 'Test message'
        required: false
        default: 'Test notification from Zen-AI-Pentest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # SECURITY: All event data passed via env to prevent script injection
      EVENT_NAME: ${{ github.event_name }}
      # Workflow run event
      WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
      WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
      # Issues event
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_URL: ${{ github.event.issue.html_url }}
      ISSUE_ACTION: ${{ github.event.action }}
      # PR event
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_ACTION: ${{ github.event.action }}
      # Workflow dispatch
      INPUT_MESSAGE: ${{ github.event.inputs.message }}
      # Common
      REPO: ${{ github.repository }}
      ACTOR: ${{ github.actor }}
      REF_NAME: ${{ github.ref_name }}
    
    steps:
      - name: Send Telegram Notification
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          # Determine notification type and message
          if [ "$EVENT_NAME" == "workflow_run" ]; then
            if [ "$WORKFLOW_CONCLUSION" == "success" ]; then
              STATUS="✅ SUCCESS"
            elif [ "$WORKFLOW_CONCLUSION" == "failure" ]; then
              STATUS="❌ FAILED"
            else
              STATUS="⚠️ $WORKFLOW_CONCLUSION"
            fi
            
            MESSAGE="<b>Workflow $STATUS</b> - Name: $WORKFLOW_NAME, Branch: $WORKFLOW_BRANCH, Repo: $REPO - $WORKFLOW_URL"
          
          elif [ "$EVENT_NAME" == "issues" ]; then
            if [ "$ISSUE_ACTION" == "opened" ]; then
              ICON="📋"
            elif [ "$ISSUE_ACTION" == "closed" ]; then
              ICON="✅"
            else
              ICON="📝"
            fi
            
            MESSAGE="<b>$ICON Issue $ISSUE_ACTION</b> - $ISSUE_TITLE - $REPO - $ISSUE_URL"
          
          elif [ "$EVENT_NAME" == "pull_request" ]; then
            if [ "$PR_ACTION" == "opened" ]; then
              ICON="🔀"
            elif [ "$PR_ACTION" == "closed" ]; then
              ICON="✅"
            else
              ICON="📝"
            fi
            
            MESSAGE="<b>$ICON PR $PR_ACTION</b> - $PR_TITLE - $REPO - $PR_URL"
          
          elif [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            MESSAGE="<b>🧪 Test Notification</b> - $INPUT_MESSAGE - $REPO by $ACTOR"
          
          else
            MESSAGE="<b>🔔 Repository Event</b> - $EVENT_NAME - $REPO - $REF_NAME by $ACTOR"
          fi
          
          # Send Telegram message
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
      
      - name: Skip Notification (No Secrets)
        if: ${{ env.TELEGRAM_BOT_TOKEN == '' || env.TELEGRAM_CHAT_ID == '' }}
        run: |
          echo "Telegram secrets not configured. Skipping notification."
          echo "To enable: Add TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID to repository secrets."
