# Telegram Notifications for Zen-AI-Pentest
# Sends build status, security alerts, and deployment notifications to Telegram

name: Telegram Notifications

on:
  workflow_run:
    workflows: ["Python application", "Repository Health Check", "CI/CD Pipeline", "Test Coverage"]
    types: [completed]
  push:
    branches: [master, main]
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  workflow_dispatch:
    inputs:
      message:
        description: 'Test message'
        required: false
        default: 'Test notification from Zen-AI-Pentest'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run if secrets are configured or it's a workflow_dispatch
    if: |
      always() && 
      (github.event_name == 'workflow_dispatch' || 
       secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check Secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "TELEGRAM_BOT_TOKEN is not set"
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "TELEGRAM_BOT_TOKEN is set"
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi
          
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "TELEGRAM_CHAT_ID is not set"
            echo "has_chat_id=false" >> $GITHUB_OUTPUT
          else
            echo "TELEGRAM_CHAT_ID is set"
            echo "has_chat_id=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram Notification
        if: steps.check_secrets.outputs.has_token == 'true' && steps.check_secrets.outputs.has_chat_id == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Determine notification type and message
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            URL="${{ github.event.workflow_run.html_url }}"
            
            if [ "$CONCLUSION" == "success" ]; then
              STATUS="✅ SUCCESS"
            elif [ "$CONCLUSION" == "failure" ]; then
              STATUS="❌ FAILED"
            else
              STATUS="⚠️ $CONCLUSION"
            fi
            
            MESSAGE="<b>Workflow $STATUS</b>%0AName: $WORKFLOW_NAME%0ABranch: $BRANCH%0ARepo: ${{ github.repository }}%0A$URL"
          
          elif [ "${{ github.event_name }}" == "issues" ]; then
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_URL="${{ github.event.issue.html_url }}"
            ACTION="${{ github.event.action }}"
            
            if [ "$ACTION" == "opened" ]; then
              ICON="📋"
            elif [ "$ACTION" == "closed" ]; then
              ICON="✅"
            else
              ICON="📝"
            fi
            
            MESSAGE="<b>$ICON Issue $ACTION</b>%0A$ISSUE_TITLE%0A${{ github.repository }}%0A$ISSUE_URL"
          
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            ACTION="${{ github.event.action }}"
            
            if [ "$ACTION" == "opened" ]; then
              ICON="🔀"
            elif [ "$ACTION" == "closed" ]; then
              ICON="✅"
            else
              ICON="📝"
            fi
            
            MESSAGE="<b>$ICON PR $ACTION</b>%0A$PR_TITLE%0A${{ github.repository }}%0A$PR_URL"
          
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MESSAGE="<b>🧪 Test Notification</b>%0A${{ github.event.inputs.message }}%0A${{ github.repository }} by ${{ github.actor }}"
          
          else
            MESSAGE="<b>🔔 Repository Event</b>%0A${{ github.event_name }}%0A${{ github.repository }}%0A${{ github.ref_name }} by ${{ github.actor }}"
          fi
          
          # URL encode the message properly
          ENCODED_MESSAGE=$(echo "$MESSAGE" | sed 's/&/%26/g')
          
          # Send Telegram message with error handling
          echo "Sending Telegram notification..."
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${ENCODED_MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -w "\n%{http_code}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Telegram API error (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          else
            echo "✅ Telegram notification sent successfully"
          fi
      
      - name: Skip Notification (No Secrets)
        if: steps.check_secrets.outputs.has_token != 'true' || steps.check_secrets.outputs.has_chat_id != 'true'
        run: |
          echo "⚠️ Telegram secrets not configured. Skipping notification."
          echo "To enable: Add TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID to repository secrets."
          echo "Setup guide: https://core.telegram.org/bots/tutorial"
