name: Auto-Fix Common Issues

on:
  workflow_run:
    workflows: ["Python Application - Test & Lint"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      issue_type:
        description: 'Type of issue to fix'
        required: true
        default: 'linting'
        type: choice
        options:
          - linting
          - formatting
          - line-endings
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Auto-Fix
        run: |
          echo "Auto-fixing issues..."
          echo "Type: ${{ github.event.inputs.issue_type || 'all' }}"
          echo "✅ Auto-fix completed (dry-run mode)"
