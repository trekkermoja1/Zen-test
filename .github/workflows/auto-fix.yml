name: Auto-Fix Common Issues

on:
  workflow_run:
    workflows: ["Python Application - Test & Lint"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      issue_type:
        description: 'Type of issue to fix'
        required: true
        default: 'linting'
        type: choice
        options:
          - linting
          - formatting
          - line-endings
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
