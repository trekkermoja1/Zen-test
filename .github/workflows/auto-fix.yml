name: Auto-Fix Common Issues

on:
  workflow_run:
    workflows: ["Python CI", "CI/CD Pipeline (Improved)"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      issue_type:
        description: 'Type of issue to fix'
        required: true
        default: 'linting'
        type: choice
        options:
          - linting
          - formatting
          - line-endings
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Setup Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'
      
      - name: Run Auto-Fix
        run: |
          echo "Running auto-fix for: ${{ github.event.inputs.issue_type || 'all' }}"
          pip install black isort autopep8
          black --check . || true
