name: Auto-Fix Common Issues

on:
  workflow_run:
    workflows: ["Python Application - Test & Lint"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      issue_type:
        description: 'Type of issue to fix'
        required: true
        default: 'linting'
        type: choice
        options:
          - linting
          - formatting
          - line-endings
          - all

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install fix tools
        run: |
          pip install black isort autopep8
          
      - name: Fix line endings
        if: github.event.inputs.issue_type == 'line-endings' || github.event.inputs.issue_type == 'all' || github.event_name == 'workflow_run'
        run: |
          # Convert CRLF to LF
          find . -type f -name "*.py" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.yml" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.yaml" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.json" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.md" -exec sed -i 's/\r$//' {} +
          echo "Line endings fixed"
          
      - name: Fix Python formatting with black
        if: github.event.inputs.issue_type == 'formatting' || github.event.inputs.issue_type == 'all' || github.event_name == 'workflow_run'
        run: |
          black . --exclude="venv|env|__pycache__|.git" || true
          echo "Python formatting fixed"
          
      - name: Fix imports with isort
        if: github.event.inputs.issue_type == 'formatting' || github.event.inputs.issue_type == 'all' || github.event_name == 'workflow_run'
        run: |
          isort . --skip=venv --skip=env --skip=__pycache__ || true
          echo "Import sorting fixed"
          
      - name: Fix basic linting issues
        if: github.event.inputs.issue_type == 'linting' || github.event.inputs.issue_type == 'all'
        run: |
          autopep8 --in-place --recursive --max-line-length=127 \
            --exclude="venv,env,__pycache__,.git" . || true
          echo "Basic linting issues fixed"
          
      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff --stat
          fi
          
      - name: Commit and push fixes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Auto-fix: Resolve code style issues [skip ci]"
          git push
          
      - name: Create PR if protected branch
        if: steps.check-changes.outputs.changed == 'true' && failure()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-fix: Resolve code style issues"
          title: "🤖 Auto-fix: Code style issues"
          body: |
            This PR contains automatic fixes for code style issues:
            - Line ending normalization
            - Python formatting (black)
            - Import sorting (isort)
            
            Generated by GitHub Actions
          branch: auto-fix/style-issues
          delete-branch: true
