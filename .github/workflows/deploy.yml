name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # Build and test before deploy
  pre-deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run all tests
        run: |
          pip install -r requirements.txt
          pytest tests/ -v
        env:
          JWT_SECRET_KEY: test
          ADMIN_PASSWORD: test

      - name: Security scan
        run: |
          pip install bandit
          bandit -r . -ll

  # Deploy to staging
  deploy-staging:
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || github.event_name == 'release'
    environment:
      name: staging
      url: https://staging.pentest.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # e.g., ssh, kubectl, docker-compose, etc.

  # Deploy to production (manual only)
  deploy-production:
    needs: [pre-deploy-check, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://pentest.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
