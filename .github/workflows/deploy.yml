name: Deploy (Improved)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'release' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  deployments: write

jobs:
  # =============================================================================
  # Pre-Deploy Checks
  # =============================================================================
  pre-deploy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "=== Debug Info ==="
          echo "PWD: $(pwd)"
          ls -la
          echo "=================="

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit

      - name: Run all tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true
        env:
          JWT_SECRET_KEY: test-secret-key
          ADMIN_PASSWORD: testpass
          DATABASE_URL: sqlite:///./test.db

      - name: Security scan
        run: |
          bandit -r . -ll

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-logs
          path: |
            logs/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  # =============================================================================
  # Deploy to Staging
  # =============================================================================
  deploy-staging:
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.environment == 'staging' || github.event_name == 'release'
    environment:
      name: staging
      url: https://staging.pentest.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "=== Deploy to Staging ==="
          echo "PWD: $(pwd)"
          ls -la
          echo "========================"

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # e.g., ssh, kubectl, docker-compose, etc.

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-staging-logs
          path: |
            logs/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    needs: [pre-deploy-check, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://pentest.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "=== Deploy to Production ==="
          echo "PWD: $(pwd)"
          ls -la
          echo "============================"

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here

      - name: Notify deployment
        uses: 8398a7/action-slack@v3 # v3.15.0
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-production-logs
          path: |
            logs/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  # =============================================================================
  # Deploy Summary
  # =============================================================================
  deploy-summary:
    needs: [pre-deploy-check, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Generate Deploy Summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-Deploy Checks | ${{ needs.pre-deploy-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
