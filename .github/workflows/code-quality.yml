name: Code Quality

on:
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'setup.cfg'
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'setup.cfg'
  workflow_dispatch:
    inputs:
      fix:
        description: 'Attempt to auto-fix issues'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # =============================================================================
  # Pre-commit Checks Simulation
  # =============================================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install pre-commit
        run: |
          pip install pre-commit

      - name: Check for pre-commit config
        id: check_config
        run: |
          if [ -f ".pre-commit-config.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pre-commit
        if: steps.check_config.outputs.exists == 'true'
        run: |
          echo "::group::Running Pre-commit"
          pre-commit run --all-files --show-diff-on-failure || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Manual pre-commit checks
        if: steps.check_config.outputs.exists == 'false'
        run: |
          echo "::group::Running Manual Pre-commit Checks"
          
          # Check for trailing whitespace
          if grep -rI '[[:space:]]$' --include="*.py" --include="*.md" --include="*.yml" --include="*.yaml" --include="*.json" . 2>/dev/null | grep -v ".git"; then
            echo "::warning::Trailing whitespace found"
          else
            echo "✅ No trailing whitespace"
          fi
          
          # Check for merge conflict markers
          if grep -rI "<<<<<<< HEAD\|=======\|>>>>>>>" --include="*.py" --include="*.md" --include="*.yml" --include="*.yaml" . 2>/dev/null | grep -v ".git"; then
            echo "::error::Merge conflict markers found!"
            exit 1
          else
            echo "✅ No merge conflict markers"
          fi
          
          # Check for debug statements
          if grep -rI "pdb.set_trace\|breakpoint()\|console.log\|debugger;" --include="*.py" --include="*.js" . 2>/dev/null | grep -v ".git" | grep -v "venv"; then
            echo "::warning::Debug statements found"
          else
            echo "✅ No debug statements"
          fi
          
          echo "::endgroup::"
        continue-on-error: true

  # =============================================================================
  # Black Formatting Check
  # =============================================================================
  black:
    name: Black Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Black
        run: |
          pip install black==24.1.1

      - name: Check Black formatting
        id: black_check
        run: |
          echo "::group::Black Format Check"
          black --check --diff --color . 2>&1 | tee black-output.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Black output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: black-output
          path: black-output.txt
          retention-days: 7

      - name: Comment on PR (if failed)
        if: steps.black_check.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## 🎨 Black Formatting Check
            
            ❌ **Formatting issues detected!**
            
            Please run the following command to fix formatting:
            \`\`\`bash
            pip install black==24.1.1
            black .
            \`\`\`
            
            Or enable the auto-fix workflow by re-running with "fix" option enabled.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        continue-on-error: true

  # =============================================================================
  # isort Import Sorting Check
  # =============================================================================
  isort:
    name: isort Import Sorting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install isort
        run: |
          pip install isort==5.13.2

      - name: Check isort
        id: isort_check
        run: |
          echo "::group::isort Check"
          isort --check-only --diff --color . 2>&1 | tee isort-output.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload isort output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: isort-output
          path: isort-output.txt
          retention-days: 7

      - name: Comment on PR (if failed)
        if: steps.isort_check.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## 📦 isort Import Sorting Check
            
            ❌ **Import sorting issues detected!**
            
            Please run the following command to fix imports:
            \`\`\`bash
            pip install isort==5.13.2
            isort .
            \`\`\``;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        continue-on-error: true

  # =============================================================================
  # Flake8 Linting
  # =============================================================================
  flake8:
    name: Flake8 Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Flake8
        run: |
          pip install flake8==7.0.0 flake8-docstrings flake8-bugbear

      - name: Run Flake8
        id: flake8_check
        run: |
          echo "::group::Flake8 Linting"
          
          # Critical errors (syntax, undefined names)
          echo "Checking for critical errors..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # All other issues (as warnings)
          echo "Checking style issues..."
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 \
            --statistics --format=json --output-file=flake8-report.json \
            --exclude=venv,env,__pycache__,.git,logs,evidence,dist,build,.tox,.pytest_cache || true
          
          # Generate text report
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 \
            --statistics --exclude=venv,env,__pycache__,.git,logs,evidence,dist,build,.tox,.pytest_cache \
            > flake8-output.txt 2>&1 || true
          
          cat flake8-output.txt
          echo "::endgroup::"

      - name: Upload Flake8 report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flake8-report
          path: |
            flake8-report.json
            flake8-output.txt
          retention-days: 7

      - name: Annotate Flake8 results
        if: always()
        run: |
          if [ -f flake8-report.json ]; then
            echo "Flake8 issues found. See artifact for details."
          fi

  # =============================================================================
  # MyPy Type Checking
  # =============================================================================
  mypy:
    name: MyPy Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install MyPy
        run: |
          pip install mypy==1.8.0
          pip install -r requirements.txt || true

      - name: Run MyPy
        id: mypy_check
        run: |
          echo "::group::MyPy Type Check"
          
          mypy core/ agents/ backends/ modules/ \
            --ignore-missing-imports \
            --show-error-codes \
            --show-column-numbers \
            --pretty \
            --no-error-summary \
            2>&1 | tee mypy-output.txt || true
          
          # Also generate JSON report
          mypy core/ agents/ backends/ modules/ \
            --ignore-missing-imports \
            --show-error-codes \
            --output json \
            > mypy-report.json 2>/dev/null || true
          
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload MyPy report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mypy-report
          path: |
            mypy-output.txt
            mypy-report.json
          retention-days: 7

      - name: MyPy Summary
        if: always()
        run: |
          echo "## 📝 MyPy Type Check Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f mypy-output.txt ]; then
            ERRORS=$(grep -c "error:" mypy-output.txt || echo "0")
            echo "Type errors found: $ERRORS" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Code Complexity Analysis
  # =============================================================================
  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install tools
        run: |
          pip install radon xenon

      - name: Analyze complexity
        run: |
          echo "::group::Code Complexity Analysis"
          
          # Raw metrics
          echo "=== Raw Metrics ==="
          radon raw . --exclude "venv,env,.venv,__pycache__,.git,logs,evidence" --json > radon-raw.json || true
          
          # Cyclomatic complexity
          echo "=== Cyclomatic Complexity ==="
          radon cc . --exclude "venv,env,.venv,__pycache__,.git,logs,evidence" -a -s --json > radon-cc.json || true
          radon cc . --exclude "venv,env,.venv,__pycache__,.git,logs,evidence" -a -s > radon-cc.txt || true
          
          # Maintainability index
          echo "=== Maintainability Index ==="
          radon mi . --exclude "venv,env,.venv,__pycache__,.git,logs,evidence" --json > radon-mi.json || true
          radon mi . --exclude "venv,env,.venv,__pycache__,.git,logs,evidence" > radon-mi.txt || true
          
          # Check for high complexity
          echo "=== High Complexity Files ==="
          xenon . --max-absolute B --max-modules A --max-average A 2>&1 | tee xenon-output.txt || true
          
          cat radon-cc.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload complexity reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: complexity-reports
          path: |
            radon-*.json
            radon-*.txt
            xenon-output.txt
          retention-days: 30

  # =============================================================================
  # Auto-Fix (Optional)
  # =============================================================================
  auto-fix:
    name: Auto-Fix Code Issues
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [black, isort, flake8]
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.fix == 'true' &&
      github.ref != 'refs/heads/main' &&
      github.ref != 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install tools
        run: |
          pip install black==24.1.1 isort==5.13.2 autoflake

      - name: Auto-fix issues
        run: |
          echo "::group::Auto-fixing issues"
          
          # Remove unused imports
          autoflake --remove-all-unused-imports --recursive --in-place . \
            --exclude "venv,env,__pycache__,.git,logs,evidence" || true
          
          # Format with Black
          black . || true
          
          # Sort imports with isort
          isort . || true
          
          echo "::endgroup::"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "style: auto-fix code formatting [skip ci]"
          git push

  # =============================================================================
  # Code Quality Summary
  # =============================================================================
  quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pre-commit, black, isort, flake8, mypy, complexity]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🎨 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit | ${{ needs.pre-commit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Black Formatting | ${{ needs.black.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| isort Import Sorting | ${{ needs.isort.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flake8 Linting | ${{ needs.flake8.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MyPy Type Check | ${{ needs.mypy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity Analysis | ${{ needs.complexity.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count failures
          FAILURES=0
          for result in "${{ needs.black.result }}" "${{ needs.isort.result }}" "${{ needs.flake8.result }}"; do
            if [ "$result" == "failure" ]; then
              FAILURES=$((FAILURES + 1))
            fi
          done
          
          if [ $FAILURES -eq 0 ]; then
            echo "✅ All code quality checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ $FAILURES code quality check(s) failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔧 How to fix:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "# Install tools" >> $GITHUB_STEP_SUMMARY
            echo "pip install black==24.1.1 isort==5.13.2 flake8==7.0.0" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "# Auto-fix formatting" >> $GITHUB_STEP_SUMMARY
            echo "black ." >> $GITHUB_STEP_SUMMARY
            echo "isort ." >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Detailed reports available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
