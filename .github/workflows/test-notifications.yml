name: Test Notifications

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Notification channel'
        required: false
        default: 'email'
        type: choice
        options:
          - email
          - slack
          - discord

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Test ${{ github.event.inputs.channel || 'email' }} notification
        run: |
          echo "Testing ${{ github.event.inputs.channel || 'email' }} notifications..."
          echo "Notification test completed"
