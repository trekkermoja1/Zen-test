name: Test Notifications

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test'
        required: true
        default: 'both'
        type: choice
        options:
          - slack
          - discord
          - both

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
