name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create required directories
        run: |
          mkdir -p logs
          mkdir -p evidence

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build package
        run: |
          python -m build || echo "Build may require setup.py"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Zen AI Pentest - Release ${{ github.ref_name }}
            
            ### Features
            - Multi-LLM Support (DuckDuckGo, OpenRouter, ChatGPT, Claude)
            - CVE Database with 1000+ entries
            - SQL Injection Payload Library (48+ payloads)
            - Ransomware IOC Database (7 families)
            - Multi-Agent Collaboration System
            - Nuclei Template Integration
            - **Post-Scan Workflow (NEW)** - 8-phase PTES methodology
            
            ### Installation
            ```bash
            pip install -r requirements.txt
            ```
            
            ### Usage
            ```bash
            python -m zen_ai_pentest --help
            ```
            
            See [README.md](README.md) for full documentation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        if: hashFiles('dist/*') != ''
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
