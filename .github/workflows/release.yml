name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write  # For PyPI trusted publishing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Pre-Release Checks
  # =============================================================================
  pre-release-checks:
    name: Pre-Release Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            # Check if tag contains pre-release indicators
            if echo "$VERSION" | grep -qE '(-alpha|-beta|-rc|-dev|a|b|rc)[0-9]*$'; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Is Prerelease: $IS_PRERELEASE"

      - name: Verify version in pyproject.toml
        run: |
          PYPROJECT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml || echo "")
          if [ -n "$PYPROJECT_VERSION" ] && [ "$PYPROJECT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::warning::Version mismatch! Tag: ${{ steps.version.outputs.version }}, pyproject.toml: $PYPROJECT_VERSION"
          fi

      - name: Check changelog exists
        run: |
          if [ ! -f "CHANGELOG.md" ] && [ ! -f "CHANGES.md" ]; then
            echo "::warning::No changelog file found. Consider adding one."
          fi

  # =============================================================================
  # Build Package
  # =============================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-release-checks]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine check-wheel-contents

      - name: Build package
        run: |
          echo "::group::Building package"
          python -m build
          echo "::endgroup::"

      - name: Check package with twine
        run: |
          echo "::group::Twine check"
          twine check dist/*
          echo "::endgroup::"

      - name: Check wheel contents
        run: |
          echo "::group::Wheel contents check"
          check-wheel-contents dist/*.whl || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Test package installation
        run: |
          echo "::group::Testing package installation"
          pip install dist/*.whl --force-reinstall
          python -c "import core; print('Package imported successfully')"
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dist
          path: dist/
          retention-days: 7

  # =============================================================================
  # Generate Changelog
  # =============================================================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pre-release-checks]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: github-changelog-generator/github-changelog-generator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output: CHANGELOG-RELEASE.md
        continue-on-error: true

      - name: Build changelog manually
        if: steps.changelog.outcome == 'failure'
        run: |
          VERSION="${{ needs.pre-release-checks.outputs.version }}"
          
          echo "## What's Changed" > CHANGELOG-RELEASE.md
          echo "" >> CHANGELOG-RELEASE.md
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "**Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/$LAST_TAG...v$VERSION" >> CHANGELOG-RELEASE.md
          fi
          
          cat CHANGELOG-RELEASE.md

      - name: Upload changelog
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: changelog
          path: CHANGELOG-RELEASE.md
          retention-days: 7

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-release-checks, build, changelog]
    outputs:
      url: ${{ steps.create_release.outputs.url }}
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Download changelog
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: changelog

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@de2c0eb6e5e6e6e6e6e5e6e6e6e6e6e6e6e5e5e # v2.0.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.pre-release-checks.outputs.version) || github.ref_name }}
          name: Release ${{ needs.pre-release-checks.outputs.version }}
          body_path: CHANGELOG-RELEASE.md
          draft: false
          prerelease: ${{ needs.pre-release-checks.outputs.is_prerelease == 'true' }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output release info
        run: |
          echo "Release URL: ${{ steps.create_release.outputs.url }}"
          echo "Release ID: ${{ steps.create_release.outputs.id }}"

  # =============================================================================
  # Publish to PyPI
  # =============================================================================
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-release-checks, build, github-release]
    if: needs.pre-release-checks.outputs.is_prerelease != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/zen-ai-pentest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/* --skip-existing

  # =============================================================================
  # Build and Push Docker Image
  # =============================================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pre-release-checks, github-release]
    if: always() && needs.github-release.result == 'success'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No Dockerfile found, skipping Docker build"
          fi

      - name: Set up Docker Buildx
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@f7ce5c16e5e6e6e6e6e5e6e6e6e6e6e6e6e5e5e # v3.8.0

      - name: Log in to GitHub Container Registry
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/login-action@978e5e6e5e6e6e6e6e5e6e6e6e6e6e6e6e5e5e # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_dockerfile.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@8e5442c4ef9b787c6c95f1ad4e5e5e5e6e6e6e5e # v5.5.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.pre-release-checks.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.pre-release-checks.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.pre-release-checks.outputs.version }}
            type=raw,value=latest,enable=${{ needs.pre-release-checks.outputs.is_prerelease != 'true' }}
            type=raw,value=stable,enable=${{ needs.pre-release-checks.outputs.is_prerelease != 'true' }}

      - name: Build and push Docker image
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@ca052bb6e5e6e6e6e6e5e6e6e6e6e6e6e6e5e5e # v6.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      - name: Output image info
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "Docker image pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-release-checks.outputs.version }}"

  # =============================================================================
  # Documentation Deployment
  # =============================================================================
  docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-release-checks, github-release]
    if: needs.pre-release-checks.outputs.is_prerelease != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install docs dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build documentation
        run: |
          if [ -f "mkdocs.yml" ]; then
            mkdocs build
          else
            echo "::notice::No mkdocs.yml found, skipping docs build"
          fi
        continue-on-error: true

  # =============================================================================
  # Post-Release Tasks
  # =============================================================================
  post-release:
    name: Post-Release Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pre-release-checks, github-release, pypi-publish, docker]
    if: always() && needs.pre-release-checks.outputs.is_prerelease != 'true'
    steps:
      - name: Create release discussion
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const version = '${{ needs.pre-release-checks.outputs.version }}';
            
            await github.rest.repos.createReleaseDiscussion({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.github-release.outputs.id || 'null' }},
            }).catch(() => {
              console.log('Release discussions may not be enabled');
            });
        continue-on-error: true

      - name: Close milestone if exists
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const version = '${{ needs.pre-release-checks.outputs.version }}';
            
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const milestone = milestones.data.find(m => m.title === version || m.title === `v${version}`);
            
            if (milestone) {
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              console.log(`Closed milestone: ${milestone.title}`);
            }
        continue-on-error: true

  # =============================================================================
  # Notification
  # =============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pre-release-checks, github-release, pypi-publish, docker]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@7d7dc1c3e5e6e6e6e5e6e6e6e6e6e6e6e6e5e5e # v3.15.0
        with:
          status: ${{ job.status }}
          channel: '#releases'
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            ${{ needs.pre-release-checks.outputs.is_prerelease == 'true' && '🧪 Pre-release' || '🚀 Release' }} ${{ needs.pre-release-checks.outputs.version }} ${{ job.status == 'success' && 'published!' || 'failed!' }}
            
            GitHub Release: ${{ needs.github-release.outputs.url || 'N/A' }}
            PyPI: https://pypi.org/project/zen-ai-pentest/${{ needs.pre-release-checks.outputs.version }}/
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: Ilshidur/action-discord@7d7dc1c3e5e6e6e6e5e6e6e6e6e6e6e6e6e5e5e # v0.3.0
        with:
          args: |
            ${{ needs.pre-release-checks.outputs.is_prerelease == 'true' && '🧪 Pre-release' || '🚀 Release' }} **${{ needs.pre-release-checks.outputs.version }}** ${{ job.status == 'success' && 'published!' || 'failed!' }}
            
            GitHub: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.pre-release-checks.outputs.version }}
            PyPI: https://pypi.org/project/zen-ai-pentest/${{ needs.pre-release-checks.outputs.version }}/
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

  # =============================================================================
  # Release Summary
  # =============================================================================
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pre-release-checks, github-release, pypi-publish, docker]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.pre-release-checks.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ needs.pre-release-checks.outputs.is_prerelease == 'true' && 'Pre-release' || 'Stable Release' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI Publish | ${{ needs.pypi-publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.github-release.result }}" == "success" ]]; then
            echo "✅ Release ${{ needs.pre-release-checks.outputs.version }} completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.pre-release-checks.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- PyPI: https://pypi.org/project/zen-ai-pentest/${{ needs.pre-release-checks.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
            echo "- Docker: \`ghcr.io/${{ github.repository }}:${{ needs.pre-release-checks.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release failed. Please check the logs." >> $GITHUB_STEP_SUMMARY
          fi
