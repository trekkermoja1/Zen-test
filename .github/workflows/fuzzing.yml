name: Fuzz Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  fuzz-python:
    name: Python Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install atheris hypothesis

      - name: Run fuzzing tests
        run: |
          # Run fuzzing with timeout
          python -m pytest tests/fuzz/ -v --tb=short || true
        timeout-minutes: 10

      - name: Upload fuzzing artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: fuzz-results
          path: |
            crash-*
            *.log
          retention-days: 7

  fuzz-api:
    name: API Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install schemathesis

      - name: Start API server
        run: |
          cd api
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          JWT_SECRET_KEY: fuzz-test-key

      - name: Run API fuzzing
        run: |
          # Fuzz API endpoints
          schemathesis run http://localhost:8000/openapi.json \
            --checks all \
            --max-examples 100 \
            --hypothesis-deadline 5000 \
            || true

  fuzz-input-validation:
    name: Input Validation Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis

      - name: Run input validation tests
        run: |
          python tests/fuzz/test_input_validation.py || true
        continue-on-error: true
