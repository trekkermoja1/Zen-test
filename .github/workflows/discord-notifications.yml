name: Discord Notifications

on:
  workflow_run:
    workflows: ["CI", "Tests"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Check secrets
      run: |
        if [ -z "${DISCORD_WEBHOOK}" ]; then
          echo "⚠️ DISCORD_WEBHOOK not set - skipping"
          exit 0
        fi
        echo "Discord notifications enabled"
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    
    - name: Summary
      run: |
        echo "✅ Discord notifications check completed"
