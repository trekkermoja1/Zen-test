# =============================================================================
# Zen AI Pentest - Example GitHub Action Usage
# =============================================================================

name: Zen AI Pentest Security Scan

on:
  pull_request:
    branches: [ main, develop, 'release/*' ]
    paths:
      - 'src/**'
      - 'app/**'
      - '**.py'
      - '**.js'
      - '**.ts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: pip install -e .
      
      - name: Run Security Scan
        run: |
          echo "Running Zen AI Pentest security scan..."
          python -m src.cli --help || true
