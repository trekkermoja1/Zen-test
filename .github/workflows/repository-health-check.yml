name: Repository Health Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_auto_fix:
        description: 'Run auto-fix job'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      fix_level:
        description: 'Auto-fix level (safe=only safe fixes, aggressive=all fixes)'
        required: false
        default: 'safe'
        type: choice
        options:
          - 'safe'
          - 'aggressive'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
