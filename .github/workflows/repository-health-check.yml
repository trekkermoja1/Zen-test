name: Repository Health Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_auto_fix:
        description: 'Run auto-fix job'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      fix_level:
        description: 'Auto-fix level (safe=only safe fixes, aggressive=all fixes)'
        required: false
        default: 'safe'
        type: choice
        options:
          - 'safe'
          - 'aggressive'

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  # =============================================================================
  # JOB 1: Health Analysis
  # =============================================================================
  health-analysis:
    name: 🔍 Repository Health Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
      actions: read
      security-events: read
    outputs:
      health_score: ${{ steps.analysis.outputs.health_score }}
      health_status: ${{ steps.analysis.outputs.health_status }}
      report_file: ${{ steps.analysis.outputs.report_file }}
      critical_issues: ${{ steps.analysis.outputs.critical_issues }}
      has_recommendations: ${{ steps.analysis.outputs.has_recommendations }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache analysis results
        uses: actions/cache@v4
        with:
          path: |
            .health_cache
            ~/.cache/health-check
          key: ${{ runner.os }}-health-${{ env.CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-health-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub python-dateutil pytz

      - name: Run health analysis
        id: analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          echo "::group::Running Health Analysis"
          python .github/scripts/health_check.py
          echo "::endgroup::"

      - name: Upload health report artifact
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: |
            health-report.md
            health-data.json
            health-score.txt
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.analysis.outputs.health_score != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-report.md', 'utf8');
            const score = '${{ steps.analysis.outputs.health_score }}';
            const status = '${{ steps.analysis.outputs.health_status }}';
            
            const emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
            
            const body = `## ${emoji} Repository Health Check Report
            
            **Health Score:** ${score}/100 (${status})
            
            <details>
            <summary>📊 Click to expand full report</summary>
            
            ${report}
            
            </details>
            
            ---
            *Generated by [Repository Health Check](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Summary
        if: always()
        run: |
          echo "## 🔍 Health Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f health-score.txt ]; then
            SCORE=$(cat health-score.txt)
            STATUS="${{ steps.analysis.outputs.health_status }}"
            if [ "$SCORE" -ge 80 ]; then
              echo "✅ **Health Score:** $SCORE/100 ($STATUS)" >> $GITHUB_STEP_SUMMARY
            elif [ "$SCORE" -ge 50 ]; then
              echo "⚠️ **Health Score:** $SCORE/100 ($STATUS)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Health Score:** $SCORE/100 ($STATUS)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 [View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # JOB 2: Auto-Fix (Optional)
  # =============================================================================
  auto-fix:
    name: 🔧 Auto-Fix Issues
    needs: health-analysis
    runs-on: ubuntu-latest
    if: |
      (github.event.inputs.run_auto_fix == 'true') || 
      (github.event_name == 'schedule' && needs.health-analysis.outputs.health_score < 60)
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    environment:
      name: auto-fix
    outputs:
      fixes_applied: ${{ steps.fix.outputs.fixes_applied }}
      fixes_summary: ${{ steps.fix.outputs.fixes_summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub python-dateutil pytz gitpython

      - name: Download health data
        uses: actions/download-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: health-data

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run auto-fix
        id: fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIX_LEVEL: ${{ github.event.inputs.fix_level || 'safe' }}
          HEALTH_SCORE: ${{ needs.health-analysis.outputs.health_score }}
        run: |
          echo "::group::Running Auto-Fix"
          echo "Fix level: $FIX_LEVEL"
          echo "Health score: $HEALTH_SCORE"
          python .github/scripts/auto_fix.py
          echo "::endgroup::"

      - name: Create fix report
        if: steps.fix.outputs.fixes_applied != '0'
        run: |
          echo "## 🔧 Auto-Fix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fixes applied: ${{ steps.fix.outputs.fixes_applied }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.fix.outputs.fixes_summary }}" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # JOB 3: Notification
  # =============================================================================
  notification:
    name: 📢 Send Notifications
    needs: [health-analysis, auto-fix]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download health data
        uses: actions/download-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: health-data

      - name: Check notification conditions
        id: check
        run: |
          SCORE=${{ needs.health-analysis.outputs.health_score || 0 }}
          CRITICAL="${{ needs.health-analysis.outputs.critical_issues }}"
          HEALTH_STATUS="${{ needs.health-analysis.outputs.health_status }}"
          
          SHOULD_NOTIFY=false
          REASON=""
          
          if [ "$SCORE" -lt 50 ]; then
            SHOULD_NOTIFY=true
            REASON="Health score below 50 ($SCORE)"
          elif [ "$CRITICAL" != "0" ] && [ "$CRITICAL" != "" ]; then
            SHOULD_NOTIFY=true
            REASON="Critical issues detected ($CRITICAL)"
          elif [ "${{ needs.health-analysis.outputs.has_recommendations }}" == "true" ]; then
            SHOULD_NOTIFY=true
            REASON="Recommendations available"
          fi
          
          echo "should_notify=$SHOULD_NOTIFY" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        if: steps.check.outputs.should_notify == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const score = '${{ steps.check.outputs.score }}';
            const reason = '${{ steps.check.outputs.reason }}';
            
            let report = '';
            try {
              report = fs.readFileSync('health-data/health-report.md', 'utf8');
            } catch (e) {
              report = 'Report not available';
            }
            
            const title = `🚨 Repository Health Alert: Score ${score}/100`;
            const body = `## Health Check Alert
            
            **Trigger:** ${reason}
            
            **Health Score:** ${score}/100
            
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            <details>
            <summary>📊 Health Report</summary>
            
            ${report}
            
            </details>
            
            ---
            *This issue was automatically created by the Repository Health Check workflow.*
            *Last updated: ${new Date().toISOString()}*`;
            
            // Check for existing open health alert issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-alert',
              state: 'open'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-alert', 'automated']
              });
              console.log('Created new health alert issue');
            } else {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `**Updated:** ${body}`
              });
              console.log('Updated existing health alert issue #' + issues.data[0].number);
            }

      - name: Slack Notification
        if: |
          steps.check.outputs.should_notify == 'true' && 
          env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SCORE=${{ steps.check.outputs.score }}
          REASON="${{ steps.check.outputs.reason }}"
          
          if [ "$SCORE" -ge 80 ]; then
            COLOR="good"
          elif [ "$SCORE" -ge 50 ]; then
            COLOR="warning"
          else
            COLOR="danger"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --silent --show-error \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"Repository Health Alert\",
                \"text\": \"Score: $SCORE/100 - $REASON\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": true}
                ]
              }]
            }" \
            "$SLACK_WEBHOOK_URL"

      - name: Discord Notification
        if: |
          steps.check.outputs.should_notify == 'true' && 
          env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SCORE=${{ steps.check.outputs.score }}
          REASON="${{ steps.check.outputs.reason }}"
          
          if [ "$SCORE" -ge 80 ]; then
            COLOR=3066993  # Green
          elif [ "$SCORE" -ge 50 ]; then
            COLOR=15105570  # Yellow
          else
            COLOR=15158332  # Red
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --silent --show-error \
            --data "{
              \"embeds\": [{
                \"title\": \"🚨 Repository Health Alert\",
                \"description\": \"Score: $SCORE/100\\nReason: $REASON\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"inline\": true}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"

      - name: Summary
        run: |
          echo "## 📢 Notification Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.should_notify }}" == "true" ]; then
            echo "⚠️ Notifications sent" >> $GITHUB_STEP_SUMMARY
            echo "- Reason: ${{ steps.check.outputs.reason }}" >> $GITHUB_STEP_SUMMARY
            echo "- Score: ${{ steps.check.outputs.score }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No notifications needed" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # JOB 4: Trend Analysis (Weekly)
  # =============================================================================
  trend-analysis:
    name: 📈 Trend Analysis
    needs: health-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download current health data
        uses: actions/download-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: health-data

      - name: Update trend data
        run: |
          mkdir -p .github/health-trends
          
          SCORE=${{ needs.health-analysis.outputs.health_score }}
          DATE=$(date -u +%Y-%m-%d)
          
          # Append to trend file
          echo "$DATE,$SCORE,${{ github.run_id }}" >> .github/health-trends/scores.csv
          
          # Keep only last 90 days
          tail -n 90 .github/health-trends/scores.csv > .github/health-trends/scores.csv.tmp
          mv .github/health-trends/scores.csv.tmp .github/health-trends/scores.csv

      - name: Generate trend graph
        run: |
          python3 << 'EOF'
          import csv
          from datetime import datetime
          
          try:
              dates = []
              scores = []
              
              with open('.github/health-trends/scores.csv', 'r') as f:
                  reader = csv.reader(f)
                  for row in reader:
                      if len(row) >= 2:
                          dates.append(row[0])
                          scores.append(int(row[1]))
              
              if len(scores) >= 2:
                  avg = sum(scores) / len(scores)
                  trend = "📈 Improving" if scores[-1] > scores[0] else "📉 Declining" if scores[-1] < scores[0] else "➡️ Stable"
                  
                  with open('.github/health-trends/summary.md', 'w') as f:
                      f.write(f"# Health Score Trends\n\n")
                      f.write(f"**Average Score:** {avg:.1f}/100\n\n")
                      f.write(f"**Trend:** {trend}\n\n")
                      f.write(f"**Last 7 Days:** {scores[-7:] if len(scores) >= 7 else scores}\n\n")
                      f.write("| Date | Score |\n|------|-------|\n")
                      for d, s in zip(dates[-10:], scores[-10:]):
                          f.write(f"| {d} | {s} |\n")
                  
                  print(f"Trend: {trend}, Average: {avg:.1f}")
          except Exception as e:
              print(f"Error generating trend: {e}")
          EOF

      - name: Commit trend data
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .github/health-trends/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update health trend data [skip ci]"
            git push
          fi
