name: Repository Health Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_auto_fix:
        description: 'Run auto-fix job'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      fix_level:
        description: 'Auto-fix level'
        required: false
        default: 'safe'
        type: choice
        options:
          - 'safe'
          - 'aggressive'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Check Repository Health
        run: |
          echo "Running repository health check..."
          echo "Auto-fix: ${{ github.event.inputs.run_auto_fix || 'false' }}"
          echo "Fix level: ${{ github.event.inputs.fix_level || 'safe' }}"
          
          # Check for common issues
          echo "Checking for large files..."
          find . -type f -size +10M -not -path './.git/*' || true
