name: Quick Coverage Boost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pytest and coverage
      run: pip install pytest pytest-cov
    
    - name: Run quick coverage tests
      run: |
        # Run tests OUTSIDE tests/ folder to avoid conftest.py issues
        pytest test_coverage_quick.py -v \
          --cov=tools \
          --cov=modules \
          --cov=core \
          --cov=agents \
          --cov=autonomous \
          --cov=database \
          --cov-report=xml \
          --cov-report=term
    
    - name: Show coverage summary
      run: |
        echo "Coverage file generated:"
        ls -la coverage.xml
        head -50 coverage.xml | tail -20
    
    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
