name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SECRET_KEY: test-secret-key-for-coverage-only-min-32-chars
      DATABASE_URL: sqlite:///test.db
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt 2>/dev/null || pip install requests aiohttp python-dotenv pydantic fastapi uvicorn pydantic-settings
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run tests with coverage
      run: pytest --cov=. --cov-report=xml --cov-report=term -x || true
      env:
        PYTHONPATH: ${{ github.workspace }}
        SECRET_KEY: test-secret-key-for-coverage-only-min-32-chars
    
    - name: Check coverage file
      run: ls -la coverage.xml 2>/dev/null || echo "No coverage file"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: hashFiles('coverage.xml') != ''
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
