name: Test Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Check test files exist
      run: |
        echo "Test files found:"
        find tests -name "*.py" -type f | head -20
        echo "Total test files: $(find tests -name "*.py" -type f | wc -l)"
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v \
          --cov=core \
          --cov=modules \
          --cov=api \
          --cov=tools \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=20 || true
      env:
        JWT_SECRET_KEY: test-secret-key
        ADMIN_PASSWORD: test-admin-password
        DATABASE_URL: sqlite:///./test.db
        PYTHONPATH: ${{ github.workspace }}
      continue-on-error: true
    
    - name: Check coverage file exists
      run: |
        ls -la coverage.xml 2>/dev/null || echo "No coverage.xml found"
        ls -la .coverage 2>/dev/null || echo "No .coverage found"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
