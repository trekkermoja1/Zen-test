name: Test Coverage

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r .github/test-requirements.txt
    - name: Run tests with coverage
      run: pytest --cov=api --cov=agents --cov=core --cov=tools --cov=utils --cov=database --cov=autonomous --cov=backends --cov=modules --cov=reports --cov=integrations --cov=safety --cov=risk_engine --cov=zen_shield --cov-report=xml --cov-fail-under=70
      continue-on-error: false
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
