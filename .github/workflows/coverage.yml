name: Coverage Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-asyncio
    - name: Run coverage check
      run: |
        # Run all tests with coverage
        pytest tests/ \
          --ignore=tests/e2e \
          --ignore=tests/security \
          --ignore=tests/fuzz \
          --ignore=tests/test_enhanced_recon.py \
          --ignore=tests/test_enhanced_tools.py \
          --ignore=tests/test_kimi_helper.py \
          --ignore=tests/test_kimi_helper_comprehensive.py \
          --ignore=tests/test_monitoring_metrics.py \
          --ignore=tests/test_osint_network_tools.py \
          --ignore=tests/test_osint_super.py \
          --ignore=tests/test_scout_integration.py \
          --ignore=tests/test_semgrep_integration.py \
          --ignore=tests/test_subfinder_integration.py \
          --ignore=tests/test_tool_caller.py \
          --ignore=tests/test_tool_caller_comprehensive.py \
          --ignore=tests/test_tool_framework.py \
          --ignore=tests/test_trivy_integration.py \
          --ignore=tests/test_trufflehog_integration.py \
          --ignore=tests/test_zap_integration.py \
          --ignore=tests/test_notifications.py \
          --cov=. \
          --cov-report=xml \
          --cov-report=term \
          --cov-fail-under=10 || true
    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
