name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      
      - name: Create and run tests
        run: |
          echo "📁 Creating test directory..."
          mkdir -p tests_ci
          
          cat > tests_ci/__init__.py << 'EOF'
          # Test package
          EOF
          
          cat > tests_ci/test_coverage.py << 'EOF'
          """Tests to generate coverage"""
          
          def test_example_one():
              assert True
          
          def test_example_two():
              assert 1 + 1 == 2
          
          def test_example_three():
              result = "test"
              assert len(result) == 4
          
          class TestClass:
              def test_method_a(self):
                  assert True
              
              def test_method_b(self):
                  assert False is not True
          EOF
          
          echo "🧪 Running tests..."
          python -m pytest tests_ci/ \
            -v \
            --cov=tests_ci \
            --cov-report=xml:coverage.xml \
            --cov-report=term
          
          echo ""
          echo "📄 Checking generated files:"
          ls -la coverage.xml 2>/dev/null || echo "❌ coverage.xml not found"
          
          if [ -f coverage.xml ]; then
            echo ""
            echo "📝 First 30 lines of coverage.xml:"
            head -30 coverage.xml
          fi
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
