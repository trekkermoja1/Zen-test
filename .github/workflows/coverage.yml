name: Test Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio coverage
        # Install required for tests
        pip install pydantic sqlalchemy fastapi redis httpx email-validator
    
    - name: Check test files exist
      run: |
        echo "Test files found:"
        find tests -name "test_*.py" -type f | wc -l
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v \
          --ignore=tests/integration \
          --cov=tools \
          --cov=modules \
          --cov=core \
          --cov=agents \
          --cov=autonomous \
          --cov=database \
          --cov=dashboard \
          --cov-report=xml \
          --cov-report=term-missing
      env:
        JWT_SECRET_KEY: test-secret-key
        ADMIN_PASSWORD: test-admin-password
        DATABASE_URL: sqlite:///./test.db
        PYTHONPATH: ${{ github.workspace }}
    
    - name: Check if coverage was generated
      run: |
        if [ ! -f coverage.xml ] || [ ! -s coverage.xml ]; then
          echo "ERROR: No coverage report generated by pytest"
          exit 1
        fi
        echo "Coverage report generated successfully"
    
    - name: Check coverage file
      run: |
        if [ -f coverage.xml ]; then
          echo "[OK] coverage.xml exists"
          ls -lh coverage.xml
          # Show first few lines
          head -20 coverage.xml
        else
          echo "[WARN] coverage.xml not found, creating minimal report..."
          echo '<?xml version="1.0" encoding="UTF-8"?>
        <coverage version="4.5.4" timestamp="'$(date +%s)'" lines-valid="1" lines-covered="0" line-rate="0.0">
          <sources><source>.</source></sources>
          <packages/>
        </coverage>' > coverage.xml
        fi
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Coverage Summary
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        if [ -f coverage.xml ]; then
          # Try to extract coverage percentage
          COVERAGE=$(grep -o 'line-rate="[0-9.]*"' coverage.xml | head -1 | grep -o '[0-9.]*' || echo "0")
          COVERAGE_PCT=$(echo "$COVERAGE * 100" | bc -l 2>/dev/null || echo "0")
          echo "Coverage: ${COVERAGE_PCT}%" >> $GITHUB_STEP_SUMMARY
        else
          echo "No coverage report generated" >> $GITHUB_STEP_SUMMARY
        fi
