name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt 2>/dev/null || pip install requests aiohttp python-dotenv pydantic fastapi uvicorn
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run tests with coverage (continue on error)
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term -x -q 2>&1 | head -100
        echo "Tests completed"
      continue-on-error: true
    
    - name: Check coverage file exists
      run: |
        ls -la coverage.xml 2>/dev/null || echo "No coverage.xml generated"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: hashFiles('coverage.xml') != ''
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
