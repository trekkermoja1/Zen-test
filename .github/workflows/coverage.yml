name: Coverage Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-asyncio
    - name: Run coverage check (agent_comm/v2)
      run: |
        # Test only the new gRPC ACP v2 modules with high coverage
        pytest agent_comm/v2/tests/ \
          --cov=agent_comm.v2.src.config \
          --cov=agent_comm.v2.src.registry \
          --cov=agent_comm.v2.src.circuit_breaker \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=90
    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false  # Don't fail if upload fails
