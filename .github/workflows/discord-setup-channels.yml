name: Discord - Setup Channels

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Welche Aktion?'
        required: true
        default: 'create-channels'
        type: choice
        options:
          - create-channels
          - update-permissions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-discord:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    
    steps:
      - name: Check Bot Token Secret
        id: check-secret
        run: |
          if [ -n "${{ secrets.DISCORD_BOT_TOKEN_PRIMARY }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
            echo "✅ Discord bot token is configured"
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "❌ DISCORD_BOT_TOKEN_PRIMARY secret is not configured"
          fi

      - name: Fail if Secret Missing
        if: steps.check-secret.outputs.has_secret != 'true'
        run: |
          echo "❌ Required secret is not configured: DISCORD_BOT_TOKEN_PRIMARY"
          echo "Please add this secret to your GitHub repository settings."
          exit 1

      - uses: actions/checkout@v6
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Create Discord Channels
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_PRIMARY }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          import sys
          
          GUILD_ID = "1467204311355363485"
          BASE_URL = "https://discord.com/api/v10"
          TOKEN = os.environ['DISCORD_BOT_TOKEN']
          
          headers = {
              "Authorization": f"Bot {TOKEN}",
              "Content-Type": "application/json"
          }
          
          # Test connection first
          print("🔍 Testing bot connection...")
          me_resp = requests.get(f"{BASE_URL}/users/@me", headers=headers)
          if me_resp.status_code != 200:
              print(f"❌ Failed to authenticate: {me_resp.status_code}")
              print(me_resp.text)
              sys.exit(1)
          
          bot_name = me_resp.json().get('username', 'Unknown')
          print(f"✅ Authenticated as: {bot_name}")
          
          # Channel 1: admin-content (nur Admins/Mods)
          print("🔒 Erstelle #admin-content...")
          r1 = requests.post(f"{BASE_URL}/guilds/{GUILD_ID}/channels", headers=headers, json={
              "name": "admin-content",
              "type": 0,
              "topic": "🔒 Exklusive Inhalte für Admins und Moderatoren. Wichtige Videos, Dokumentationen und interne Diskussionen.",
              "permission_overwrites": [
                  {"id": GUILD_ID, "type": 0, "deny": "1024"}  # @everyone kann nicht sehen
              ]
          })
          
          if r1.status_code == 201:
              print(f"✅ #admin-content erstellt (ID: {r1.json()['id']})")
              # Admin Berechtigungen hinzufügen
              admin_perms = {"type": 0, "allow": "1024", "deny": "0"}
              requests.put(f"{BASE_URL}/channels/{r1.json()['id']}/permissions/{GUILD_ID}", 
                          headers=headers, json=admin_perms)
          elif r1.status_code == 403:
              print(f"❌ Permission denied (403). Bot may not have sufficient permissions.")
          else:
              print(f"❌ Fehler: {r1.status_code} - {r1.text}")
          
          # Channel 2: video-sharing (öffentlich)
          print("📺 Erstelle #video-sharing...")
          r2 = requests.post(f"{BASE_URL}/guilds/{GUILD_ID}/channels", headers=headers, json={
              "name": "video-sharing",
              "type": 0,
              "topic": "🎬 Teilt interessante Videos, Tutorials und Ressourcen zur Cybersicherheit und AI! Jeder kann hier posten."
          })
          
          if r2.status_code == 201:
              print(f"✅ #video-sharing erstellt (ID: {r2.json()['id']})")
          elif r2.status_code == 403:
              print(f"❌ Permission denied (403). Bot may not have sufficient permissions.")
          else:
              print(f"❌ Fehler: {r2.status_code} - {r2.text}")
          
          print("\n🎉 Discord Channels erstellt!")
          EOF

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Discord - Setup Channels" >> $GITHUB_STEP_SUMMARY
          echo "Action: ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Channels created successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to create channels" >> $GITHUB_STEP_SUMMARY
          fi
