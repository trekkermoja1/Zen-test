name: Discord - Fill Channels with Content

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'fill-channels'
        type: choice
        options:
          - fill-channels
          - update-content

jobs:
  manage-discord:
    runs-on: ubuntu-latest
    # Environment with protection rules (requires manual approval)
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fill Discord Channels
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/discord_fill_channels.py
      
      - name: Update Session State
        if: success()
        run: |
          echo "[INFO] Discord channels updated successfully"
          echo "[INFO] Timestamp: $(date)"
