name: Auto-Fix Repository Issues

on:
  # DISABLED: Requires .github/scripts/health_check.py which doesn't exist
  # push:
  #   branches: [master, main]
  # schedule:
  #   - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'Fix mode'
        required: true
        default: 'safe'
        type: choice
        options:
          - safe
          - aggressive

env:
  PYTHON_VERSION: '3.11'

jobs:
  analyze-and-fix:
    name: Analyze and Auto-Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      security-events: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install requests ghapi

      - name: Run Health Check
        id: health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/health_check.py
          echo "score=$(cat health-score.txt)" >> $GITHUB_OUTPUT

      - name: Upload Health Report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: |
            health-report.md
            health-data.json
            health-score.txt
          retention-days: 30

      - name: Apply Auto-Fixes
        id: autofix
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FIX_MODE: ${{ github.event.inputs.fix_mode || 'safe' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python .github/scripts/auto_fix.py --mode $FIX_MODE

      - name: Create Issue for Critical Problems
        if: steps.health.outputs.score < 50
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-report.md', 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Repository Health Score Critical: ${process.env.SCORE}/100`,
              body: `## Repository Health Check Failed
              
              **Score:** ${process.env.SCORE}/100
              **Date:** ${new Date().toISOString()}
              
              ${report}
              
              ---
              Auto-generated by Repository Health Check Workflow`,
              labels: ['health-check', 'critical', 'automation']
            });
            
            console.log(`Created issue #${issue.data.number}`);
        env:
          SCORE: ${{ steps.health.outputs.score }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = fs.readFileSync('health-score.txt', 'utf8');
            
            let emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
            let status = score >= 80 ? 'HEALTHY' : score >= 50 ? 'NEEDS ATTENTION' : 'CRITICAL';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Repository Health Check: ${score}/100 (${status})
              
              This PR affects the repository health score.
              
              <details>
              <summary>View Full Report</summary>
              
              ${fs.readFileSync('health-report.md', 'utf8')}
              </details>`
            });

  fix-common-issues:
    name: Fix Common Issues
    runs-on: ubuntu-latest
    needs: analyze-and-fix
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix Trailing Whitespace
        run: |
          find . -type f \( -name "*.py" -o -name "*.yml" -o -name "*.yaml" -o -name "*.md" -o -name "*.json" \) -not -path "./.git/*" -not -path "./venv/*" -not -path "./node_modules/*" -exec sed -i 's/[[:space:]]*$//' {} +

      - name: Fix EOF Newlines
        run: |
          find . -type f \( -name "*.py" -o -name "*.yml" -o -name "*.yaml" -o -name "*.md" \) -not -path "./.git/*" -not -path "./venv/*" -not -path "./node_modules/*" | while read file; do
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo >> "$file"
            fi
          done

      - name: Check for Changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: Auto-fix whitespace and formatting issues [skip ci]"
          git push

  security-patches:
    name: Apply Security Patches
    runs-on: ubuntu-latest
    needs: analyze-and-fix
    if: github.event_name == 'schedule' || github.event.inputs.fix_mode == 'aggressive'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit and Fix
        run: |
          pip-audit --format=json --output=audit.json || true
          
          if [ -f audit.json ]; then
            echo "Security audit completed. Review results."
            cat audit.json | jq '.[] | select(.fix_versions != null) | .name' | while read pkg; do
              echo "Package $pkg can be updated"
            done
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit fix
        run: |
          if [ -f package.json ]; then
            npm audit fix --dry-run || true
          fi

      - name: Create PR for Security Fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/security-fixes
          title: '🔒 Automated Security Fixes'
          body: |
            This PR contains automated security fixes generated by the repository health check workflow.
            
            Please review carefully before merging.
          labels: security, automated, dependencies

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [analyze-and-fix, fix-common-issues, security-patches]
    if: always()
    
    steps:
      - name: Slack Notification
        if: ${{ needs.analyze-and-fix.outputs.score < 50 || failure() }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: '🚨 Repository Health Check Alert'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Discord Notification
        if: ${{ needs.analyze-and-fix.outputs.score < 50 || failure() }}
        uses: Ilshidur/action-discord@master
        with:
          args: |
            🚨 **Repository Health Check Alert**
            
            Score: ${{ needs.analyze-and-fix.outputs.score }}/100
            Status: ${{ needs.analyze-and-fix.outputs.score < 50 && 'CRITICAL' || needs.analyze-and-fix.outputs.score < 80 && 'WARNING' || 'OK' }}
            
            [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
