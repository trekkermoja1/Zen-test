name: ZenClaw Discord Integration

on:
  push:
    branches: [main, master]
  issues:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: ["Test Coverage", "Security Scan", "CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      message:
        description: 'Test message'
        required: true
        default: 'ZenClaw Test Notification'
      channel:
        description: 'Channel type'
        required: true
        default: 'logs'
        type: choice
        options:
        - logs
        - alerts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Check Discord Webhook Secret
        id: check-secret
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
            echo "✅ Discord webhook secret is configured"
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "⚠️ DISCORD_WEBHOOK_URL secret is not configured"
          fi

      - name: Setup Python
        if: steps.check-secret.outputs.has_secret == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Prepare Notification
        id: prep
        if: steps.check-secret.outputs.has_secret == 'true'
        run: |
          EVENT="${{ github.event_name }}"
          COLOR="3447003"
          TITLE="ZenClaw Alert"
          DESCRIPTION=""
          
          case "$EVENT" in
            push)
              COLOR="3066993"
              TITLE="🚀 Push to main"
              DESCRIPTION="${{ github.event.head_commit.message }}"
              ;;
            issues)
              if [ "${{ github.event.action }}" == "opened" ]; then
                COLOR="15158332"
                TITLE="🐛 New Issue"
              else
                COLOR="3066993"
                TITLE="✅ Issue Resolved"
              fi
              DESCRIPTION="${{ github.event.issue.title }}"
              ;;
            workflow_run)
              if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
                COLOR="3066993"
                TITLE="✅ Workflow Success"
              else
                COLOR="15158332"
                TITLE="❌ Workflow Failed"
              fi
              DESCRIPTION="${{ github.event.workflow_run.name }}"
              ;;
            workflow_dispatch)
              COLOR="3447003"
              TITLE="🧪 Test Message"
              DESCRIPTION="${{ github.event.inputs.message }}"
              ;;
          esac
          
          # Truncate and sanitize
          DESCRIPTION=$(echo "$DESCRIPTION" | tr '\n' ' ' | cut -c1-1000)
          
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "event=$EVENT" >> $GITHUB_OUTPUT

      - name: Send to Discord
        if: steps.check-secret.outputs.has_secret == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COLOR: ${{ steps.prep.outputs.color }}
          TITLE: ${{ steps.prep.outputs.title }}
          DESCRIPTION: ${{ steps.prep.outputs.description }}
          EVENT: ${{ steps.prep.outputs.event }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Create JSON using jq for proper escaping
          JSON_PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --argjson color "$COLOR" \
            --arg timestamp "$TIMESTAMP" \
            --arg footer_text "ZenClaw Guardian | $EVENT" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            '{
              embeds: [{
                title: $title,
                description: $description,
                color: $color,
                timestamp: $timestamp,
                footer: { text: $footer_text },
                fields: [
                  {name: "Repository", value: $repo, inline: true},
                  {name: "Actor", value: $actor, inline: true}
                ]
              }]
            }')
          
          # Send with retry
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" == "204" ]; then
              echo "✅ Discord notification sent"
              exit 0
            elif [ "$HTTP_CODE" == "429" ] && [ $i -lt 3 ]; then
              echo "⚠️ Rate limited, retrying..."
              sleep 5
            else
              echo "⚠️ Response: $HTTP_CODE"
              exit 0  # Don't fail
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "## ZenClaw Discord Notification" >> $GITHUB_STEP_SUMMARY
          echo "Event: ${{ steps.prep.outputs.event || github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-secret.outputs.has_secret }}" == "true" ]; then
            echo "Status: Webhook configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: Webhook NOT configured" >> $GITHUB_STEP_SUMMARY
          fi
