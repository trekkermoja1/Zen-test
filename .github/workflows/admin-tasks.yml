name: Admin Tasks - Branch Protection Bypass

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Welche Admin-Aufgabe?'
        required: true
        default: 'fill-discord-channels'
        type: choice
        options:
          - fill-discord-channels
          - post-bug-bounty
          - custom
      custom_script:
        description: 'Custom Script (nur bei task=custom)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write
  checks: read

jobs:
  admin-task:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production  # Nutzt Environment Secrets mit Protection Rules
    
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      # Schritt 1: Branch Protection deaktivieren
      - name: Disable Branch Protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deaktiviere Branch Protection..."
          gh api repos/${{ github.repository }}/branches/main/protection \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" || echo "Keine Protection vorhanden oder bereits deaktiviert"
        
      # Schritt 2: Aufgabe ausführen
      - name: Fill Discord Channels
        if: github.event.inputs.task == 'fill-discord-channels'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_PRIMARY }}
        run: |
          echo "Fülle Discord Channels..."
          python scripts/fill_discord_channels.py
          
      - name: Post Bug Bounty Info
        if: github.event.inputs.task == 'post-bug-bounty'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_PRIMARY }}
        run: |
          echo "Poste Bug Bounty Programm..."
          cat > /tmp/post_bounty.py << 'ENDOFSCRIPT'
          import requests
          import os
          
          GUILD_ID = "1467204311355363485"
          BASE_URL = "https://discord.com/api/v10"
          TOKEN = os.environ['DISCORD_BOT_TOKEN']
          
          headers = {
              "Authorization": f"Bot {TOKEN}",
              "Content-Type": "application/json"
          }
          
          # Finde #announcements oder erstelle in #general
          channels_url = f"{BASE_URL}/guilds/{GUILD_ID}/channels"
          r = requests.get(channels_url, headers=headers)
          
          if r.status_code == 200:
              channels = r.json()
              target_channel = None
              
              for ch in channels:
                  if ch['name'] in ['announcements', 'general', 'news']:
                      target_channel = ch['id']
                      break
              
              if target_channel:
                  msg_url = f"{BASE_URL}/channels/{target_channel}/messages"
                  content = (
                      "**NEW: Bug Bounty Program!**\n\n"
                      "Wir starten das **Zen-AI-Bounty** Programm!\n\n"
                      "**Was erwartet dich?**\n"
                      "- Punkte fuer gefundene Bugs (CVSS-basiert)\n"
                      "- 3-Monats Seasons mit Leaderboard\n"
                      "- Belohnungen fuer Top 3 (Badge, Merch, Early Access)\n"
                      "- Hall of Fame fuer alle Top 10\n\n"
                      "**Punkte-System:**\n"
                      "- Critical: 1000 Punkte\n"
                      "- High: 500 Punkte\n"
                      "- Medium: 200 Punkte\n"
                      "- Low: 50 Punkte\n"
                      "- Enhancement: 25 Punkte\n\n"
                      "**Belohnungen (Season 1: Jan-Maerz):**\n"
                      "1. Platz: Security Champion Title + Limited Merch\n"
                      "2. Platz: Elite Contributor Badge + Beta Access\n"
                      "3. Platz: Rising Star Badge + Discord Nitro\n\n"
                      "Mehr Infos:\n"
                      "https://github.com/SHAdd0WTAka/Zen-Ai-Pentest/blob/main/docs/BUG_BOUNTY_PROGRAM.md\n\n"
                      "Ready to hunt some bugs?"
                  )
                  
                  data = {"content": content}
                  r2 = requests.post(msg_url, json=data, headers=headers)
                  
                  if r2.status_code == 200:
                      print("Bug Bounty Programm gepostet!")
                  else:
                      print(f"Fehler: {r2.status_code}")
              else:
                  print("Kein passender Channel gefunden")
          ENDOFSCRIPT
          python /tmp/post_bounty.py
          
      - name: Custom Script
        if: github.event.inputs.task == 'custom' && github.event.inputs.custom_script != ''
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_PRIMARY }}
        run: |
          echo "Fuehre Custom Script aus..."
          ${{ github.event.inputs.custom_script }}
          
      # Schritt 3: Branch Protection wieder aktivieren
      - name: Enable Branch Protection
        if: always()  # Auch bei Fehlern ausfuehren!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Aktiviere Branch Protection wieder..."
          gh api repos/${{ github.repository }}/branches/main/protection \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f required_status_checks[strict]=true \
            -f required_status_checks[contexts][]="test (ubuntu-latest, 3.11)" \
            -f required_status_checks[contexts][]="test (ubuntu-latest, 3.12)" \
            -f enforce_admins=true \
            -f required_pull_request_reviews[required_approving_review_count]=1 \
            -f required_pull_request_reviews[dismiss_stale_reviews]=true
          echo "Branch Protection wieder aktiviert!"
