name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety ruff
          pip install pydantic sqlalchemy fastapi redis httpx email-validator pyjwt python-multipart passlib 'bcrypt<4.1'

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github || true
          ruff format . --check || true

      - name: Security scan with Bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll || true

      - name: Check for known security vulnerabilities
        run: |
          safety check --full-report || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/integration \
            --ignore=tests/fuzz/test_input_validation.py \
            --ignore=tests/test_api_routes_agents.py \
            --ignore=tests/test_api_routes_scans.py \
            --ignore=tests/test_react_agent.py \
            --ignore=tests/unit/analysis_bot/test_analysis_bot.py \
            --ignore=tests/unit/core/test_models.py \
            --cov=tools.ffuf_integration_enhanced \
            --cov=tools.whatweb_integration \
            --cov=tools.wafw00f_integration \
            --cov=tools.subfinder_integration \
            --cov=tools.httpx_integration \
            --cov=tools.nikto_integration \
            --cov=tools.sherlock_integration \
            --cov=tools.ignorant_integration \
            --cov=tools.tshark_integration \
            --cov=tools.amass_integration \
            --cov=tools.masscan_integration \
            --cov=tools.gobuster_integration \
            --cov=tools.nmap_integration \
            --cov=tools.tool_registry \
            --cov=tools.tool_caller \
            --cov=modules.enhanced_recon \
            --cov=modules.osint_super \
            --cov=modules.super_scanner \
            --cov=core.orchestrator \
            --cov=database.models \
            --cov=agents.agent_base \
            --cov=agents.agent_orchestrator \
            --cov=autonomous.agent_loop \
            --cov=autonomous.exploit_validator \
            --cov-report=xml \
            --cov-report=term
        env:
          JWT_SECRET_KEY: test-secret-key
          ADMIN_PASSWORD: testpass
          DATABASE_URL: sqlite:///./test.db

      # Coverage upload disabled - use codecov.yml instead
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   if: matrix.python-version == '3.13'
      #   with:
      #     file: ./coverage.xml
      #     fail_ci_if_error: false

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs-py${{ matrix.python-version }}
          path: |
            logs/
            *.log
            bandit-report.json
          retention-days: 7
