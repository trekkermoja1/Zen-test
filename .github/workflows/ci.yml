name: CI/CD Pipeline (Improved)

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # =============================================================================
  # Backend Tests and Security
  # =============================================================================
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "=== Debug Info ==="
          echo "PWD: $(pwd)"
          ls -la
          echo "Python version requested: ${{ matrix.python-version }}"
          echo "=================="

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety ruff

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github
          ruff format . --check

      - name: Security scan with Bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll

      - name: Check for known security vulnerabilities
        run: |
          safety check --full-report || true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term
        env:
          JWT_SECRET_KEY: test-secret-key
          ADMIN_PASSWORD: test-admin-password
          DATABASE_URL: sqlite:///./test.db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs-py${{ matrix.python-version }}
          path: |
            logs/
            *.log
            bandit-report.json
          retention-days: 7
          if-no-files-found: ignore

  # =============================================================================
  # Frontend Tests and Security
  # =============================================================================
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./web_ui/dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "=== Debug Info ==="
          echo "PWD: $(pwd)"
          ls -la
          echo "=================="

      - name: Verify package-lock.json exists
        run: |
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json fehlt. Committe eine Lockfile."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './web_ui/dashboard/package-lock.json'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Build frontend
        run: npm run build
        env:
          CI: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: |
            npm-debug.log
            ./logs
          retention-days: 7
          if-no-files-found: ignore

  # =============================================================================
  # Pre-commit hooks
  # =============================================================================
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  # =============================================================================
  # Database Migration Check
  # =============================================================================
  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install alembic

      - name: Check Alembic migrations
        run: |
          alembic current || echo "No current revision"
          alembic check || echo "Migration check skipped - database models may have changed"
        env:
          DATABASE_URL: sqlite:///./test.db

  # =============================================================================
  # Docker Build Test
  # =============================================================================
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zen-ai-pentest:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Summary
  # =============================================================================
  ci-summary:
    needs: [backend, frontend, pre-commit, migrations, docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: CI Status Summary
        run: |
          echo "## 🧪 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit | ${{ needs.pre-commit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check all passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
