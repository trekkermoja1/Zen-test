name: Codecov Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        pip install pydantic sqlalchemy fastapi redis httpx email-validator pyjwt python-multipart passlib 'bcrypt<4.1'
    
    - name: Run tests with coverage
      run: |
        pytest tests/test_working_final.py tests/test_more_coverage_fixed.py -v \
          --cov=core.orchestrator \
          --cov=database.models \
          --cov=tools.ffuf_integration_enhanced \
          --cov=tools.whatweb_integration \
          --cov=tools.wafw00f_integration \
          --cov=tools.subfinder_integration \
          --cov=tools.httpx_integration \
          --cov=tools.nikto_integration \
          --cov=tools.sherlock_integration \
          --cov=tools.ignorant_integration \
          --cov=tools.tshark_integration \
          --cov=tools.amass_integration \
          --cov=tools.masscan_integration \
          --cov=tools.gobuster_integration \
          --cov=tools.nmap_integration \
          --cov=modules.super_scanner \
          --cov=agents.agent_base \
          --cov=agents.agent_orchestrator \
          --cov=autonomous.agent_loop \
          --cov=autonomous.exploit_validator \
          --cov-report=xml:coverage.xml \
          --cov-report=term
      env:
        ADMIN_PASSWORD: testpass
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
        token: c92ff043-e4f0-4bcd-a117-6e978adfb8f7
    
    - name: Show coverage
      run: |
        echo "Coverage file:"
        ls -la coverage.xml
        head -20 coverage.xml
