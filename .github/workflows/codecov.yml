name: Codecov Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for proper blame/annotation
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        # Install minimal requirements for testing
        pip install pydantic sqlalchemy fastapi redis httpx email-validator
    
    - name: Run tests with coverage
      run: |
        pytest tests/ \
          -v \
          --ignore=tests/integration \
          --cov=tools \
          --cov=modules \
          --cov=core \
          --cov=agents \
          --cov=autonomous \
          --cov=database \
          --cov=dashboard \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          --cov-fail-under=0
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Generate coverage summary
      run: |
        echo "## Coverage Summary (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python << 'EOF'
        import xml.etree.ElementTree as ET
        import sys
        
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            
            # Get overall coverage
            line_rate = float(root.get('line-rate', 0))
            branch_rate = float(root.get('branch-rate', 0))
            
            line_pct = line_rate * 100
            branch_pct = branch_rate * 100
            
            print(f"**Line Coverage:** {line_pct:.1f}%")
            print(f"**Branch Coverage:** {branch_pct:.1f}%")
            print("")
            
            # Get packages with lowest coverage
            packages = []
            for pkg in root.findall('.//package'):
                name = pkg.get('name', 'unknown')
                pkg_line_rate = float(pkg.get('line-rate', 0))
                if pkg_line_rate < 1.0:  # Only show packages with missing coverage
                    packages.append((name, pkg_line_rate))
            
            if packages:
                print("### Packages Needing Attention:")
                packages.sort(key=lambda x: x[1])
                for name, rate in packages[:10]:
                    print(f"- {name}: {rate*100:.1f}%")
        
        except Exception as e:
            print(f"Could not parse coverage report: {e}")
            sys.exit(0)
        EOF
        >> $GITHUB_STEP_SUMMARY

  coverage-report:
    needs: coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install pytest pytest-cov
        pip install pydantic sqlalchemy fastapi
    
    - name: Run tests and generate HTML report
      run: |
        pytest tests/ \
          --ignore=tests/integration \
          --cov=tools \
          --cov=modules \
          --cov=core \
          --cov=agents \
          --cov=autonomous \
          --cov=database \
          --cov=dashboard \
          --cov-report=html:htmlcov \
          --cov-report=xml:coverage.xml
    
    - name: Upload HTML report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30
    
    - name: Comment PR with coverage summary
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read coverage XML to get overall percentage
          const xmlContent = fs.readFileSync('coverage.xml', 'utf8');
          const lineRateMatch = xmlContent.match(/line-rate="([\d.]+)"/);
          const lineRate = lineRateMatch ? parseFloat(lineRateMatch[1]) : 0;
          const coverage = (lineRate * 100).toFixed(1);
          
          // Determine color based on coverage
          let color = 'red';
          if (parseFloat(coverage) >= 80) color = 'brightgreen';
          else if (parseFloat(coverage) >= 60) color = 'green';
          else if (parseFloat(coverage) >= 40) color = 'yellow';
          else if (parseFloat(coverage) >= 20) color = 'orange';
          
          const body = `## 📊 Coverage Report
          
          ![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})
          
          - **Overall Coverage:** ${coverage}%
          - **Python Versions Tested:** 3.11, 3.12, 3.13
          - **Tests Run:** Unit tests
          
          <details>
          <summary>View Details</summary>
          
          Coverage is calculated based on all modules in the repository excluding:
          - External tool integrations (tools/)
          - API routes requiring server (api/)
          - Test files themselves
          
          </details>
          
          *Generated by Codecov Workflow*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
