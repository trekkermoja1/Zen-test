name: Codecov Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        pip install pydantic sqlalchemy fastapi redis httpx email-validator pyjwt python-multipart passlib 'bcrypt<4.1'
    
    - name: Run tests with coverage
      run: |
        pytest tests/ \
          -v \
          --ignore=tests/integration \
          --ignore=tests/fuzz/test_input_validation.py \
          --ignore=tests/test_api_routes_agents.py \
          --ignore=tests/test_api_routes_scans.py \
          --ignore=tests/test_react_agent.py \
          --ignore=tests/unit/analysis_bot/test_analysis_bot.py \
          --ignore=tests/unit/core/test_models.py \
          --cov=tools.ffuf_integration_enhanced \
          --cov=tools.whatweb_integration \
          --cov=tools.wafw00f_integration \
          --cov=tools.subfinder_integration \
          --cov=tools.httpx_integration \
          --cov=tools.nikto_integration \
          --cov=tools.sherlock_integration \
          --cov=tools.ignorant_integration \
          --cov=tools.tshark_integration \
          --cov=tools.amass_integration \
          --cov=tools.masscan_integration \
          --cov=tools.gobuster_integration \
          --cov=tools.nmap_integration \
          --cov=tools.tool_registry \
          --cov=tools.tool_caller \
          --cov=modules.enhanced_recon \
          --cov=modules.osint_super \
          --cov=modules.super_scanner \
          --cov=core.orchestrator \
          --cov=database.models \
          --cov=agents.agent_base \
          --cov=agents.agent_orchestrator \
          --cov=autonomous.agent_loop \
          --cov=autonomous.exploit_validator \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          --cov-fail-under=0
      env:
        ADMIN_PASSWORD: testpass
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
        token: c92ff043-e4f0-4bcd-a117-6e978adfb8f7
    
    - name: Generate coverage summary
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        python << 'EOF'
        import xml.etree.ElementTree as ET
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            line_rate = float(root.get('line-rate', 0))
            line_pct = line_rate * 100
            print(f"**Coverage:** {line_pct:.1f}%")
            print(f"Coverage: {line_pct:.1f}%" >> $GITHUB_STEP_SUMMARY
        except Exception as e:
            print(f"Error: {e}")
        EOF
