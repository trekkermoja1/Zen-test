name: Codecov Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        pip install pydantic sqlalchemy fastapi redis httpx email-validator pyjwt python-multipart passlib 'bcrypt<4.1'
    
    - name: Run tests with coverage
      run: |
        pytest tests/test_working_final.py tests/test_working_execution.py tests/test_core_execution.py tests/test_more_coverage_fixed.py \
          -v \
          --cov=core.orchestrator \
          --cov=database.models \
          --cov=tools.ffuf_integration_enhanced \
          --cov=tools.whatweb_integration \
          --cov=tools.wafw00f_integration \
          --cov=tools.subfinder_integration \
          --cov=tools.httpx_integration \
          --cov=tools.nikto_integration \
          --cov=tools.sherlock_integration \
          --cov=tools.ignorant_integration \
          --cov=tools.tshark_integration \
          --cov=tools.amass_integration \
          --cov=tools.masscan_integration \
          --cov=tools.gobuster_integration \
          --cov=tools.nmap_integration \
          --cov=modules.super_scanner \
          --cov=agents.agent_base \
          --cov=agents.agent_orchestrator \
          --cov=autonomous.agent_loop \
          --cov=autonomous.exploit_validator \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          --cov-fail-under=0
      env:
        ADMIN_PASSWORD: testpass
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Coverage Summary
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        python << 'EOF'
        import xml.etree.ElementTree as ET
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            line_rate = float(root.get('line-rate', 0))
            line_pct = line_rate * 100
            print(f"Coverage: {line_pct:.1f}%")
            with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                f.write(f"Coverage: {line_pct:.1f}%\n")
        except Exception as e:
            print(f"Error: {e}")
        EOF
      env:
        GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
