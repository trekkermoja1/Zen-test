name: Postman API Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: postman/package.json
    
    - name: Install Newman
      working-directory: ./postman
      run: |
        npm ci
    
    - name: Start API Server (for local tests)
      if: github.event.inputs.environment == 'local' || github.event_name == 'push' || github.event_name == 'pull_request'
      run: |
        # Install Python dependencies
        pip install -r requirements.txt
        
        # Create required directories
        mkdir -p logs evidence data/sql_injection templates/reports
        
        # Start API server in background
        python -m api.main &
        
        # Wait for server to start
        echo "Waiting for API server to start..."
        for i in {1..30}; do
          if curl -s http://localhost:8000/health > /dev/null; then
            echo "API server is ready!"
            break
          fi
          sleep 1
        done
        
        # Check if server is running
        curl -v http://localhost:8000/health || exit 1
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
    
    - name: Run Postman Collection
      working-directory: ./postman
      run: |
        ENVIRONMENT="${{ github.event.inputs.environment || 'local' }}"
        echo "Running tests against $ENVIRONMENT environment"
        
        node newman-runner.js run $ENVIRONMENT || true
      continue-on-error: true
    
    - name: Upload Test Reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: postman-test-reports-${{ github.run_id }}
        path: |
          postman/reports/*.html
          postman/reports/*.json
          postman/reports/*.xml
          postman/reports/*-summary.json
        retention-days: 30
    
    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find latest summary file
          const reportsDir = './postman/reports';
          let summaryContent = null;
          
          try {
            const files = fs.readdirSync(reportsDir);
            const summaryFiles = files.filter(f => f.endsWith('-summary.json'));
            
            if (summaryFiles.length > 0) {
              // Get most recent
              summaryFiles.sort().reverse();
              const summaryPath = path.join(reportsDir, summaryFiles[0]);
              summaryContent = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            }
          } catch (error) {
            console.log('Could not read summary:', error.message);
          }
          
          let body = '## 🧪 Postman API Test Results\n\n';
          
          if (summaryContent) {
            const stats = summaryContent.stats;
            const status = summaryContent.failures > 0 ? '❌ FAILED' : '✅ PASSED';
            
            body += `**Status:** ${status}\n\n`;
            body += `**Environment:** ${summaryContent.environment}\n\n`;
            body += '| Metric | Value |\n';
            body += '|--------|-------|\n';
            body += `| Total Requests | ${stats.requests.total} |\n`;
            body += `| Failed Requests | ${stats.requests.failed} |\n`;
            body += `| Total Tests | ${stats.tests.total} |\n`;
            body += `| Failed Tests | ${stats.tests.failed} |\n`;
            body += `| Assertions | ${stats.assertions.total} |\n`;
            body += `| Failed Assertions | ${stats.assertions.failed} |\n`;
            body += `| Avg Response Time | ${summaryContent.timings.responseAverage}ms |\n\n';
            
            if (summaryContent.failures > 0) {
              body += `**${summaryContent.failures} test(s) failed**\n\n`;
            }
          } else {
            body += '⚠️ Could not load test results. Check the workflow logs.\n';
          }
          
          body += '\n📄 [View detailed reports in Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
          
          // Create or update comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('Postman API Test Results')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }
    
    - name: Health Check Summary
      if: always()
      run: |
        echo "## Postman Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f ./postman/reports/*-summary.json ]; then
          SUMMARY_FILE=$(ls -t ./postman/reports/*-summary.json | head -1)
          echo "📊 Report: $SUMMARY_FILE" >> $GITHUB_STEP_SUMMARY
          cat $SUMMARY_FILE | jq -r '"| \(.stats.requests.total) requests | \(.stats.tests.total) tests | \(.failures) failures |"' >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No test reports generated" >> $GITHUB_STEP_SUMMARY
        fi

  # Smoke test against staging (only on schedule or manual trigger)
  smoke-test-staging:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    needs: postman-tests
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: postman/package.json
    
    - name: Install Newman
      working-directory: ./postman
      run: npm ci
    
    - name: Run Smoke Tests (Staging)
      working-directory: ./postman
      run: node newman-runner.js health staging
      env:
        STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
        STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
    
    - name: Notify on Failure
      if: failure()
      uses: actions/github-script@v8
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 Staging Smoke Test Failed - ${new Date().toISOString()}`,
            body: `Staging environment smoke test failed at ${new Date().toISOString()}\n\n[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            labels: ['staging', 'smoke-test', 'critical']
          });
