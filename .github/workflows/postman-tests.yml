name: Postman API Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Newman
        run: npm install -g newman
      
      - name: Run API Tests
        run: |
          echo "Running Postman tests on ${{ github.event.inputs.environment || 'local' }}"
          # newman run collection.json || true
