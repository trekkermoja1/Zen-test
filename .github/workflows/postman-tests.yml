name: Postman API Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'api/**'
      - 'postman/**'
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Postman Tests
        run: |
          echo "Running Postman API tests..."
          echo "Environment: ${{ github.event.inputs.environment || 'local' }}"
          echo "✅ Postman tests completed (placeholder)"
  cancel-in-progress: true
