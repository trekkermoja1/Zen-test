name: Webhook Notify

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send webhook notification
        if: secrets.WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"event":"${{ github.event_name }}","ref":"${{ github.ref }}","repo":"${{ github.repository }}"}' \
            ${{ secrets.WEBHOOK_URL }} || echo "Webhook not configured"
