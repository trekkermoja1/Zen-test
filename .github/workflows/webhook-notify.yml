name: Webhook Notifications

on:
  workflow_run:
    workflows: 
      - "Python Application - Test & Lint"
      - "Run Framework Demos"
      - "CodeQL - Security Analysis"
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Prepare notification payload
        id: prepare
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          STATUS="${{ github.event.workflow_run.status }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          
          # Determine emoji based on status
          if [ "$CONCLUSION" == "success" ]; then
            EMOJI="✅"
            COLOR="3066993"  # Green
          elif [ "$CONCLUSION" == "failure" ]; then
            EMOJI="❌"
            COLOR="15158332"  # Red
          else
            EMOJI="⚠️"
            COLOR="16776960"  # Yellow
          fi
          
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          
          # Create JSON payload
          cat > payload.json << EOF
          {
            "embeds": [{
              "title": "$EMOJI $WORKFLOW_NAME",
              "description": "Workflow completed with status: **$CONCLUSION**",
              "color": $COLOR,
              "fields": [
                {
                  "name": "Branch",
                  "value": "$BRANCH",
                  "inline": true
                },
                {
                  "name": "Status",
                  "value": "$STATUS",
                  "inline": true
                },
                {
                  "name": "Run ID",
                  "value": "#$RUN_ID",
                  "inline": true
                }
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "url": "$RUN_URL",
              "footer": {
                "text": "Zen AI Pentest CI/CD"
              }
            }]
          }
          EOF
          
          cat payload.json

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.DISCORD_WEBHOOK }}"
        continue-on-error: true

      - name: Send to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        if: ${{ env.SLACK_WEBHOOK != '' }}
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          
          if [ "$CONCLUSION" == "success" ]; then
            COLOR="good"
          else
            COLOR="danger"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$WORKFLOW_NAME\",
                \"title_link\": \"$RUN_URL\",
                \"text\": \"Workflow completed: $CONCLUSION\"
              }]
            }" \
            "${{ secrets.SLACK_WEBHOOK }}"
        continue-on-error: true

      - name: Log notification
        run: |
          echo "Notification sent for workflow: ${{ github.event.workflow_run.name }}"
          echo "Status: ${{ github.event.workflow_run.conclusion }}"
