name: Snyk Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check Snyk Token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "⚠️ SNYK_TOKEN is not set!"
            echo "Please add SNYK_TOKEN to repository secrets:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ SNYK_TOKEN is configured"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Snyk CLI
        run: |
          npm install -g snyk
          snyk --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt found"

      - name: Run Snyk to check for vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --severity-threshold=high || true
        continue-on-error: true

      - name: Generate SARIF report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --severity-threshold=high --sarif-file-output=snyk.sarif || echo "No vulnerabilities found or error occurred"
        continue-on-error: true

      - name: Check SARIF file exists
        id: check-sarif
        run: |
          if [ -f "snyk.sarif" ] && [ -s "snyk.sarif" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No SARIF file generated - creating empty report"
            echo '{"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Snyk"}}, "results": []}]}' > snyk.sarif
          fi

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@17a1043258c5b7d6fc27a0295b7b6e5f6f4b6c5e # v3.28.5
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Snyk monitor (for dashboard)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk monitor || true
        continue-on-error: true

  snyk-code:
    name: Snyk Code Analysis (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Code Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --severity-threshold=high || true
        continue-on-error: true

  snyk-container:
    name: Snyk Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Build Docker image
        run: docker build -t zen-ai-pentest:test . || echo "No Dockerfile found"
        continue-on-error: true

      - name: Run Snyk Container Test
        if: hashFiles('Dockerfile') != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container test zen-ai-pentest:test --severity-threshold=high || true
        continue-on-error: true

  snyk-iac:
    name: Snyk Infrastructure as Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk IaC Test
        if: hashFiles('k8s/') != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk iac test k8s/ --severity-threshold=medium || true
        continue-on-error: true
