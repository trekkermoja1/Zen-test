name: PyPI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to TestPyPI'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      id-token: write  # For OIDC-based publishing
    environment:
      name: pypi
      url: https://pypi.org/project/zen-ai-pentest/${{ github.ref_name }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
      
    - name: Check package
      run: twine check dist/*
    
    - name: Create PyPI Deployment
      uses: actions/github-script@v7
      id: create-deployment
      with:
        script: |
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: 'pypi',
            auto_merge: false,
            required_contexts: [],
            description: `Deploy ${context.ref} to PyPI`
          });
          return deployment.data.id;
    
    - name: Publish to PyPI
      if: github.event.inputs.test_pypi != 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    
    - name: Mark Deployment Success
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const deploymentId = ${{ steps.create-deployment.outputs.result }};
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deploymentId,
            state: 'success',
            description: 'Successfully published to PyPI',
            environment_url: `https://pypi.org/project/zen-ai-pentest/${context.ref.replace('v', '')}/`
          });
    
    - name: Mark Deployment Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const deploymentId = ${{ steps.create-deployment.outputs.result }};
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deploymentId,
            state: 'failure',
            description: 'Failed to publish to PyPI'
          });
