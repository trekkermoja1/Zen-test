name: Enforce Branch Protection

# This workflow runs when someone attempts to push directly to master/main
# It will fail and provide instructions on how to properly contribute

on:
  push:
    branches: [master, main]

jobs:
  prevent-direct-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_protected != true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if push is from PR merge
        id: check-merge
        run: |
          # Check if this push is from a merged PR
          if [[ "${{ github.event.head_commit.message }}" == *"Merge pull request"* ]]; then
            echo "is_pr_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This is a PR merge - allowed"
          elif [[ "${{ github.event.head_commit.message }}" == *"automated"* ]] || [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "is_automated=true" >> $GITHUB_OUTPUT
            echo "✅ This is an automated commit - allowed"
          else
            echo "is_direct_push=true" >> $GITHUB_OUTPUT
            echo "❌ Direct push detected"
          fi
        shell: bash

      - name: Block Direct Push
        if: steps.check-merge.outputs.is_direct_push == 'true'
        run: |
          echo "❌ ERROR: Direct push to ${{ github.ref_name }} is not allowed!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚫 DIRECT PUSH TO PROTECTED BRANCH DETECTED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "All changes must go through a Pull Request!"
          echo ""
          echo "📋 How to properly contribute:"
          echo ""
          echo "1. Create a feature branch:"
          echo "   git checkout -b feature/my-feature"
          echo ""
          echo "2. Make your changes and commit:"
          echo "   git add ."
          echo "   git commit -m 'feat: add new feature'"
          echo ""
          echo "3. Push to the feature branch:"
          echo "   git push origin feature/my-feature"
          echo ""
          echo "4. Open a Pull Request on GitHub"
          echo "   - Go to: https://github.com/${{ github.repository }}/pulls"
          echo "   - Click 'New Pull Request'"
          echo "   - Select your feature branch"
          echo "   - Fill in the PR template"
          echo ""
          echo "5. Wait for:"
          echo "   - Code review approval"
          echo "   - CI checks to pass"
          echo "   - Security scans to complete"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🔗 Useful links:"
          echo "   - Contributing Guide: https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md"
          echo "   - Branch Protection: https://github.com/${{ github.repository }}/blob/main/docs/BRANCH_PROTECTION.md"
          echo ""
          echo "If you believe this is an error, contact the repository administrators."
          echo ""
          
          exit 1
        shell: bash

      - name: Success Message
        if: steps.check-merge.outputs.is_pr_merge == 'true' || steps.check-merge.outputs.is_automated == 'true'
        run: |
          echo "✅ Push allowed - this appears to be a legitimate merge or automated commit"
