name: Benchmarks

on:
  # Run weekly on Sundays at 3 AM UTC
  schedule:
    - cron: '0 3 * * 0'
  
  # Run on PRs that modify performance-critical code
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'modules/**'
      - 'agents/**'
      - 'api/**'
      - 'core/**'
      - 'tools/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - scan
          - agent
          - api
          - quick
      compare_with_baseline:
        description: 'Compare with baseline'
        required: false
        default: true
        type: boolean
      update_baseline:
        description: 'Update baseline after successful run'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

env:
  PYTHON_VERSION: '3.11'
  BENCHMARK_RESULTS_DIR: benchmark_results

jobs:
  # ============================================================================
  # Run Performance Benchmarks
  # ============================================================================
  run-benchmarks:
    name: Run Benchmarks (${{ github.event.inputs.benchmark_type || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    outputs:
      results_path: ${{ steps.run.outputs.results_path }}
      summary: ${{ steps.run.outputs.summary }}
      has_regression: ${{ steps.compare.outputs.has_regression }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psutil pytest pytest-asyncio
      
      - name: Create benchmark directories
        run: |
          mkdir -p ${{ env.BENCHMARK_RESULTS_DIR }}
          mkdir -p benchmark_artifacts
      
      - name: Download previous baseline
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baselines
          path: ${{ env.BENCHMARK_RESULTS_DIR }}
        continue-on-error: true
      
      - name: Run benchmarks
        id: run
        run: |
          benchmark_type="${{ github.event.inputs.benchmark_type || 'all' }}"
          echo "Running benchmarks: $benchmark_type"
          
          # Run benchmark script
          python scripts/run_benchmarks.py --type "$benchmark_type" --output ${{ env.BENCHMARK_RESULTS_DIR }} || true
          
          # Set output path
          results_path="${{ env.BENCHMARK_RESULTS_DIR }}/benchmark_report.json"
          if [ -f "$results_path" ]; then
            echo "results_path=$results_path" >> $GITHUB_OUTPUT
            
            # Generate summary
            summary=$(python scripts/run_benchmarks.py --summarize --input "$results_path" || echo "Summary not available")
            echo "summary=$summary" >> $GITHUB_OUTPUT
          fi
        env:
          PYTHONIOENCODING: utf-8
      
      - name: Compare with baseline
        id: compare
        if: github.event.inputs.compare_with_baseline != 'false'
        run: |
          baseline_path="${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json"
          results_path="${{ steps.run.outputs.results_path }}"
          
          if [ -f "$baseline_path" ] && [ -f "$results_path" ]; then
            echo "Comparing with baseline..."
            python scripts/run_benchmarks.py --compare --baseline "$baseline_path" --results "$results_path" --output comparison_report.json || true
            
            # Check for regressions
            if [ -f "comparison_report.json" ]; then
              has_regression=$(python3 -c "
import json
import sys
try:
    with open('comparison_report.json', 'r') as f:
        data = json.load(f)
    print('true' if data.get('regressions_found', False) else 'false')
except:
    print('false')
" )
              echo "has_regression=$has_regression" >> $GITHUB_OUTPUT
              
              if [ "$has_regression" = "true" ]; then
                echo "::warning::Performance regressions detected!"
              fi
            fi
          else
            echo "No baseline found, skipping comparison"
            echo "has_regression=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Update baseline
        if: github.event.inputs.update_baseline == 'true' && steps.compare.outputs.has_regression != 'true'
        run: |
          echo "Updating baseline..."
          cp "${{ steps.run.outputs.results_path }}" "${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json"
      
      - name: Generate markdown report
        run: |
          python scripts/run_benchmarks.py --report --input "${{ env.BENCHMARK_RESULTS_DIR }}" --output benchmark_report.md || true
          
          if [ -f "benchmark_report.md" ]; then
            cat benchmark_report.md
          fi
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ${{ env.BENCHMARK_RESULTS_DIR }}/
            benchmark_report.md
            comparison_report.json
          retention-days: 90
      
      - name: Upload baseline
        if: github.event.inputs.update_baseline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baselines
          path: ${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json
          retention-days: 365

  # ============================================================================
  # Comment on PR with Results
  # ============================================================================
  pr-comment:
    name: Comment PR with Benchmark Results
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'pull_request' && needs.run-benchmarks.outputs.results_path != ''
    
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-artifacts/
      
      - name: Generate PR comment
        id: generate-comment
        run: |
          report_path="benchmark-artifacts/benchmark_report.md"
          comparison_path="benchmark-artifacts/comparison_report.json"
          
          {
            echo "## 📊 Performance Benchmark Results"
            echo ""
            
            if [ -f "$report_path" ]; then
              cat "$report_path"
            else
              echo "Benchmark report not found."
            fi
            
            # Add comparison section if available
            if [ -f "$comparison_path" ]; then
              echo ""
              echo "### 📈 Comparison with Baseline"
              echo ""
              
              has_regressions=$(python3 -c "
import json
try:
    with open('$comparison_path', 'r') as f:
        data = json.load(f)
    print('true' if data.get('regressions_found', False) else 'false')
except:
    print('false')
" )
              
              if [ "$has_regressions" = "true" ]; then
                echo "⚠️ **Performance regressions detected!**"
                echo ""
                echo "| Metric | Baseline | Current | Change |"
                echo "|--------|----------|---------|--------|"
                python3 -c "
import json
try:
    with open('$comparison_path', 'r') as f:
        data = json.load(f)
    for reg in data.get('regressions', []):
        print(f\"| {reg.get('metric')} | {reg.get('baseline')} | {reg.get('current')} | +{reg.get('change_percent')}% |\")
except Exception as e:
    pass
" 
              else
                echo "✅ No performance regressions detected."
              fi
            fi
            
            echo ""
            echo "<details>"
            echo "<summary>View Raw Results</summary>"
            echo ""
            echo "See workflow artifacts for detailed benchmark results."
            echo "</details>"
          } > pr_comment.md
      
      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr_comment.md', 'utf8');
            
            // Find existing benchmark comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const benchmarkComment = comments.data.find(c => 
              c.body.includes('📊 Performance Benchmark Results')
            );
            
            if (benchmarkComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: benchmarkComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  # ============================================================================
  # Update Benchmark Issue (Weekly Schedule)
  # ============================================================================
  update-benchmark-issue:
    name: Update Benchmark Tracking Issue
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'schedule'
    
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-artifacts/
      
      - name: Generate issue content
        id: generate-issue
        run: |
          date=$(date +%Y-%m-%d)
          report_path="benchmark-artifacts/benchmark_report.md"
          
          {
            echo "## 📊 Weekly Benchmark Results - $date"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            
            if [ -f "$report_path" ]; then
              cat "$report_path"
            else
              echo "Benchmark report not available. Please check workflow artifacts."
            fi
          } > issue_content.md
      
      - name: Create or update benchmark issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_content.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            
            // Find existing benchmark tracking issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'benchmarks,automated',
              state: 'open'
            });
            
            const benchmarkIssue = issues.data.find(i => 
              i.title.includes('Weekly Benchmark Results')
            );
            
            if (benchmarkIssue) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: benchmarkIssue.number,
                body: body
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Weekly Benchmark Results - ${date}`,
                body: body,
                labels: ['benchmarks', 'automated', 'performance']
              });
            }

  # ============================================================================
  # Fail on Regression Check
  # ============================================================================
  regression-check:
    name: Check for Performance Regressions
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check for regressions
        run: |
          has_regression="${{ needs.run-benchmarks.outputs.has_regression }}"
          
          if [ "$has_regression" = "true" ]; then
            echo "::error::Performance regression detected!"
            echo "Please review the benchmark comparison in the PR comments."
            exit 1
          else
            echo "✅ No performance regressions detected"
          fi

  # ============================================================================
  # Benchmark Summary
  # ============================================================================
  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [run-benchmarks, pr-comment, regression-check]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Generate Summary
        run: |
          run_status="${{ needs.run-benchmarks.result }}"
          comment_status="${{ needs.pr-comment.result }}"
          regression_status="${{ needs.regression-check.result }}"
          
          {
            echo "## 🏆 Performance Benchmark Summary"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Run Benchmarks | $run_status |"
            echo "| PR Comment | $comment_status |"
            echo "| Regression Check | $regression_status |"
            echo ""
            
            if [ "$run_status" = "success" ]; then
              echo "✅ Benchmarks completed successfully!"
              echo ""
              echo "📁 Results available as workflow artifacts."
            else
              echo "⚠️ Benchmarks completed with issues. Check logs for details."
            fi
          } >> $GITHUB_STEP_SUMMARY
