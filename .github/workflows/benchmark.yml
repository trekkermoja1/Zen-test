name: Performance Benchmarks

on:
  # Run weekly on Sundays at 3 AM UTC
  schedule:
    - cron: '0 3 * * 0'
  
  # Run on PRs that modify performance-critical code
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'modules/**'
      - 'agents/**'
      - 'api/**'
      - 'core/**'
      - 'tools/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - scan
          - agent
          - api
          - quick
      compare_with_baseline:
        description: 'Compare with baseline'
        required: false
        default: true
        type: boolean
      update_baseline:
        description: 'Update baseline after successful run'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

env:
  PYTHON_VERSION: '3.11'
  BENCHMARK_RESULTS_DIR: benchmark_results

jobs:
  # ============================================================================
  # Run Performance Benchmarks
  # ============================================================================
  run-benchmarks:
    name: Run Benchmarks (${{ github.event.inputs.benchmark_type || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    outputs:
      results_path: ${{ steps.run.outputs.results_path }}
      summary: ${{ steps.run.outputs.summary }}
      has_regression: ${{ steps.compare.outputs.has_regression }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psutil pytest pytest-asyncio
      
      - name: Create benchmark directories
        run: |
          mkdir -p ${{ env.BENCHMARK_RESULTS_DIR }}
          mkdir -p benchmark_artifacts
      
      - name: Download previous baseline
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baselines
          path: ${{ env.BENCHMARK_RESULTS_DIR }}
        continue-on-error: true
      
      - name: Run benchmarks
        id: run
        run: |
          $benchmarkType = "${{ github.event.inputs.benchmark_type || 'all' }}"
          Write-Host "Running benchmarks: $benchmarkType"
          
          # Run benchmark script
          python scripts/run_benchmarks.py --type $benchmarkType --output ${{ env.BENCHMARK_RESULTS_DIR }}
          
          # Set output path
          $resultsPath = "${{ env.BENCHMARK_RESULTS_DIR }}/benchmark_report.json"
          if (Test-Path $resultsPath) {
            "results_path=$resultsPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            
            # Generate summary
            $summary = python scripts/run_benchmarks.py --summarize --input $resultsPath
            "summary=$summary" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
      
      - name: Compare with baseline
        id: compare
        if: github.event.inputs.compare_with_baseline != 'false'
        run: |
          $baselinePath = "${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json"
          $resultsPath = "${{ steps.run.outputs.results_path }}"
          
          if ((Test-Path $baselinePath) -and (Test-Path $resultsPath)) {
            Write-Host "Comparing with baseline..."
            python scripts/run_benchmarks.py --compare --baseline $baselinePath --results $resultsPath --output comparison_report.json
            
            # Check for regressions
            if (Test-Path "comparison_report.json") {
              $comparison = Get-Content "comparison_report.json" | ConvertFrom-Json
              $hasRegression = $comparison.regressions_found -eq $true
              "has_regression=$hasRegression" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              
              if ($hasRegression) {
                Write-Host "::warning::Performance regressions detected!"
              }
            }
          } else {
            Write-Host "No baseline found, skipping comparison"
            "has_regression=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        shell: pwsh
      
      - name: Update baseline
        if: github.event.inputs.update_baseline == 'true' && steps.compare.outputs.has_regression != 'true'
        run: |
          Write-Host "Updating baseline..."
          Copy-Item "${{ steps.run.outputs.results_path }}" "${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json" -Force
      
      - name: Generate markdown report
        run: |
          python scripts/run_benchmarks.py --report --input "${{ env.BENCHMARK_RESULTS_DIR }}" --output benchmark_report.md
          
          if (Test-Path "benchmark_report.md") {
            Get-Content benchmark_report.md
          }
        shell: pwsh
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ${{ env.BENCHMARK_RESULTS_DIR }}/
            benchmark_report.md
            comparison_report.json
          retention-days: 90
      
      - name: Upload baseline
        if: github.event.inputs.update_baseline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baselines
          path: ${{ env.BENCHMARK_RESULTS_DIR }}/baselines.json
          retention-days: 365

  # ============================================================================
  # Comment on PR with Results
  # ============================================================================
  pr-comment:
    name: Comment PR with Benchmark Results
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'pull_request' && needs.run-benchmarks.outputs.results_path != ''
    
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-artifacts/
      
      - name: Generate PR comment
        id: generate-comment
        run: |
          $reportPath = "benchmark-artifacts/benchmark_report.md"
          $comparisonPath = "benchmark-artifacts/comparison_report.json"
          
          $comment = "## 📊 Performance Benchmark Results`n`n"
          
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath -Raw
            $comment += $report
          } else {
            $comment += "Benchmark report not found.`n"
          }
          
          # Add comparison section if available
          if (Test-Path $comparisonPath) {
            $comparison = Get-Content $comparisonPath | ConvertFrom-Json
            $comment += "`n`n### 📈 Comparison with Baseline`n`n"
            
            if ($comparison.regressions_found) {
              $comment += "⚠️ **Performance regressions detected!**`n`n"
              $comment += "| Metric | Baseline | Current | Change |`n"
              $comment += "|--------|----------|---------|--------|`n"
              
              foreach ($reg in $comparison.regressions) {
                $comment += "| $($reg.metric) | $($reg.baseline) | $($reg.current) | +$($reg.change_percent)% |`n"
              }
            } else {
              $comment += "✅ No performance regressions detected.`n"
            }
            
            if ($comparison.improvements) {
              $comment += "`n**Improvements:**`n"
              foreach ($imp in $comparison.improvements) {
                $comment += "- $($imp.metric): $($imp.change_percent)% faster`n"
              }
            }
          }
          
          $comment += "`n`n<details>`n<summary>View Raw Results</summary>`n`n"
          $comment += "See workflow artifacts for detailed benchmark results.`n"
          $comment += "</details>`n"
          
          # Save comment to file
          $comment | Out-File -FilePath "pr_comment.md" -Encoding utf8
          
          # Set output
          $commentJson = $comment | ConvertTo-Json -Compress
          "comment=$commentJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh
      
      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr_comment.md', 'utf8');
            
            // Find existing benchmark comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const benchmarkComment = comments.data.find(c => 
              c.body.includes('📊 Performance Benchmark Results')
            );
            
            if (benchmarkComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: benchmarkComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  # ============================================================================
  # Update Benchmark Issue (Weekly Schedule)
  # ============================================================================
  update-benchmark-issue:
    name: Update Benchmark Tracking Issue
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'schedule'
    
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-artifacts/
      
      - name: Generate issue content
        id: generate-issue
        run: |
          $date = Get-Date -Format "yyyy-MM-dd"
          $reportPath = "benchmark-artifacts/benchmark_report.md"
          
          $body = "## 📊 Weekly Benchmark Results - $date`n`n"
          $body += "**Commit:** ${{ github.sha }}`n"
          $body += "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`n`n"
          
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath -Raw
            $body += $report
          } else {
            $body += "Benchmark report not available. Please check workflow artifacts.`n"
          }
          
          $body | Out-File -FilePath "issue_content.md" -Encoding utf8
        shell: pwsh
      
      - name: Create or update benchmark issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_content.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            
            // Find existing benchmark tracking issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'benchmarks,automated',
              state: 'open'
            });
            
            const benchmarkIssue = issues.data.find(i => 
              i.title.includes('Weekly Benchmark Results')
            );
            
            if (benchmarkIssue) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: benchmarkIssue.number,
                body: body
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Weekly Benchmark Results - ${date}`,
                body: body,
                labels: ['benchmarks', 'automated', 'performance']
              });
            }

  # ============================================================================
  # Fail on Regression Check
  # ============================================================================
  regression-check:
    name: Check for Performance Regressions
    runs-on: ubuntu-latest
    needs: run-benchmarks
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check for regressions
        run: |
          $hasRegression = "${{ needs.run-benchmarks.outputs.has_regression }}"
          
          if ($hasRegression -eq "true") {
            Write-Host "::error::Performance regression detected!"
            Write-Host "Please review the benchmark comparison in the PR comments."
            exit 1
          } else {
            Write-Host "✅ No performance regressions detected"
          }
        shell: pwsh

  # ============================================================================
  # Benchmark Summary
  # ============================================================================
  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [run-benchmarks, pr-comment, regression-check]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          $runStatus = "${{ needs.run-benchmarks.result }}"
          $commentStatus = "${{ needs.pr-comment.result }}"
          $regressionStatus = "${{ needs.regression-check.result }}"
          
          Write-Host "## 🏆 Performance Benchmark Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "| Job | Status |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "|-----|--------|" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "| Run Benchmarks | $runStatus |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "| PR Comment | $commentStatus |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "| Regression Check | $regressionStatus |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          
          if ($runStatus -eq "success") {
            Write-Host "✅ Benchmarks completed successfully!" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Write-Host "📁 Results available as workflow artifacts." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            Write-Host "⚠️ Benchmarks completed with issues. Check logs for details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
        shell: pwsh
