# =============================================================================
# Zen-AI-Pentest Ingress Configuration
# Requires NGINX Ingress Controller and cert-manager
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zen-pentest-ingress
  namespace: zen-pentest
  labels:
    app.kubernetes.io/name: zen-pentest
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"

    # Buffer settings
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://zen-pentest.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

    # cert-manager for TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - zen-pentest.example.com
        - api.zen-pentest.example.com
      secretName: zen-pentest-tls
  rules:
    - host: zen-pentest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zen-api
                port:
                  number: 8000
    - host: api.zen-pentest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zen-api
                port:
                  number: 8000
---
# Alternative: Separate ingress for Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zen-grafana-ingress
  namespace: zen-pentest
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Basic auth for Grafana
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: grafana-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.zen-pentest.example.com
      secretName: grafana-tls
  rules:
    - host: grafana.zen-pentest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
