# =============================================================================
# Zen-AI-Pentest Secrets Template
# WARNING: Do NOT commit actual secrets to version control!
# Use external secret management like Vault, AWS Secrets Manager, or Sealed Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: zen-pentest-secrets
  namespace: zen-pentest
  labels:
    app.kubernetes.io/name: zen-pentest
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  DB_PASSWORD: "change-me-in-production"
  DATABASE_URL: "postgresql://postgres:change-me@postgres:5432/zen_pentest"

  # Redis credentials
  REDIS_PASSWORD: "change-me-redis-password"
  REDIS_URL: "redis://:change-me-redis-password@redis:6379/0"

  # Security keys
  SECRET_KEY: "change-me-very-long-secret-key-min-32-chars"
  JWT_SECRET: "change-me-jwt-secret-key-min-32-chars"
  ENCRYPTION_KEY: "change-me-encryption-key-32-chars"

  # AI Provider API Keys
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""

  # SIEM Integration (optional)
  SPLUNK_HEC_TOKEN: ""
  ELASTICSEARCH_API_KEY: ""

  # Notification Settings (optional)
  SLACK_WEBHOOK_URL: ""
  DISCORD_WEBHOOK_URL: ""
  EMAIL_SMTP_PASSWORD: ""

  # Cloud Provider Credentials (optional)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AZURE_CLIENT_SECRET: ""
  GCP_SERVICE_ACCOUNT_KEY: ""
---
# TLS Secret (example - use cert-manager in production)
apiVersion: v1
kind: Secret
metadata:
  name: zen-pentest-tls
  namespace: zen-pentest
  labels:
    app.kubernetes.io/name: zen-pentest
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  tls.crt: "BASE64_ENCODED_CERTIFICATE"
  tls.key: "BASE64_ENCODED_PRIVATE_KEY"
