version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: zen-pentest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zen_pentest
      POSTGRES_USER: zen_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zen_user -d zen_pentest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional, for caching and message queue)
  redis:
    image: redis:7-alpine
    container_name: zen-pentest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Zen-AI-Pentest API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zen-pentest-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://zen_user:${DB_PASSWORD:-changeme}@db:5432/zen_pentest

      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Application
      APP_ENV: production
      LOG_LEVEL: INFO

      # Optional: VPN (ProtonVPN)
      # VPN_ENABLED: "true"
      # VPN_PROVIDER: protonvpn
    ports:
      - "8002:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./evidence:/app/evidence
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Starting API server...' &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: zen-pentest-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web_ui/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Pentest Agent (optional, can be scaled)
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: zen-pentest-agent
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      AGENT_ID: ${AGENT_ID:-docker-agent-1}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_API_SECRET: ${AGENT_API_SECRET:-}
    # Privileged mode needed for some security tools
    privileged: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent_data:/app/agent_data
    command: >
      sh -c "
        echo 'Waiting for API server...' &&
        sleep 10 &&
        echo 'Starting agent...' &&
        python -m agents.v2.worker_agent --server ws://api:8000/agents/ws --agent-id ${AGENT_ID:-docker-agent-1}
      "

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: zen-pentest-network
