# =============================================================================
# Zen-AI-Pentest GitLab CI/CD Template
# =============================================================================
# Description: Production-ready GitLab CI/CD integration for security scanning
# Version: 2.0.0
# Usage: Include this file in your .gitlab-ci.yml
# =============================================================================

# -----------------------------------------------------------------------------
# GLOBAL VARIABLES
# -----------------------------------------------------------------------------
variables:
  # Zen-AI-Pentest Configuration
  ZEN_PENTEST_VERSION: "2.0.0"
  ZEN_PENTEST_IMAGE: "zenai/zen-pentest:${ZEN_PENTEST_VERSION}"
  ZEN_PENTEST_CACHE_DIR: "$CI_PROJECT_DIR/.cache/zen-pentest"
  
  # Scan Configuration
  ZEN_SCAN_TARGET: "${CI_ENVIRONMENT_URL:-https://staging.example.com}"
  ZEN_SCAN_MODE: "full"
  ZEN_SCAN_INTENSITY: "medium"
  ZEN_SCAN_TIMEOUT: "3600"
  
  # Reporting
  ZEN_REPORT_FORMATS: "json,html,sarif"
  ZEN_REPORT_DIR: "$CI_PROJECT_DIR/reports"
  ZEN_ARTIFACT_RETENTION: "30 days"
  
  # Security Thresholds
  ZEN_MAX_CRITICAL: "0"
  ZEN_MAX_HIGH: "5"
  ZEN_MAX_RISK_SCORE: "50"
  
  # GitLab Integration
  ZEN_CREATE_ISSUES: "true"
  ZEN_CREATE_MR_DISCUSSIONS: "true"
  
  # Docker Configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# -----------------------------------------------------------------------------
# STAGES
# -----------------------------------------------------------------------------
stages:
  - build
  - test
  - security
  - report
  - notify

# -----------------------------------------------------------------------------
# GLOBAL CACHE CONFIGURATION
# -----------------------------------------------------------------------------
.default_cache: &default_cache
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip/
    - .cache/zen-pentest/
  policy: pull-push

# -----------------------------------------------------------------------------
# DOCKER SERVICE CONFIGURATION
# -----------------------------------------------------------------------------
.docker_services: &docker_services
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"

# -----------------------------------------------------------------------------
# ANCHORS - Reusable Configuration
# -----------------------------------------------------------------------------
.security_rules: &security_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

.only_main_branch: &only_main_branch
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.except_mr: &except_mr
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: never
    - when: always

# -----------------------------------------------------------------------------
# TEMPLATES
# -----------------------------------------------------------------------------
.zen_pentest_base:
  image: $ZEN_PENTEST_IMAGE
  before_script:
    - echo "🔧 Initializing Zen-AI-Pentest Environment"
    - mkdir -p $ZEN_REPORT_DIR $ZEN_PENTEST_CACHE_DIR
    - zen-pentest --version
    - |
      # Create configuration file
      cat > /tmp/zen-pentest-config.yaml << EOF
      core:
        threads: 10
        timeout: 300
        verbose: true
        log_level: INFO
        cache_dir: $ZEN_PENTEST_CACHE_DIR
      
      ai:
        provider: openai
        model: gpt-4
        api_key: "${OPENAI_API_KEY}"
      
      reporting:
        formats:
          - json
          - html
          - sarif
        output_dir: $ZEN_REPORT_DIR
        include_screenshots: true
      
      compliance:
        - owasp_top_10
        - pci_dss
        - iso27001
      
      gitlab:
        project_id: "${CI_PROJECT_ID}"
        merge_request_iid: "${CI_MERGE_REQUEST_IID}"
        api_token: "${GITLAB_API_TOKEN}"
      EOF
    - cp /tmp/zen-pentest-config.yaml ~/.config/zen-pentest/config.yaml
  cache:
    <<: *default_cache

# -----------------------------------------------------------------------------
# JOB DEFINITIONS
# -----------------------------------------------------------------------------

# ============================================================================
# STAGE: BUILD
# ============================================================================
build:zen-pentest-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_BUILDKIT: 1
  script:
    - echo "🐳 Building Zen-AI-Pentest Docker Image"
    - |
      docker build 
        --build-arg VERSION=$ZEN_PENTEST_VERSION 
        --tag $ZEN_PENTEST_IMAGE 
        --tag zenai/zen-pentest:latest 
        -f docker/Dockerfile .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docker/Dockerfile
        - requirements.txt
    - if: $CI_PIPELINE_SOURCE == "web"
  allow_failure: true

# ============================================================================
# STAGE: TEST
# ============================================================================
test:zen-pentest:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip
    - pip install -e .
  script:
    - echo "🧪 Running Zen-AI-Pentest Unit Tests"
    - pytest tests/ -v --cov=zen_pentest --cov-report=xml --cov-report=html
    - zen-pentest --help
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: test-results.xml
    paths:
      - htmlcov/
    expire_in: 1 week
  cache:
    paths:
      - .cache/pip/

# ============================================================================
# STAGE: SECURITY
# ============================================================================

# -----------------------------------------------------------------------------
# Security Scan - Reconnaissance Mode
# -----------------------------------------------------------------------------
security:recon:
  stage: security
  extends: .zen_pentest_base
  variables:
    ZEN_SCAN_MODE: "recon"
  script:
    - echo "🔍 Running Reconnaissance Scan"
    - |
      zen-pentest scan \
        --target "$ZEN_SCAN_TARGET" \
        --mode recon \
        --intensity "$ZEN_SCAN_INTENSITY" \
        --output-dir "$ZEN_REPORT_DIR/recon" \
        --format "$ZEN_REPORT_FORMATS" \
        --ci-mode
  artifacts:
    paths:
      - $ZEN_REPORT_DIR/recon/
    expire_in: $ZEN_ARTIFACT_RETENTION
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: manual
  allow_failure: true

# -----------------------------------------------------------------------------
# Security Scan - Vulnerability Assessment
# -----------------------------------------------------------------------------
security:vuln-scan:
  stage: security
  extends: .zen_pentest_base
  needs:
    - job: security:recon
      optional: true
  variables:
    ZEN_SCAN_MODE: "vuln"
  script:
    - echo "🛡️ Running Vulnerability Assessment"
    - |
      zen-pentest scan \
        --target "$ZEN_SCAN_TARGET" \
        --mode vuln \
        --intensity "$ZEN_SCAN_INTENSITY" \
        --output-dir "$ZEN_REPORT_DIR/vuln" \
        --format "$ZEN_REPORT_FORMATS" \
        --ci-mode
  artifacts:
    paths:
      - $ZEN_REPORT_DIR/vuln/
    expire_in: $ZEN_ARTIFACT_RETENTION
    when: always
    reports:
      # GitLab Security Dashboard Integration
      sast: $ZEN_REPORT_DIR/vuln/scan-results.sarif
  dependencies: []
  rules: *security_rules

# -----------------------------------------------------------------------------
# Security Scan - Full Assessment
# -----------------------------------------------------------------------------
security:full-scan:
  stage: security
  extends: .zen_pentest_base
  variables:
    ZEN_SCAN_MODE: "full"
  script:
    - echo "🔒 Running Full Security Assessment"
    - |
      SCAN_ID="scan-$(date +%Y%m%d-%H%M%S)-${CI_COMMIT_SHORT_SHA}"
      echo "SCAN_ID=$SCAN_ID" >> scan.env
      
      zen-pentest scan \
        --target "$ZEN_SCAN_TARGET" \
        --mode full \
        --intensity "$ZEN_SCAN_INTENSITY" \
        --output-dir "$ZEN_REPORT_DIR/full" \
        --format "$ZEN_REPORT_FORMATS" \
        --scan-id "$SCAN_ID" \
        --ci-mode 2>&1 | tee "$ZEN_REPORT_DIR/full/scan-log.txt"
    
    # Parse results for thresholds
    - |
      if [ -f "$ZEN_REPORT_DIR/full/scan-results.json" ]; then
        CRITICAL=$(jq '.summary.critical // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        HIGH=$(jq '.summary.high // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        RISK_SCORE=$(jq '.summary.risk_score // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        
        echo "CRITICAL=$CRITICAL" >> scan.env
        echo "HIGH=$HIGH" >> scan.env
        echo "RISK_SCORE=$RISK_SCORE" >> scan.env
        
        # Check thresholds
        FAILED=0
        if [ "$CRITICAL" -gt "$ZEN_MAX_CRITICAL" ]; then
          echo "❌ Critical threshold exceeded: $CRITICAL > $ZEN_MAX_CRITICAL"
          FAILED=1
        fi
        if [ "$HIGH" -gt "$ZEN_MAX_HIGH" ]; then
          echo "❌ High threshold exceeded: $HIGH > $ZEN_MAX_HIGH"
          FAILED=1
        fi
        if [ "$RISK_SCORE" -gt "$ZEN_MAX_RISK_SCORE" ]; then
          echo "❌ Risk score threshold exceeded: $RISK_SCORE > $ZEN_MAX_RISK_SCORE"
          FAILED=1
        fi
        
        if [ $FAILED -eq 1 ]; then
          exit 1
        fi
      fi
  artifacts:
    paths:
      - $ZEN_REPORT_DIR/full/
    expire_in: $ZEN_ARTIFACT_RETENTION
    when: always
    reports:
      sast: $ZEN_REPORT_DIR/full/scan-results.sarif
  dependencies: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

# -----------------------------------------------------------------------------
# Security Scan - Stealth Mode (for production)
# -----------------------------------------------------------------------------
security:stealth-scan:
  stage: security
  extends: .zen_pentest_base
  variables:
    ZEN_SCAN_MODE: "stealth"
    ZEN_SCAN_INTENSITY: "low"
  script:
    - echo "🥷 Running Stealth Security Assessment"
    - |
      zen-pentest scan \
        --target "$ZEN_SCAN_TARGET" \
        --mode stealth \
        --intensity low \
        --output-dir "$ZEN_REPORT_DIR/stealth" \
        --format "$ZEN_REPORT_FORMATS" \
        --ci-mode
  artifacts:
    paths:
      - $ZEN_REPORT_DIR/stealth/
    expire_in: $ZEN_ARTIFACT_RETENTION
    when: always
    reports:
      sast: $ZEN_REPORT_DIR/stealth/scan-results.sarif
  rules:
    - if: $CI_ENVIRONMENT_NAME == "production"
      when: manual
  allow_failure: true
  timeout: 2 hours

# ============================================================================
# STAGE: REPORT
# ============================================================================

# -----------------------------------------------------------------------------
# Generate Consolidated Report
# -----------------------------------------------------------------------------
report:consolidate:
  stage: report
  image: python:3.11-slim
  needs:
    - security:vuln-scan
    - security:full-scan
  script:
    - echo "📊 Generating Consolidated Security Report"
    - pip install zen-ai-pentest
    - |
      zen-pentest report consolidate \
        --input-dirs "$ZEN_REPORT_DIR/vuln" "$ZEN_REPORT_DIR/full" \
        --output-dir "$ZEN_REPORT_DIR/consolidated" \
        --format html,pdf,json
  artifacts:
    paths:
      - $ZEN_REPORT_DIR/consolidated/
    expire_in: $ZEN_ARTIFACT_RETENTION
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------------------------------------------------------
# Create GitLab Issues for Findings
# -----------------------------------------------------------------------------
report:create-issues:
  stage: report
  image: alpine:latest
  needs:
    - security:full-scan
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "📝 Creating GitLab Issues for Security Findings"
    - |
      if [ -f "$ZEN_REPORT_DIR/full/scan-results.json" ]; then
        jq -c '.vulnerabilities[] | select(.severity == "critical" or .severity == "high")' "$ZEN_REPORT_DIR/full/scan-results.json" | while read -r vuln; do
          TITLE=$(echo "$vuln" | jq -r '"[\(.severity | ascii_upcase)] \(.name)"')
          DESCRIPTION=$(echo "$vuln" | jq -r '
            "## Security Finding\n\n" +
            "**Severity:** \(.severity)\n" +
            "**Target:** \(.target)\n" +
            "**Category:** \(.category)\n\n" +
            "### Description\n\(.description)\n\n" +
            "### Impact\n\(.impact)\n\n" +
            "### Remediation\n\(.remediation)\n\n" +
            "---\n_Automatically created by Zen-AI-Pentest_"
          ')
          
          curl -s -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues" \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"title\": \"$TITLE\",
              \"description\": $(echo "$DESCRIPTION" | jq -Rs .),
              \"labels\": \"security,zen-pentest,automated\"
            }" || echo "Failed to create issue"
        done
      fi
  rules:
    - if: '$ZEN_CREATE_ISSUES == "true" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

# -----------------------------------------------------------------------------
# Create Merge Request Discussion Comments
# -----------------------------------------------------------------------------
report:mr-discussions:
  stage: report
  image: alpine:latest
  needs:
    - security:vuln-scan
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "💬 Adding Security Findings to Merge Request"
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -f "$ZEN_REPORT_DIR/vuln/scan-results.json" ]; then
        CRITICAL=$(jq '.summary.critical // 0' "$ZEN_REPORT_DIR/vuln/scan-results.json")
        HIGH=$(jq '.summary.high // 0' "$ZEN_REPORT_DIR/vuln/scan-results.json")
        
        BODY="## 🔒 Zen-AI-Pentest Security Scan Results
        
        | Severity | Count |
        |----------|-------|
        | 🔴 Critical | $CRITICAL |
        | 🟠 High | $HIGH |
        
        Please review the findings before merging."
        
        curl -s -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/discussions" \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{
            \"body\": $(echo "$BODY" | jq -Rs .)
          }" || echo "Failed to create discussion"
      fi
  rules:
    - if: '$ZEN_CREATE_MR_DISCUSSIONS == "true" && $CI_MERGE_REQUEST_IID'
  allow_failure: true

# ============================================================================
# STAGE: NOTIFY
# ============================================================================

# -----------------------------------------------------------------------------
# Slack Notification
# -----------------------------------------------------------------------------
notify:slack:
  stage: notify
  image: alpine:latest
  needs:
    - security:full-scan
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "📢 Sending Slack Notification"
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ] && [ -f "$ZEN_REPORT_DIR/full/scan-results.json" ]; then
        CRITICAL=$(jq '.summary.critical // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        HIGH=$(jq '.summary.high // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        MEDIUM=$(jq '.summary.medium // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        LOW=$(jq '.summary.low // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        
        COLOR="good"
        if [ "$CRITICAL" -gt 0 ]; then
          COLOR="danger"
        elif [ "$HIGH" -gt 0 ]; then
          COLOR="warning"
        fi
        
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"Zen-AI-Pentest Scan Completed\",
              \"fields\": [
                {\"title\": \"Project\", \"value\": \"$CI_PROJECT_NAME\", \"short\": true},
                {\"title\": \"Branch\", \"value\": \"$CI_COMMIT_REF_NAME\", \"short\": true},
                {\"title\": \"Critical\", \"value\": \"$CRITICAL\", \"short\": true},
                {\"title\": \"High\", \"value\": \"$HIGH\", \"short\": true},
                {\"title\": \"Medium\", \"value\": \"$MEDIUM\", \"short\": true},
                {\"title\": \"Low\", \"value\": \"$LOW\", \"short\": true}
              ],
              \"footer\": \"GitLab CI/CD\",
              \"ts\": $(date +%s)
            }]
          }"
      fi
  rules:
    - if: $SLACK_WEBHOOK_URL
  allow_failure: true

# -----------------------------------------------------------------------------
# Email Notification
# -----------------------------------------------------------------------------
notify:email:
  stage: notify
  image: alpine:latest
  needs:
    - security:full-scan
  before_script:
    - apk add --no-cache mailx
  script:
    - echo "📧 Sending Email Notification"
    - |
      if [ -n "$SECURITY_TEAM_EMAIL" ]; then
        CRITICAL=$(jq '.summary.critical // 0' "$ZEN_REPORT_DIR/full/scan-results.json")
        
        if [ "$CRITICAL" -gt 0 ]; then
          echo "Critical vulnerabilities detected. Sending alert email..." | \
            mailx -s "[SECURITY ALERT] Critical Vulnerabilities in $CI_PROJECT_NAME" \
            -A "$ZEN_REPORT_DIR/full/scan-results.html" \
            "$SECURITY_TEAM_EMAIL"
        fi
      fi
  rules:
    - if: $SECURITY_TEAM_EMAIL
  allow_failure: true

# -----------------------------------------------------------------------------
# Webhook Notification
# -----------------------------------------------------------------------------
notify:webhook:
  stage: notify
  image: alpine:latest
  needs:
    - security:full-scan
  before_script:
    - apk add --no-cache curl
  script:
    - echo "🔗 Sending Webhook Notification"
    - |
      if [ -n "$SECURITY_WEBHOOK_URL" ]; then
        curl -s -X POST "$SECURITY_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d @"$ZEN_REPORT_DIR/full/scan-results.json" || echo "Webhook failed"
      fi
  rules:
    - if: $SECURITY_WEBHOOK_URL
  allow_failure: true

# =============================================================================
# SCHEDULED PIPELINE CONFIGURATION
# =============================================================================
# Create a schedule in GitLab UI:
#   Project Settings > CI/CD > Pipeline schedules
# Set variable for weekly full scan: ZEN_SCAN_MODE=full
# Set variable for daily quick scan: ZEN_SCAN_MODE=recon
# =============================================================================
